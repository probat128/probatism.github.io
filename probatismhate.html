<!DOCTYPE html>
<html>
<body>

<h1>ProbatismHate</h1>

<a href="../forums.html">← Back to Forums</a>

<h2>Create Post</h2>

<textarea id="postText"></textarea><br>
<button onclick="createPost()">Post</button>

<h2>Posts</h2>
<div id="posts"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  projectId: "probatismm"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const subforum = "probatismhate";

// Create post
function createPost() {
  let text = document.getElementById("postText").value;

  db.collection("posts").add({
    subforum: subforum,
    content: text,
    time: Date.now()
  });

  document.getElementById("postText").value = "";
  loadPosts();
}

// Load posts
function loadPosts() {
  db.collection("posts")
    .where("subforum", "==", subforum)
    .orderBy("time", "desc")
    .get()
    .then(snapshot => {
      let html = "";
      snapshot.forEach(doc => {
        html += `<p>${doc.data().content}</p><hr>`;
      });
      document.getElementById("posts").innerHTML = html;
    });
}

loadPosts();
</script>

</body>
</html>
