<!DOCTYPE html>
<html>
<head>
<title>Public Profile</title>

<style>
body {
  font-family: Arial;
  background:#e8e0cf;
  color:#5b2e61;
  padding:20px;
}

/* NAV */
nav a {
  color:#5b2e61;
  margin-right:10px;
  text-decoration:none;
}

button {
  margin-top:5px;
  padding:5px 10px;
  cursor:pointer;
  border:2px solid #5b2e61;
  background:#5b2e61;
  color:#e8e0cf;
}

/* PROFILE */
.profile-pic {
  width:128px;
  height:128px;
  object-fit:cover;
  border:2px solid #5b2e61;
}

/* FIX TEXT WRAP (IMPORTANT) */
#profileInfo, #profileInfo p {
  word-break: break-word;
  overflow-wrap: break-word;
  white-space: pre-wrap;
}

/* POSTS */
.post {
  border:1px solid #5b2e61;
  padding:10px;
  margin:10px 0;
  word-break: break-word;
  overflow-wrap: break-word;
  white-space: pre-wrap;
}

/* READ MORE */
.readMore {
  cursor:pointer;
  font-size:12px;
  text-decoration:underline;
}

/* REPUTATION */
.repBox {
  margin-top:10px;
}

.voteBtn {
  font-size:20px;
  cursor:pointer;
  padding:5px;
  border:1px solid #5b2e61;
  background:none;
  color:#5b2e61;
}

.voteBtn.active {
  background:#5b2e61;
  color:#e8e0cf;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="doctrine.html">Doctrine</a>
<a href="forums.html">Forums</a>
<a href="news.html">News</a>
<a href="quiz.html">Quiz</a>
<a href="signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn" style="display:none;">Logout</button>
</nav>

<h1 id="pageTitle">Profile</h1>

<div id="profileInfo">Loading...</div>

<h2>Posts & Replies</h2>
<div id="userPosts">Loading...</div>
<button id="loadMoreBtn">Load More</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, doc, getDoc, setDoc,
collection, getDocs, query, where, orderBy, limit, startAfter
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const urlParams = new URLSearchParams(window.location.search);
const username = urlParams.get("user");

let currentUser = null;
let lastVisiblePost = null;
let lastVisibleReply = null;

/* AUTH */
onAuthStateChanged(auth,(user)=>{
  const accountLink = document.getElementById("accountLink");
  const logoutBtn = document.getElementById("logoutBtn");

  if(user){
    currentUser = user.email.replace("@fake.com","");
    accountLink.innerText = "Profile";
    accountLink.href = "profile.html";
    logoutBtn.style.display = "inline";
  } else {
    currentUser = null;
    logoutBtn.style.display = "none";
  }
});

logoutBtn.onclick = async ()=>{
  await signOut(auth);
  location.href = "index.html";
};

/* READ MORE */
function readMore(text){
  if(!text) return "";
  if(text.length <= 400) return text;

  const id = Math.random().toString(36).slice(2);

  return `
  <span id="t_${id}">
    ${text.slice(0,400)}...
    <span class="readMore" onclick="
      document.getElementById('full_${id}').style.display='inline';
      document.getElementById('t_${id}').style.display='none';
    ">read more</span>
  </span>
  <span id="full_${id}" style="display:none">${text}</span>
  `;
}

/* LOAD PROFILE */
async function loadProfile(){
  const snap = await getDoc(doc(db,"users",username));
  if(!snap.exists()) return;

  const data = snap.data();
  const joinDate = new Date(data.joinDate).toLocaleDateString();

  // FIX TITLE
  document.getElementById("pageTitle").innerText = data.username;

  document.getElementById("profileInfo").innerHTML = `
    <h2>${data.username}</h2>
    <p>Joined: ${joinDate}</p>
    ${data.profilePic ? `<img class="profile-pic" src="${data.profilePic}">` : ""}
    <p>${data.description || ""}</p>

    <div class="repBox">
      <button id="upvote" class="voteBtn">▲</button>
      <span id="repValue">0</span>
      <button id="downvote" class="voteBtn">▼</button>
    </div>
  `;

  loadReputation();
}

/* REPUTATION */
async function loadReputation(){

  const votesSnap = await getDocs(
    query(collection(db,"reputationVotes"), where("target","==",username))
  );

  let total = 0;
  let myVote = 0;

  votesSnap.forEach(docSnap=>{
    const v = docSnap.data();
    total += v.value;

    if(v.from === currentUser){
      myVote = v.value;
    }
  });

  document.getElementById("repValue").innerText = total;

  const upBtn = document.getElementById("upvote");
  const downBtn = document.getElementById("downvote");

  upBtn.classList.remove("active");
  downBtn.classList.remove("active");

  if(myVote === 1) upBtn.classList.add("active");
  if(myVote === -1) downBtn.classList.add("active");

  if(!currentUser){
    upBtn.disabled = true;
    downBtn.disabled = true;
    return;
  }

  upBtn.onclick = ()=>vote(1);
  downBtn.onclick = ()=>vote(-1);
}

async function vote(value){
  const voteRef = doc(db,"reputationVotes", currentUser + "_" + username);
  const snap = await getDoc(voteRef);

  let current = 0;
  if(snap.exists()) current = snap.data().value;

  if(current === value){
    await setDoc(voteRef, { value:0, from:currentUser, target:username });
  } else {
    await setDoc(voteRef, { value:value, from:currentUser, target:username });
  }

  loadReputation();
}

/* LOAD POSTS */
async function loadPosts(){

  let q = query(
    collection(db,"posts"),
    where("author","==",username),
    orderBy("time","desc"),
    limit(10)
  );

  if(lastVisiblePost){
    q = query(
      collection(db,"posts"),
      where("author","==",username),
      orderBy("time","desc"),
      startAfter(lastVisiblePost),
      limit(10)
    );
  }

  const snap = await getDocs(q);
  if(!snap.empty){
    lastVisiblePost = snap.docs[snap.docs.length-1];

    snap.forEach(docSnap=>{
      const p = docSnap.data();
      const date = new Date(p.time).toLocaleString();

      document.getElementById("userPosts").innerHTML += `
        <div class="post">
          <b>${p.author}</b><br>
          ${readMore(p.content)}
          ${p.image ? `<br><img src="${p.image}" style="max-width:200px;">` : ""}
          <div>${date}</div>
          <button onclick="location.href='post.html?id=${docSnap.id}'">View Post</button>
        </div>
      `;
    });
  }

  /* LOAD REPLIES TOO */
  let rq = query(
    collection(db,"replies"),
    where("author","==",username),
    orderBy("time","desc"),
    limit(10)
  );

  if(lastVisibleReply){
    rq = query(
      collection(db,"replies"),
      where("author","==",username),
      orderBy("time","desc"),
      startAfter(lastVisibleReply),
      limit(10)
    );
  }

  const rsnap = await getDocs(rq);
  if(!rsnap.empty){
    lastVisibleReply = rsnap.docs[rsnap.docs.length-1];

    rsnap.forEach(docSnap=>{
      const r = docSnap.data();
      const date = new Date(r.time).toLocaleString();

      document.getElementById("userPosts").innerHTML += `
        <div class="post">
          <b>${r.author} (reply)</b><br>
          ${readMore(r.content)}
          ${r.image ? `<br><img src="${r.image}" style="max-width:200px;">` : ""}
          <div>${date}</div>
          <button onclick="location.href='post.html?id=${r.postId}'">View Thread</button>
        </div>
      `;
    });
  }
}

document.getElementById("loadMoreBtn").onclick = loadPosts;

loadProfile();
loadPosts();

</script>

</body>
</html>
