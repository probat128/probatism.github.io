<!DOCTYPE html>
<html>
<head>
<title>User Profile</title>

<style>
body {
  font-family: Arial;
  background:#e8e0cf;
  color:#5b2e61;
  padding:20px;
}

nav a {
  color:#5b2e61;
  margin-right:10px;
  text-decoration:none;
}

.profile-box {
  border:2px solid #5b2e61;
  padding:15px;
  margin-top:10px;
}

.profile-pic {
  width:200px;
  height:200px;
  object-fit:cover;
  border:2px solid #5b2e61;
}

button {
  margin-top:5px;
  padding:6px 10px;
  cursor:pointer;
  border:2px solid #5b2e61;
  background:#5b2e61;
  color:#e8e0cf;
}

.vote-box {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.arrow {
  font-size:24px;
  cursor:pointer;
  opacity:0.3;
  user-select:none;
}

.arrow.active {
  opacity:1;
}

.reputation {
  font-size:18px;
  font-weight:bold;
}

.post {
  border:1px solid #5b2e61;
  padding:10px;
  margin-top:10px;
}

.time {
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="profile.html">My Profile</a>
</nav>

<h1>User Profile</h1>

<div id="profile">Loading...</div>

<h3>Joined</h3>
<div id="joinDate">Loading...</div>

<h2>Reputation</h2>
<div class="vote-box">
  <div class="arrow" id="upvote">▲</div>
  <div class="reputation" id="rep">0</div>
  <div class="arrow" id="downvote">▼</div>
</div>

<h2>Posts</h2>
<div id="posts"></div>
<button id="loadMore">Load More</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc, getDoc,
  collection, query, where, getDocs,
  setDoc, deleteDoc, orderBy, limit, startAfter
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEZWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const username = new URLSearchParams(location.search).get("user");

let currentUser = null;
let currentVote = null;
let lastVisible = null;
let authReady = false;

// =====================
// AUTH (FIXED)
// =====================
onAuthStateChanged(auth,(user)=>{
  if(user){
    currentUser = user.email.replace("@fake.com","");
  } else {
    currentUser = null;
  }

  authReady = true;

  loadVote(); // safe now
});

// =====================
// PROFILE
// =====================
async function loadProfile(){
  const snap = await getDoc(doc(db,"users",username));
  if(!snap.exists()) return;

  const data = snap.data();

  document.getElementById("profile").innerHTML = `
    <div class="profile-box">
      <h2>${data.username}</h2>
      ${data.profilePic ? `<img class="profile-pic" src="${data.profilePic}">` : ""}
      <p>${data.description || ""}</p>
    </div>
  `;

  document.getElementById("joinDate").innerText =
    data.joinDate ? new Date(data.joinDate).toLocaleDateString() : "Unknown";
}

// =====================
// REPUTATION
// =====================
async function loadRep(){
  const snap = await getDoc(doc(db,"users",username));
  document.getElementById("rep").innerText =
    snap.exists() ? (snap.data().reputation || 0) : 0;
}

// =====================
// VOTE STATE
// =====================
async function loadVote(){
  if(!authReady || !currentUser) return;

  const id = currentUser + "_" + username;
  const snap = await getDoc(doc(db,"reputationVotes",id));

  currentVote = snap.exists() ? snap.data().value : null;
  updateUI();
}

// =====================
// UI UPDATE
// =====================
function updateUI(){
  document.getElementById("upvote").classList.remove("active");
  document.getElementById("downvote").classList.remove("active");

  if(currentVote === 1){
    document.getElementById("upvote").classList.add("active");
  }
  if(currentVote === -1){
    document.getElementById("downvote").classList.add("active");
  }
}

// =====================
// VOTING (FIXED)
// =====================
async function vote(value){
  if(!authReady || !currentUser || currentUser === username) return;

  const id = currentUser + "_" + username;

  const userRef = doc(db,"users",username);
  const voteRef = doc(db,"reputationVotes",id);

  const snap = await getDoc(userRef);
  let rep = snap.exists() ? (snap.data().reputation || 0) : 0;

  // remove old vote
  if(currentVote === 1) rep -= 1;
  if(currentVote === -1) rep += 1;

  // toggle off
  if(currentVote === value){
    currentVote = null;
    await deleteDoc(voteRef);
  } else {
    currentVote = value;
    rep += value;

    await setDoc(voteRef,{
      voter: currentUser,
      target: username,
      value
    });
  }

  await setDoc(userRef,{
    reputation: rep
  },{merge:true});

  updateUI();
  loadRep();
}

// =====================
// POSTS (FIXED PAGINATION)
// =====================
async function loadPosts(first=false){

  if(first){
    lastVisible = null;
    document.getElementById("posts").innerHTML = "";
  }

  let q;

  if(!lastVisible){
    q = query(
      collection(db,"posts"),
      where("author","==",username),
      orderBy("time","desc"),
      limit(10)
    );
  } else {
    q = query(
      collection(db,"posts"),
      where("author","==",username),
      orderBy("time","desc"),
      startAfter(lastVisible),
      limit(10)
    );
  }

  const snap = await getDocs(q);

  if(snap.empty) return;

  lastVisible = snap.docs[snap.docs.length-1];

  snap.forEach(d=>{
    const p = d.data();

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <b>${p.author}</b>
      <div class="time">${new Date(p.time).toLocaleString()}</div>
      <div>${p.content || ""}</div>
      ${p.image ? `<img src="${p.image}" style="max-width:200px;">` : ""}
    `;

    document.getElementById("posts").appendChild(div);
  });
}

// =====================
// EVENTS
// =====================
document.getElementById("upvote").onclick = ()=>vote(1);
document.getElementById("downvote").onclick = ()=>vote(-1);
document.getElementById("loadMore").onclick = ()=>loadPosts(false);

// =====================
// INIT
// =====================
loadProfile();
loadRep();
loadPosts(true);

</script>

</body>
</html>
