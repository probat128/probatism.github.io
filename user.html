<!DOCTYPE html>
<html>
<head>
<title>Public Profile</title>

<style>
body {
  font-family: Arial;
  background:#e8e0cf;
  color:#5b2e61;
  padding:20px;
}

/* NAV */
nav a {
  color:#5b2e61;
  margin-right:10px;
  text-decoration:none;
}

button {
  margin-top:5px;
  padding:5px 10px;
  cursor:pointer;
  border:1px solid #5b2e61;
  background:#e8e0cf;
  color:#5b2e61;
}

/* PROFILE */
.profile-pic {
  width:128px;
  height:128px;
  object-fit:cover;
  border:2px solid #5b2e61;
  margin-top:10px;
}

/* POSTS / REPLIES */
.post {
  border:1px solid #5b2e61;
  padding:10px;
  margin:10px 0;
  display:flex;
  gap:10px;
}

.contentWrap {
  flex:1;
}

/* TEXT FIX */
.post, .post div {
  word-break: break-word;
  overflow-wrap: break-word;
  white-space: pre-wrap;
}

/* TIME */
.time {
  font-size:12px;
  margin-top:5px;
}

/* IMAGE */
.post img {
  max-width:200px;
  margin-top:5px;
  border:1px solid #5b2e61;
}

/* READ MORE */
.readMore {
  cursor:pointer;
  font-size:12px;
  text-decoration:underline;
}

/* REPUTATION */
.repBox {
  margin-top:10px;
}

.voteBtn {
  font-size:20px;
  cursor:pointer;
  padding:5px;
  border:1px solid #5b2e61;
  background:none;
  color:#5b2e61;
}

.voteBtn.active {
  background:#5b2e61;
  color:#e8e0cf;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="doctrine.html">Doctrine</a>
<a href="forums.html">Forums</a>
<a href="news.html">News</a>
<a href="quiz.html">Quiz</a>
<a href="signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn" style="display:none;">Logout</button>
</nav>

<h1 id="pageTitle">Profile</h1>

<div id="profileInfo">Loading...</div>

<h2>Posts & Replies</h2>
<div id="userPosts">Loading...</div>
<button id="loadMoreBtn">Load More</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, doc, getDoc, setDoc,
collection, getDocs, query, where, orderBy, limit, startAfter
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const urlParams = new URLSearchParams(window.location.search);
const username = urlParams.get("user");

let currentUser = null;
let lastVisible = null;
let combinedList = [];
let index = 0;

/* AUTH */
onAuthStateChanged(auth,(user)=>{
  const accountLink = document.getElementById("accountLink");
  const logoutBtn = document.getElementById("logoutBtn");

  if(user){
    currentUser = user.email.replace("@fake.com","");
    accountLink.innerText = "Profile";
    accountLink.href = "profile.html";
    logoutBtn.style.display = "inline";
  } else {
    currentUser = null;
    logoutBtn.style.display = "none";
  }
});

logoutBtn.onclick = async ()=>{
  await signOut(auth);
  location.href = "index.html";
};

/* READ MORE */
function readMore(text){
  if(!text) return "";
  if(text.length <= 400) return text;

  const id = Math.random().toString(36).slice(2);

  return `
  <span id="t_${id}">
    ${text.slice(0,400)}...
    <span class="readMore" onclick="
      document.getElementById('full_${id}').style.display='inline';
      document.getElementById('t_${id}').style.display='none';
    ">read more</span>
  </span>
  <span id="full_${id}" style="display:none">${text}</span>
  `;
}

/* PROFILE */
async function loadProfile(){
  const snap = await getDoc(doc(db,"users",username));
  if(!snap.exists()) return;

  const data = snap.data();

  document.getElementById("pageTitle").innerText = data.username;

  document.getElementById("profileInfo").innerHTML = `
    <p><b>Joined:</b> ${new Date(data.joinDate).toLocaleDateString()}</p>
    ${data.profilePic ? `<img class="profile-pic" src="${data.profilePic}">` : ""}
    <p>${data.description || ""}</p>

    <div class="repBox">
      <button id="upvote" class="voteBtn">▲</button>
      <span id="repValue">0</span>
      <button id="downvote" class="voteBtn">▼</button>
    </div>
  `;

  loadReputation();
}

/* REPUTATION */
async function loadReputation(){
  const votesSnap = await getDocs(
    query(collection(db,"reputationVotes"), where("target","==",username))
  );

  let total = 0;
  let myVote = 0;

  votesSnap.forEach(docSnap=>{
    const v = docSnap.data();
    total += v.value;
    if(v.from === currentUser) myVote = v.value;
  });

  document.getElementById("repValue").innerText = total;

  const upBtn = document.getElementById("upvote");
  const downBtn = document.getElementById("downvote");

  upBtn.classList.remove("active");
  downBtn.classList.remove("active");

  if(myVote === 1) upBtn.classList.add("active");
  if(myVote === -1) downBtn.classList.add("active");

  if(!currentUser){
    upBtn.disabled = true;
    downBtn.disabled = true;
    return;
  }

  upBtn.onclick = ()=>vote(1, myVote);
  downBtn.onclick = ()=>vote(-1, myVote);
}

async function vote(value, currentVote){
  const voteRef = doc(db,"reputationVotes", currentUser + "_" + username);

  if(currentVote === value){
    await setDoc(voteRef, { value: 0, from: currentUser, target: username });
  } else {
    await setDoc(voteRef, { value:value, from:currentUser, target:username });
  }

  loadReputation();
}

/* LOAD POSTS + REPLIES (FIXED ORDER) */
async function loadAllContent(){

  const postsSnap = await getDocs(
    query(collection(db,"posts"),
    where("author","==",username),
    orderBy("time","desc"))
  );

  const repliesSnap = await getDocs(
    query(collection(db,"replies"),
    where("author","==",username),
    orderBy("time","desc"))
  );

  combinedList = [];

  postsSnap.forEach(docSnap=>{
    combinedList.push({
      type:"post",
      id:docSnap.id,
      ...docSnap.data()
    });
  });

  repliesSnap.forEach(docSnap=>{
    combinedList.push({
      type:"reply",
      id:docSnap.id,
      ...docSnap.data()
    });
  });

  // 🔥 FINAL SORT FIX
  combinedList.sort((a,b)=>b.time - a.time);

  renderMore(true);
}

/* RENDER */
function renderMore(reset=false){
  const div = document.getElementById("userPosts");

  if(reset){
    div.innerHTML="";
    index=0;
  }

  const chunk = combinedList.slice(index,index+10);

  chunk.forEach(item=>{
    const date = new Date(item.time).toLocaleString();

    div.innerHTML += `
      <div class="post">
        <div class="contentWrap">
          <b>${item.author} ${item.type==="reply"?"(reply)":""}</b><br>
          ${readMore(item.content)}
          ${item.image ? `<br><img src="${item.image}">` : ""}
          <div class="time">${date}</div>
          ${item.type==="post"
            ? `<button onclick="location.href='post.html?id=${item.id}'">View Post</button>`
            : ""}
        </div>
      </div>
    `;
  });

  index += 10;

  document.getElementById("loadMoreBtn").style.display =
    index >= combinedList.length ? "none" : "block";
}

document.getElementById("loadMoreBtn").onclick = ()=>renderMore(false);

loadProfile();
loadAllContent();

</script>

</body>
</html>
