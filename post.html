<!DOCTYPE html>
<html>
<head>
  <title>Post Thread</title>

  <style>
    body {
      font-family: Arial;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      padding: 20px;
    }

    nav a {
      color: rgb(91,46,97);
      margin-right: 10px;
      text-decoration: none;
    }

    textarea {
      width: 100%;
      height: 80px;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
      padding: 5px;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      cursor: pointer;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
    }

    .post, .reply {
      border: 1px solid rgb(91,46,97);
      padding: 10px;
      margin: 10px 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .meta {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 5px;
    }

    .img {
      max-width: 256px;
      max-height: 256px;
      margin-top: 8px;
      cursor: pointer;
      border: 1px solid rgb(91,46,97);
      display: block;
    }

    .pfp {
      width: 28px;
      height: 28px;
      object-fit: cover;
      display: inline-block;
      margin-right: 6px;
      border: 1px solid rgb(91,46,97);
      vertical-align: middle;
    }

    .smallBtn {
      padding: 3px 6px;
      font-size: 12px;
      margin-left: 5px;
      margin-top: 5px;
    }

    /* READ MORE */
    .readMore {
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 3px;
    }

    /* IMAGE MODAL */
    #imgModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #imgModal img {
      max-width: 90%;
      max-height: 90%;
    }

    /* ✅ CUSTOM DELETE MODAL (MATCHES general.html) */
    #deleteModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(232,224,207,0.85);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modalBox {
      background: rgb(232,224,207);
      border: 2px solid rgb(91,46,97);
      padding: 20px;
      text-align: center;
      width: 300px;
    }

    .modalBtn {
      margin: 5px;
      padding: 5px 12px;
      cursor: pointer;
      border: 1px solid rgb(91,46,97);
      background: rgb(232,224,207);
      color: rgb(91,46,97);
    }

    .confirmBtn {
      background: rgb(91,46,97);
      color: rgb(232,224,207);
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back to General</a>

<h2>Post</h2>
<div id="post">Loading...</div>

<h3>Replies</h3>
<div id="repliesContainer">Loading replies...</div>

<h3>Add Reply</h3>
<textarea id="replyInput" maxlength="8000"></textarea>
<br>
<button id="replyButton">Reply</button>

<!-- IMAGE MODAL -->
<div id="imgModal" onclick="closeImg()">
  <img id="modalImg">
</div>

<!-- DELETE MODAL (NEW UI FIX) -->
<div id="deleteModal">
  <div class="modalBox">
    <p>Are you sure you want to delete this reply?</p>
    <button class="modalBtn confirmBtn" id="confirmDelete">Delete</button>
    <button class="modalBtn" id="cancelDelete">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const postId = new URLSearchParams(window.location.search).get("id");

let currentUser = null;
let currentAdmin = false;
let pendingDeleteId = null;

const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

/* AUTH */
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user.email.replace("@fake.com", "");
    currentAdmin = user.admin || false;

    accountLink.innerText = "Profile";
    accountLink.href = "profile.html";
    logoutBtn.style.display = "inline";
  } else {
    currentUser = null;
    currentAdmin = false;

    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "signin.html";
    logoutBtn.style.display = "none";
  }
});

logoutBtn.onclick = async () => {
  await signOut(auth);
  window.location.href = "index.html";
};

/* IMAGE MODAL */
window.openImg = (src) => {
  document.getElementById("modalImg").src = src;
  document.getElementById("imgModal").style.display = "flex";
};

window.closeImg = () => {
  document.getElementById("imgModal").style.display = "none";
};

/* READ MORE FIX (DISAPPEARS AFTER CLICK) */
function formatText(text, id){
  if(!text) return "";

  if(text.length <= 400) return text;

  return `
    <span id="short-${id}">${text.slice(0,400)}...</span>
    <span id="full-${id}" style="display:none;">${text}</span>
    <div class="readMore" id="rm-${id}" onclick="toggleReadMore('${id}')">Read more</div>
  `;
}

window.toggleReadMore = (id) => {
  document.getElementById(`short-${id}`).style.display = "none";
  document.getElementById(`full-${id}`).style.display = "inline";
  document.getElementById(`rm-${id}`).style.display = "none";
};

/* GET USER */
async function getUser(name){
  const snap = await getDoc(doc(db,"users",name));
  return snap.exists() ? snap.data() : null;
}

/* LOAD POST */
async function loadPost(){
  const box = document.getElementById("post");

  const snap = await getDoc(doc(db,"posts",postId));
  const p = snap.data();

  const user = await getUser(p.author);

  const pfp = user?.profilePic
    ? `<img class="pfp" src="${user.profilePic}">`
    : "";

  const img = p.image
    ? `<img class="img" src="${p.image}" onclick="openImg('${p.image}')">`
    : "";

  const date = new Date(p.time).toLocaleString();

  box.innerHTML = `
    <div class="post">
      ${pfp}<b>${p.author}</b><br>
      ${formatText(p.content,"post")}
      ${img}
      <div class="meta">${date}</div>
      ${(currentUser===p.author||currentAdmin)
        ? `<button class="smallBtn" onclick="deletePost('${postId}')">Delete</button>` : ""}
    </div>
  `;
}

window.deletePost = async (id) => {
  if(!confirm("Delete this post?")) return;
  await deleteDoc(doc(db,"posts",id));
  window.location.href="forums/general.html";
};

/* LOAD REPLIES */
async function loadReplies(){
  const box = document.getElementById("repliesContainer");

  const snap = await getDocs(query(collection(db,"replies"), where("postId","==",postId)));

  const replies = snap.docs.map(d=>({id:d.id,...d.data()}));
  replies.sort((a,b)=>b.time-a.time);

  box.innerHTML = "";

  for(const r of replies){
    const user = await getUser(r.author);

    const pfp = user?.profilePic
      ? `<img class="pfp" src="${user.profilePic}">`
      : "";

    const img = r.image
      ? `<img class="img" src="${r.image}" onclick="openImg('${r.image}')">`
      : "";

    const date = new Date(r.time).toLocaleString();

    const div = document.createElement("div");
    div.className="reply";

    div.innerHTML = `
      ${pfp}<b>${r.author}</b><br>
      ${formatText(r.content,r.id)}
      ${img}
      <div class="meta">${date}</div>

      ${(currentUser===r.author||currentAdmin)
        ? `<button class="smallBtn" onclick="showDelete('${r.id}')">Delete</button>` : ""}
    `;

    box.appendChild(div);
  }
}

/* CUSTOM DELETE MODAL LOGIC */
window.showDelete = (id) => {
  pendingDeleteId = id;
  document.getElementById("deleteModal").style.display = "flex";
};

document.getElementById("cancelDelete").onclick = () => {
  pendingDeleteId = null;
  document.getElementById("deleteModal").style.display = "none";
};

document.getElementById("confirmDelete").onclick = async () => {
  if(pendingDeleteId){
    await deleteDoc(doc(db,"replies",pendingDeleteId));
    pendingDeleteId = null;
    document.getElementById("deleteModal").style.display = "none";
    loadReplies();
  }
};

/* REPLY POST */
document.getElementById("replyButton").onclick = async () => {
  const text = document.getElementById("replyInput").value.trim();
  if(!text) return alert("Enter reply");

  await addDoc(collection(db,"replies"),{
    postId,
    author: currentUser || "Anonymous",
    content:text,
    time:Date.now()
  });

  document.getElementById("replyInput").value="";
  loadReplies();
};

loadPost();
loadReplies();
</script>

</body>
</html>
