<!DOCTYPE html>
<html>
<head>
  <title>Post Thread</title>
  <style>
    body { font-family: Arial; background: rgb(232,224,207); color: rgb(91,46,97); padding:20px; }
    nav a { color: rgb(91,46,97); margin-right:10px; text-decoration:none; }
    button { margin-top:5px; padding:5px 10px; cursor:pointer; background: rgb(232,224,207); color: rgb(91,46,97); border: 1px solid rgb(91,46,97); border-radius:0; }
    textarea { width:100%; height:80px; background: rgb(232,224,207); color: rgb(91,46,97); border:1px solid rgb(91,46,97); padding:5px; border-radius:0; }
    .post { border:1px solid rgb(91,46,97); padding:10px; margin:10px 0; }
    .reply { border-left:2px solid rgb(91,46,97); margin:5px 0; padding-left:10px; }
    a { text-decoration:none; color: rgb(91,46,97); }
    
    /* Optional modal for delete confirmation */
    .modal-bg {
      display: none;
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(232,224,207,0.8);
      justify-content: center;
      align-items: center;
      z-index:1000;
    }
    .modal-content {
      background: rgb(232,224,207);
      padding: 20px;
      border: 2px solid rgb(91,46,97);
      width: 300px;
      text-align: center;
      color: rgb(91,46,97);
    }
    .modal-btn {
      padding: 5px 15px;
      margin: 0 10px;
      cursor: pointer;
      border:none;
      border-radius:0;
    }
    .modal-btn.confirm { background: rgb(91,46,97); color: rgb(232,224,207); }
    .modal-btn.cancel { background: rgb(232,224,207); color: rgb(91,46,97); border: 1px solid rgb(91,46,97); }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back to General</a>

<h2>Post</h2>
<div id="post">Loading...</div>

<h3>Replies</h3>
<div id="repliesContainer">Loading replies...</div>

<h3>Add Reply</h3>
<textarea id="replyInput" placeholder="Write your reply..."></textarea>
<br>
<button id="replyButton">Reply</button>

<!-- Optional modal for future delete functionality -->
<div id="deleteModal" class="modal-bg">
  <div class="modal-content">
    <p>Are you sure you want to delete this item?</p>
    <button id="confirmDeleteBtn" class="modal-btn confirm">Delete</button>
    <button id="cancelDeleteBtn" class="modal-btn cancel">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(window.location.search);
const postId = params.get("id");

// AUTH STATE
let currentUser = null;
onAuthStateChanged(auth, (user) => {
  const accountLink = document.getElementById("accountLink");
  const logoutBtn = document.getElementById("logoutBtn");

  if(user){
    currentUser = user.email.replace("@fake.com","");
    accountLink.innerText = "Profile";
    accountLink.href = "profile.html";
    logoutBtn.style.display = "inline";
  } else {
    currentUser = null;
    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "signin.html";
    logoutBtn.style.display = "none";
  }
});

document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  currentUser = null;
  alert("Logged out");
  window.location.href = "index.html";
};

// LOAD POST
async function loadPost(){
  const postDiv = document.getElementById("post");
  if(!postId){ postDiv.innerHTML = "No post ID provided."; return; }

  const docRef = doc(db, "posts", postId);
  const docSnap = await getDoc(docRef);

  if(!docSnap.exists()){ postDiv.innerHTML = "Post not found."; return; }

  const post = docSnap.data();
  postDiv.innerHTML = `<div class="post"><b>${post.author}</b>: ${post.content}</div>`;
}

// LOAD REPLIES (newest first)
async function loadReplies(){
  const repliesDiv = document.getElementById("repliesContainer");
  repliesDiv.innerHTML = "Loading replies...";

  try {
    const snapshot = await getDocs(query(collection(db,"replies"), where("postId","==",postId)));
    if(snapshot.empty){ repliesDiv.innerHTML="<p>No replies yet.</p>"; return; }

    const replies = snapshot.docs.map(docSnap => ({id: docSnap.id, ...docSnap.data()}));
    replies.sort((a,b)=>b.time - a.time); // newest first

    repliesDiv.innerHTML="";
    replies.forEach(reply=>{
      const date = new Date(reply.time).toLocaleString();
      const div = document.createElement("div");
      div.className="reply";
      div.innerHTML = `<b>${reply.author}</b>: ${reply.content}<br><span style="font-size:12px;color: rgb(91,46,97);">${date}</span>`;
      repliesDiv.appendChild(div);
    });
  } catch(e){
    console.error(e);
    repliesDiv.innerHTML="Error loading replies.";
  }
}

// POST REPLY
document.getElementById("replyButton").addEventListener("click", async ()=>{
  const text = document.getElementById("replyInput").value.trim();
  if(!text){ alert("Enter reply"); return; }

  const username = currentUser || "Anonymous";

  try {
    await addDoc(collection(db,"replies"),{
      postId,
      author: username,
      content: text,
      time: Date.now()
    });
    document.getElementById("replyInput").value="";
    loadReplies();
  } catch(e){
    console.error(e);
    alert("Error posting: "+e.message);
  }
});

loadPost();
loadReplies();
</script>
</body>
</html>
