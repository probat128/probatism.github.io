<!DOCTYPE html>
<html>
<head>
<title>Post Thread</title>

<style>

/* =========================
   BASE UI (MATCH GENERAL.HTML)
========================= */

body {
  font-family: Arial;
  background: rgb(232,224,207);
  color: rgb(91,46,97);
  padding:20px;
  line-height:1.4;
}

/* NAV */
nav a {
  color: rgb(91,46,97);
  margin-right:10px;
  text-decoration:none;
}

/* TEXT FIX */
.postBox, .replyBox {
  word-break: break-word;
  overflow-wrap: break-word;
}

/* TEXTAREA */
textarea {
  width:100%;
  height:80px;
  background: rgb(232,224,207);
  color: rgb(91,46,97);
  border:1px solid rgb(91,46,97);
  padding:5px;
}

/* BUTTONS */
button {
  margin-top:5px;
  padding:5px 10px;
  cursor:pointer;
  background: rgb(232,224,207);
  color: rgb(91,46,97);
  border:1px solid rgb(91,46,97);
}

/* POST BOX */
.postBox {
  border:1px solid rgb(91,46,97);
  padding:10px;
  margin:10px 0;
}

/* REPLY BOX */
.replyBox {
  border:1px solid rgb(91,46,97);
  padding:8px;
  margin:8px 0;
  display:flex;
  gap:10px;
  align-items:flex-start;
}

/* PROFILE PIC */
.avatar {
  width:32px;
  height:32px;
  object-fit:cover;
  border:1px solid rgb(91,46,97);
  flex-shrink:0;
}

/* CONTENT */
.contentWrap {
  flex:1;
  min-width:0;
}

/* TIME */
.time {
  font-size:11px;
  opacity:0.7;
  margin-top:3px;
}

/* READ MORE */
.readMore {
  cursor:pointer;
  font-size:12px;
  text-decoration:underline;
}

/* DELETE BUTTON */
.deleteBtn {
  font-size:12px;
  padding:3px 6px;
  margin-top:5px;
}

/* IMAGE THUMB */
.imgThumb {
  max-width:256px;
  max-height:256px;
  cursor:pointer;
  border:1px solid rgb(91,46,97);
  margin-top:5px;
}

/* FULL IMAGE OVERLAY */
.imgOverlay {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.imgOverlay img {
  max-width:90%;
  max-height:90%;
}

/* MODAL */
.modal-bg {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(232,224,207,0.8);
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.modal-content {
  background:rgb(232,224,207);
  border:2px solid rgb(91,46,97);
  padding:20px;
  width:320px;
  text-align:center;
}

/* LOAD MORE */
.loadMoreBtn {
  width:100%;
  margin-top:10px;
}

/* =========================
   🔥 FIX: THREAD LAYOUT WRAPPER
========================= */

.threadLayout {
  display:flex;
  flex-direction:column;
}

/* makes reply section visually attached */
.replyComposer {
  margin-top:20px;
  padding-top:10px;
  border-top:1px solid rgb(91,46,97);
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="doctrine.html">Doctrine</a>
<a href="forums.html">Forums</a>
<a href="news.html">News</a>
<a href="quiz.html">Quiz</a>
<a href="signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back</a>

<h2>Post</h2>
<div id="post"></div>

<!-- THREAD WRAPPER FIX -->
<div class="threadLayout">

<h3>Replies</h3>
<div id="replies"></div>
<button id="loadMoreReplies" class="loadMoreBtn">Load More Replies</button>

<!-- FIXED POSITIONING SECTION -->
<div class="replyComposer">

<h3>Add Reply</h3>

<textarea id="replyText" placeholder="Write reply (8000 max)"></textarea>
<br>
<input type="file" id="replyImg">
<br>
<button id="sendReply">Reply</button>

</div>
</div>

<!-- IMAGE MODAL -->
<div class="imgOverlay" id="imgOverlay">
<img id="fullImg">
</div>

<!-- DELETE MODAL -->
<div class="modal-bg" id="modal">
<div class="modal-content">
<p id="modalText"></p>
<button id="confirmBtn">Confirm</button>
<button id="cancelBtn">Cancel</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
doc, getDoc,
collection, addDoc, getDocs,
query, where, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
authDomain: "probatismm.firebaseapp.com",
projectId: "probatismm",
storageBucket: "probatismm.firebasestorage.app",
messagingSenderId: "746935651152",
appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const postId = new URLSearchParams(location.search).get("id");

/* STATE */
let currentUser=null;
let deleteTarget=null;
let replyList=[];
let replyIndex=0;

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user){
currentUser=user.email.replace("@fake.com","");
document.getElementById("accountLink").innerText="Profile";
document.getElementById("accountLink").href="profile.html";
}
else currentUser=null;
});

document.getElementById("logoutBtn").onclick=async()=>{
await signOut(auth);
location.href="index.html";
};

/* IMAGE VIEW */
const overlay=document.getElementById("imgOverlay");
const fullImg=document.getElementById("fullImg");

window.showImg=(src)=>{
fullImg.src=src;
overlay.style.display="flex";
};

overlay.onclick=()=>overlay.style.display="none";

/* READ MORE */
function readMore(text){
if(!text) return "";
if(text.length<=400) return text;

const id=Math.random().toString(36).slice(2);

return `
<span id="t_${id}">
${text.slice(0,400)}...
<span class="readMore" onclick="
document.getElementById('full_${id}').style.display='inline';
document.getElementById('t_${id}').style.display='none';
this.style.display='none';
">read more</span>
</span>
<span id="full_${id}" style="display:none">${text}</span>
`;
}

/* LOAD POST */
async function loadPost(){
const snap=await getDoc(doc(db,"posts",postId));
const p=snap.data();

document.getElementById("post").innerHTML=`
<div class="postBox">
<b>${p.author}</b><br>
${readMore(p.content)}
${p.image?`<br><img class="imgThumb" src="${p.image}" onclick="showImg(this.src)">`:``}
</div>
`;
}

/* REPLIES */
async function fetchReplies(){
const q=await getDocs(query(collection(db,"replies"),where("postId","==",postId)));

replyList=q.docs.map(d=>({id:d.id,...d.data()}));
replyList.sort((a,b)=>b.time-a.time);

renderReplies(true);
}

/* RENDER */
async function renderReplies(reset=false){
const container=document.getElementById("replies");

if(reset){
container.innerHTML="";
replyIndex=0;
}

const chunk=replyList.slice(replyIndex,replyIndex+10);

for(const r of chunk){

const el=document.createElement("div");
el.className="replyBox";

el.innerHTML=`
${r.avatar?`<img class="avatar" src="${r.avatar}">`:``}
<div class="contentWrap">
<b>${r.author}</b><br>
${readMore(r.content)}
${r.image?`<br><img class="imgThumb" src="${r.image}" onclick="showImg(this.src)">`:``}
<div class="time">${new Date(r.time).toLocaleString()}</div>

${r.author===currentUser?`<button class="deleteBtn" onclick="openDelete('${r.id}')">Delete</button>`:``}
</div>
`;

container.appendChild(el);
}

replyIndex+=10;

document.getElementById("loadMoreReplies").style.display=
replyIndex>=replyList.length?"none":"block";
}

document.getElementById("loadMoreReplies").onclick=()=>renderReplies(false);

/* DELETE */
const modal=document.getElementById("modal");
const modalText=document.getElementById("modalText");

window.openDelete=(id)=>{
deleteTarget=id;
modalText.innerText="Are you sure you want to delete this reply?";
modal.style.display="flex";
};

document.getElementById("cancelBtn").onclick=()=>{
modal.style.display="none";
deleteTarget=null;
};

document.getElementById("confirmBtn").onclick=async()=>{
await deleteDoc(doc(db,"replies",deleteTarget));
modal.style.display="none";
fetchReplies();
};

/* SEND */
document.getElementById("sendReply").onclick=async()=>{
const text=document.getElementById("replyText").value.trim();
const file=document.getElementById("replyImg").files[0];

if(!text && !file) return;

const img=file?await new Promise(res=>{
const r=new FileReader();
r.onload=()=>res(r.result);
r.readAsDataURL(file);
}):null;

await addDoc(collection(db,"replies"),{
postId,
author:currentUser||"Anonymous",
content:text,
image:img,
time:Date.now()
});

document.getElementById("replyText").value="";
fetchReplies();
};

/* INIT */
loadPost();
fetchReplies();

</script>

</body>
</html>
