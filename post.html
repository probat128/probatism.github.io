<!DOCTYPE html>
<html>
<head>
  <title>Post Thread</title>

  <style>
    body {
      font-family: Arial;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      padding: 20px;
    }

    nav a {
      color: rgb(91,46,97);
      margin-right: 10px;
      text-decoration: none;
    }

    textarea {
      width: 100%;
      height: 80px;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
      padding: 5px;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      cursor: pointer;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
    }

    .post, .reply {
      border: 1px solid rgb(91,46,97);
      padding: 10px;
      margin: 10px 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .meta {
      font-size: 12px;
      opacity: 0.8;
    }

    .img {
      max-width: 256px;
      max-height: 256px;
      margin-top: 8px;
      cursor: pointer;
      border: 1px solid rgb(91,46,97);
    }

    .smallBtn {
      padding: 3px 8px;
      font-size: 12px;
      margin-left: 5px;
    }

    /* IMAGE MODAL */
    #imgModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #imgModal img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back to General</a>

<h2>Post</h2>
<div id="post">Loading...</div>

<h3>Replies</h3>
<div id="repliesContainer">Loading replies...</div>

<h3>Add Reply</h3>
<textarea id="replyInput" placeholder="Write your reply..."></textarea>
<br>
<button id="replyButton">Reply</button>

<!-- IMAGE MODAL -->
<div id="imgModal" onclick="closeImg()">
  <img id="modalImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const postId = new URLSearchParams(window.location.search).get("id");

let currentUser = null;
let currentAdmin = false;

/* AUTH */
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user.email.replace("@fake.com", "");
    currentAdmin = user.admin || false;

    accountLink.innerText = "Profile";
    accountLink.href = "profile.html";
    logoutBtn.style.display = "inline";
  } else {
    currentUser = null;
    currentAdmin = false;

    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "signin.html";
    logoutBtn.style.display = "none";
  }
});

/* LOGOUT */
logoutBtn.onclick = async () => {
  await signOut(auth);
  window.location.href = "index.html";
};

/* OPEN IMAGE */
window.openImg = function(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("imgModal").style.display = "flex";
};

window.closeImg = function(){
  document.getElementById("imgModal").style.display = "none";
};

/* LOAD POST */
async function loadPost(){
  const postDiv = document.getElementById("post");
  if(!postId){ postDiv.innerHTML = "No post ID provided."; return; }

  const snap = await getDoc(doc(db,"posts",postId));
  if(!snap.exists()){ postDiv.innerHTML = "Post not found."; return; }

  const p = snap.data();
  const date = new Date(p.time).toLocaleString();

  const img = p.image
    ? `<img class="img" src="${p.image}" onclick="openImg('${p.image}')">`
    : "";

  const del = (currentUser === p.author || currentAdmin)
    ? `<button class="smallBtn" onclick="deletePost('${postId}')">Delete</button>`
    : "";

  postDiv.innerHTML = `
    <div class="post">
      <b>${p.author}</b><br>
      ${p.content || ""}
      ${img}
      <div class="meta">${date}</div>
      ${del}
    </div>
  `;
}

/* DELETE POST */
window.deletePost = async function(id){
  if(!confirm("Delete this post?")) return;
  await deleteDoc(doc(db,"posts",id));
  window.location.href = "forums/general.html";
};

/* LOAD REPLIES */
async function loadReplies(){
  const box = document.getElementById("repliesContainer");
  box.innerHTML = "Loading replies...";

  const snap = await getDocs(query(collection(db,"replies"), where("postId","==",postId)));

  if(snap.empty){
    box.innerHTML = "<p>No replies yet.</p>";
    return;
  }

  const replies = snap.docs.map(d => ({id:d.id,...d.data()}));
  replies.sort((a,b)=>b.time-a.time);

  box.innerHTML = "";

  replies.forEach(r=>{
    const date = new Date(r.time).toLocaleString();

    const img = r.image
      ? `<img class="img" src="${r.image}" onclick="openImg('${r.image}')">`
      : "";

    const del = (currentUser === r.author || currentAdmin)
      ? `<button class="smallBtn" onclick="deleteReply('${r.id}')">Delete</button>`
      : "";

    const div = document.createElement("div");
    div.className = "reply";

    div.innerHTML = `
      <b>${r.author}</b><br>
      ${r.content || ""}
      ${img}
      <div class="meta">${date}</div>
      ${del}
    `;

    box.appendChild(div);
  });
}

/* DELETE REPLY (FIXED + CONFIRM) */
window.deleteReply = async function(id){
  if(!confirm("Are you sure you want to delete this reply?")) return;
  await deleteDoc(doc(db,"replies",id));
  loadReplies();
};

/* POST REPLY */
document.getElementById("replyButton").onclick = async () => {
  const text = document.getElementById("replyInput").value.trim();
  if(!text) return alert("Enter reply");

  const name = currentUser || "Anonymous";

  await addDoc(collection(db,"replies"),{
    postId,
    author:name,
    content:text,
    time:Date.now()
  });

  document.getElementById("replyInput").value = "";
  loadReplies();
};

loadPost();
loadReplies();
</script>

</body>
</html>
