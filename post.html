<!DOCTYPE html>
<html>
<head>
<title>Post</title>

<style>

/* =========================
   BASE UI (MATCH GENERAL.HTML)
========================= */

body {
  font-family: Arial;
  background: rgb(232,224,207);
  color: rgb(91,46,97);
  padding:20px;
  line-height:1.4;

  display:flex;
  flex-direction:column;
}

nav a {
  color: rgb(91,46,97);
  margin-right:10px;
  text-decoration:none;
}

#pageWrapper{
  display:flex;
  flex-direction:column;
  width:100%;
}

.postBox, .replyBox {
  word-break: break-word;
  overflow-wrap: break-word;
}

textarea {
  width:100%;
  height:80px;
  background: rgb(232,224,207);
  color: rgb(91,46,97);
  border:1px solid rgb(91,46,97);
  padding:5px;
}

button {
  margin-top:5px;
  padding:5px 10px;
  cursor:pointer;
  background: rgb(232,224,207);
  color: rgb(91,46,97);
  border:1px solid rgb(91,46,97);
}

.postBox {
  border:1px solid rgb(91,46,97);
  padding:10px;
  margin:10px 0;
}

.replyBox {
  border:1px solid rgb(91,46,97);
  padding:8px;
  margin:8px 0;
  display:flex;
  gap:10px;
  align-items:flex-start;
}

/* PROFILE PIC */
.avatar {
  width:32px;
  height:32px;
  object-fit:cover;
  border:1px solid rgb(91,46,97);
  flex-shrink:0;
  cursor:pointer;
}

/* CONTENT */
.contentWrap {
  flex:1;
  min-width:0;
}

/* TIME */
.time {
  font-size:11px;
  opacity:0.7;
  margin-top:3px;
}

.readMore {
  cursor:pointer;
  font-size:12px;
  text-decoration:underline;
}

.deleteBtn {
  font-size:12px;
  padding:3px 6px;
  margin-top:5px;
}

.imgThumb {
  max-width:256px;
  max-height:256px;
  cursor:pointer;
  border:1px solid rgb(91,46,97);
  margin-top:5px;
}

.imgOverlay {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.imgOverlay img {
  max-width:90%;
  max-height:90%;
}

.modal-bg {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(232,224,207,0.8);
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.modal-content {
  background:rgb(232,224,207);
  border:2px solid rgb(91,46,97);
  padding:20px;
  width:320px;
  text-align:center;
}

.loadMoreBtn {
  width:100%;
  margin-top:10px;
}

#replySection{
  margin-top:20px;
  padding-top:10px;
  /* REMOVED WEIRD LINE */
}

#replies{
  display:flex;
  flex-direction:column;
}

.mention {
  color: inherit;
  cursor: pointer;
  text-decoration: underline;
}

.mention:hover {
  color: blue;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="doctrine.html">Doctrine</a>
<a href="forums.html">Forums</a>
<a href="news.html">News</a>
<a href="quiz.html">Quiz</a>
<a href="signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn">Logout</button>
</nav>

<h2>Post</h2>
<div id="post"></div>

<h3>Add Reply</h3>
<div id="replySection">
  <textarea id="replyText"></textarea>
  <br>
  <input type="file" id="replyImg">
  <br>
  <button id="sendReply">Reply</button>
  <p id="cooldownText" style="font-size:12px; margin-top:5px;"></p>
</div>

<h3>Replies</h3>
<div id="replies"></div>
<button id="loadMoreReplies" class="loadMoreBtn">Load More Replies</button>

<div class="imgOverlay" id="imgOverlay">
<img id="fullImg">
</div>

<!-- DELETE MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-content">
    <p id="modalText"></p>
    <button id="confirmBtn">Yes</button>
    <button id="cancelBtn">No</button>
  </div>
</div>

<!-- IMAGE LOCK MODAL -->
<div id="imageLockModal" class="modal-bg">
  <div class="modal-content">
    <p>You must be signed in to attach images</p>
    <button id="imageLockOkBtn">OK</button>
  </div>
</div>

<script type="module">

import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
doc, getDoc,
collection, addDoc, getDocs,
query, where, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut,
signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

function extractMentions(text){
  if(!text) return [];

  const matches = text.match(/@[\w]+/g) || [];
  const cleaned = matches.map(m => m.replace("@",""));

  return [...new Set(cleaned)].filter(u => u !== "Anonymous");
}

const firebaseConfig = {
apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
authDomain: "probatismm.firebaseapp.com",
projectId: "probatismm",
storageBucket: "probatismm.firebasestorage.app",
messagingSenderId: "746935651152",
appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
const db = getFirestore(app);
const auth = getAuth(app);
const imageLockModal = document.getElementById("imageLockModal");
const imageLockOkBtn = document.getElementById("imageLockOkBtn");
const replyImgInput = document.getElementById("replyImg");

const postId = new URLSearchParams(location.search).get("id");

/* STATE */
let currentUser=null;
let deleteTarget=null;
let replyList=[];
let currentUID = null;

const adminUIDs = [
  "IDlmRGgh2PaLx15krpeq5jGU6SJ3"
];

function isAdmin(uid){
  return uid && adminUIDs.includes(uid);
}
let replyIndex=0;
let lastReplyTime = 0; // NEW cooldown

replyImgInput.addEventListener("click", (e) => {
  if (!auth.currentUser || auth.currentUser.isAnonymous) {
    e.preventDefault();
    replyImgInput.value = "";
    imageLockModal.style.display = "flex";
  }
});

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

if(user && !user.isAnonymous){
document.getElementById("logoutBtn").style.display = "inline";
  currentUID = user.uid;

  // 🔥 GET REAL USERNAME FROM FIRESTORE
  try {
    const userSnap = await getDoc(doc(db, "users", user.uid));

    if(userSnap.exists() && userSnap.data().username){
      currentUser = userSnap.data().username;
    } else {
      currentUser = "Anonymous";
    }

  } catch(e){
    console.error("User fetch error:", e);
    currentUser = "Anonymous";
  }

  document.getElementById("accountLink").innerText="Profile";
  document.getElementById("accountLink").href="profile.html";

} else {
  currentUser = "Anonymous";
  currentUID = null;

  document.getElementById("accountLink").innerText = "Sign In / Sign Up";
  document.getElementById("accountLink").href = "signin.html";
  document.getElementById("logoutBtn").style.display = "none";

  signInAnonymously(auth).catch(console.error);
}
});

document.getElementById("logoutBtn").onclick=async()=>{
await signOut(auth);
location.href="index.html";
};

/* PROFILE NAVIGATION */
window.goProfile = function(username){
  if(!username || username === "Anonymous") return;

  if(username === currentUser){
    window.location.href = "profile.html";
  } else {
    window.location.href = "user.html?user=" + username;
  }
};

function renderMentions(text){
  if(!text) return "";

  return text.replace(/@([\w]+)/g, (match, username) => {
    if(username === "Anonymous") return match;

    return `<span class="mention" onclick="goProfile('${username}')">@${username}</span>`;
  });
}

/* IMAGE VIEW */
const overlay=document.getElementById("imgOverlay");
const fullImg=document.getElementById("fullImg");

window.showImg=(src)=>{
fullImg.src=src;
overlay.style.display="flex";
};

overlay.onclick=()=>overlay.style.display="none";

/* READ MORE */
function readMore(text){
if(!text) return "";
if(text.length<=400) return text;

const id=Math.random().toString(36).slice(2);

return `
<span id="t_${id}">
${text.slice(0,400)}...
<span class="readMore" onclick="
document.getElementById('full_${id}').style.display='inline';
document.getElementById('t_${id}').style.display='none';
this.style.display='none';
">read more</span>
</span>
<span id="full_${id}" style="display:none">${text}</span>
`;
}

/* LOAD USER AVATAR */
async function getAvatar(username){
  if(!username || username==="Anonymous") return null;

  const q = query(collection(db,"users"), where("username","==",username));
  const snap = await getDocs(q);

  if(snap.empty) return null;

  const data = snap.docs[0].data();
  return data.profilePic || null;
}
/* LOAD POST */
async function loadPost(){
const snap=await getDoc(doc(db,"posts",postId));
const p=snap.data();

const avatar = await getAvatar(p.author);

document.getElementById("post").innerHTML=`
<div class="postBox">

${p.author !== "Anonymous"
  ? `<img class="avatar" src="${avatar || ''}" onclick="goProfile('${p.author}')">`
  : ``}

<b onclick="${p.author !== "Anonymous" ? `goProfile('${p.author}')` : ''}" style="cursor:${p.author !== "Anonymous" ? "pointer" : "default"}">
${p.author}
</b><br>

${renderMentions(readMore(p.content))}

${p.image?`<br><img class="imgThumb" src="${p.image}" data-full="${p.image}" onclick="showImg(this.dataset.full)">`:``}
</div>
`;
}

/* REPLIES */
async function fetchReplies(){
const q=await getDocs(query(collection(db,"replies"),where("postId","==",postId)));

replyList=q.docs.map(d=>({id:d.id,...d.data()}));
replyList.sort((a,b)=>b.time-a.time);

renderReplies(true);
}

async function renderReplies(reset=false){
const container=document.getElementById("replies");

if(reset){
container.innerHTML="";
replyIndex=0;
}

const chunk=replyList.slice(replyIndex,replyIndex+10);

for(const r of chunk){

const avatar = await getAvatar(r.author);

const el=document.createElement("div");
el.className="replyBox";

el.innerHTML=`
${r.author !== "Anonymous"
  ? `<img class="avatar" src="${avatar || ''}" onclick="goProfile('${r.author}')">`
  : ``}

<div class="contentWrap">
<b onclick="${r.author !== "Anonymous" ? `goProfile('${r.author}')` : ''}" style="cursor:${r.author !== "Anonymous" ? "pointer" : "default"}">
${r.author}
</b><br>

${renderMentions(readMore(r.content))}
${r.image?`<br><img class="imgThumb" src="${r.image}" data-full="${r.image}">`:``}
<div class="time">${new Date(r.time).toLocaleString()}</div>

${(
  (currentUID && r.authorUID && currentUID === r.authorUID) ||
  isAdmin(currentUID)
) ? `
  <button class="deleteBtn" onclick="openDelete('${r.id}')">Delete</button>
` : ``}
</div>
`;

container.appendChild(el);

el.querySelectorAll(".imgThumb").forEach(img => {
  img.onclick = () => {
    showImg(img.dataset.full);
  };
});

replyIndex+=10;

document.getElementById("loadMoreReplies").style.display=
replyIndex>=replyList.length?"none":"block";
}

document.getElementById("loadMoreReplies").onclick=()=>renderReplies(false);

}

/* DELETE MODAL */
const modal=document.getElementById("modal");
const modalText=document.getElementById("modalText");

window.openDelete = (id) => {
  deleteTarget = id;
  modalText.innerText = "Delete this reply?";
  modal.style.display = "flex";
};

document.getElementById("cancelBtn").onclick=()=>{
modal.style.display="none";
deleteTarget=null;
};

document.getElementById("confirmBtn").onclick = async () => {
  try {
    if (!deleteTarget) return;

    await deleteDoc(doc(db, "replies", deleteTarget));

    deleteTarget = null;
    modal.style.display = "none";

    fetchReplies();

  } catch (err) {
    console.error("Delete failed:", err);
    alert("Delete failed");
  }
};

/* SEND WITH COOLDOWN */
document.getElementById("sendReply").onclick=async()=>{

const now = Date.now();
const remaining = 10000 - (now - lastReplyTime);

if(remaining > 0){
  startCooldownUI(Math.ceil(remaining / 1000));
  return;
}

const btn = document.getElementById("sendReply");

const text=document.getElementById("replyText").value.trim();
const file=document.getElementById("replyImg").files[0];

if(!text && !file) return;

btn.disabled = true;

const img=file?await new Promise(res=>{
const r=new FileReader();
r.onload=()=>res(r.result);
r.readAsDataURL(file);
}):null;

const mentions = extractMentions(text);

await addDoc(collection(db,"replies"),{
postId,
author: currentUser || "Anonymous",
authorUID: auth.currentUser ? auth.currentUser.uid : null,
authorEmail: auth.currentUser ? auth.currentUser.email : null,

content: text,
image: img,
time: Date.now(),

mentionedUsers: mentions
});

lastReplyTime = Date.now();
startCooldownUI(10);


document.getElementById("replyText").value="";
document.getElementById("replyImg").value=""; // FIX

setTimeout(()=>btn.disabled=false,10000);

fetchReplies();
};

function startCooldownUI(seconds){
  const textEl = document.getElementById("cooldownText");
  const btn = document.getElementById("sendReply");

  btn.disabled = true;

  textEl.innerText = `Wait ${seconds} seconds before replying again`;

  const interval = setInterval(() => {
    seconds--;

    if(seconds <= 0){
      clearInterval(interval);
      textEl.innerText = "";
      btn.disabled = false;
    } else {
      textEl.innerText = `Wait ${seconds} seconds before replying again`;
    }
  }, 1000);
}

imageLockOkBtn.onclick = () => {
  imageLockModal.style.display = "none";
};

loadPost();
fetchReplies();

   
</script>

</body>
</html>
