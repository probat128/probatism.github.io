<!DOCTYPE html>
<html>
<head>
  <title>Post Thread</title>

  <style>
    body {
      font-family: Arial;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      padding: 20px;
    }

    nav a {
      color: rgb(91,46,97);
      margin-right: 10px;
      text-decoration: none;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      cursor: pointer;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
    }

    textarea {
      width: 100%;
      height: 80px;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
      padding: 5px;
    }

    .postBox, .replyBox {
      border: 1px solid rgb(91,46,97);
      padding: 10px;
      margin: 10px 0;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .reply {
      border: 1px solid rgb(91,46,97);
      margin: 10px 0;
      padding: 10px;
    }

    .pfp {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border: 1px solid rgb(91,46,97);
      margin-right: 8px;
      vertical-align: middle;
    }

    .userRow {
      display: flex;
      align-items: center;
    }

    .time {
      font-size: 12px;
      opacity: 0.8;
    }

    .imgThumb {
      max-width: 256px;
      max-height: 256px;
      cursor: pointer;
      border: 1px solid rgb(91,46,97);
      margin-top: 5px;
    }

    /* MODAL UI (DELETE / CONFIRM / ENTER UI REPLACEMENT) */
    .modal-bg {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(232,224,207,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal {
      background: rgb(232,224,207);
      border: 2px solid rgb(91,46,97);
      padding: 20px;
      width: 300px;
      text-align: center;
    }

    .modal button {
      margin: 5px;
    }

    /* IMAGE VIEWER */
    #imgViewer {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    #imgViewer img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back</a>

<h2>Post</h2>
<div id="postContainer">Loading...</div>

<h3>Replies</h3>
<div id="repliesContainer">Loading...</div>
<button id="loadMoreRepliesBtn">Load more replies</button>

<h3>Add Reply</h3>
<textarea id="replyInput" maxlength="8000" placeholder="Write reply..."></textarea>
<input type="file" id="replyImage" accept="image/*">
<br>
<button id="replyBtn">Reply</button>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-bg">
  <div class="modal">
    <p id="deleteText">Are you sure?</p>
    <button id="confirmDelete">Delete</button>
    <button id="cancelDelete">Cancel</button>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div id="imgViewer">
  <img id="fullImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, collection, addDoc, getDocs,
  query, where, orderBy, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const postId = new URLSearchParams(window.location.search).get("id");

let currentUser = null;
let deleteTarget = null;
let deleteType = null;

let replies = [];
let replyIndex = 0;

const replyBatch = 10;

/* AUTH */
onAuthStateChanged(auth, (user) => {
  if(user){
    currentUser = user.email.replace("@fake.com","");
    document.getElementById("accountLink").innerText = "Profile";
    document.getElementById("accountLink").href = "profile.html";
  } else {
    currentUser = null;
  }
});

/* LOGOUT */
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  location.href = "index.html";
};

/* IMAGE VIEWER */
const imgViewer = document.getElementById("imgViewer");
const fullImg = document.getElementById("fullImg");
imgViewer.onclick = () => imgViewer.style.display = "none";

function showImage(src){
  fullImg.src = src;
  imgViewer.style.display = "flex";
}

/* LOAD USERS CACHE FOR PFP */
const userCache = {};
async function getUserProfile(username){
  if(userCache[username]) return userCache[username];

  const snap = await getDoc(doc(db,"users",username));
  const data = snap.exists() ? snap.data() : {};
  userCache[username] = data;
  return data;
}

/* READ MORE */
function formatText(text){
  if(!text) return "";

  const max = 400;
  if(text.length <= max) return `<div>${text}</div>`;

  const id = Math.random().toString(36);

  return `
    <div>
      <span id="t_${id}">
        ${text.slice(0,max)}...
      </span>
      <span id="f_${id}" style="display:none">${text}</span>
      <button onclick="
        document.getElementById('f_${id}').style.display='block';
        document.getElementById('t_${id}').style.display='none';
        this.style.display='none';
      ">Read more</button>
    </div>
  `;
}

/* POST LOAD */
async function loadPost(){
  const box = document.getElementById("postContainer");
  const snap = await getDoc(doc(db,"posts",postId));

  if(!snap.exists()){
    box.innerHTML = "Post not found";
    return;
  }

  const p = snap.data();
  const u = await getUserProfile(p.author);

  box.innerHTML = `
    <div class="postBox">
      <div class="userRow">
        ${u.profilePic ? `<img class="pfp" src="${u.profilePic}">` : ""}
        <b>${p.author}</b>
      </div>

      ${formatText(p.content || "")}

      ${p.image ? `<img class="imgThumb" onclick="showImage('${p.image}')" src="${p.image}">` : ""}

      <div class="time">${new Date(p.time).toLocaleString()}</div>

      ${currentUser === p.author ? `<button onclick="openDelete('post','${postId}')">Delete Post</button>` : ""}
    </div>
  `;
}

/* REPLIES */
async function loadReplies(){
  const q = query(collection(db,"replies"), where("postId","==",postId), orderBy("time","desc"));
  const snap = await getDocs(q);

  replies = snap.docs.map(d => ({id:d.id, ...d.data()}));
  replyIndex = 0;

  document.getElementById("repliesContainer").innerHTML = "";
  renderMoreReplies();
}

async function renderMoreReplies(){
  const container = document.getElementById("repliesContainer");

  const next = replies.slice(replyIndex, replyIndex + replyBatch);
  replyIndex += replyBatch;

  for(const r of next){
    const u = await getUserProfile(r.author);

    const div = document.createElement("div");
    div.className = "reply";

    div.innerHTML = `
      <div class="userRow">
        ${u.profilePic ? `<img class="pfp" src="${u.profilePic}">` : ""}
        <b>${r.author}</b>
      </div>

      ${formatText(r.content || "")}

      ${r.image ? `<img class="imgThumb" onclick="showImage('${r.image}')" src="${r.image}">` : ""}

      <div class="time">${new Date(r.time).toLocaleString()}</div>

      ${currentUser === r.author ? `<button onclick="openDelete('reply','${r.id}')">Delete Reply</button>` : ""}
    `;

    container.appendChild(div);
  }
}

document.getElementById("loadMoreRepliesBtn").onclick = renderMoreReplies;

/* POST REPLY */
document.getElementById("replyBtn").onclick = async () => {
  const text = document.getElementById("replyInput").value;
  const file = document.getElementById("replyImage").files[0];

  let img = "";

  if(file){
    const reader = new FileReader();
    reader.onload = async e => {
      img = e.target.result;

      await addDoc(collection(db,"replies"),{
        postId,
        author: currentUser || "Anonymous",
        content: text.slice(0,8000),
        image: img,
        time: Date.now()
      });

      loadReplies();
    };
    reader.readAsDataURL(file);
    return;
  }

  await addDoc(collection(db,"replies"),{
    postId,
    author: currentUser || "Anonymous",
    content: text.slice(0,8000),
    image: "",
    time: Date.now()
  });

  loadReplies();
};

/* DELETE MODAL */
window.openDelete = function(type,id){
  deleteType = type;
  deleteTarget = id;

  document.getElementById("deleteText").innerText =
    `Delete this ${type}?`;

  document.getElementById("deleteModal").style.display = "flex";
};

document.getElementById("cancelDelete").onclick = () => {
  deleteTarget = null;
  document.getElementById("deleteModal").style.display = "none";
};

document.getElementById("confirmDelete").onclick = async () => {
  if(deleteType === "post"){
    await deleteDoc(doc(db,"posts",deleteTarget));
    location.href = "forums/general.html";
  }

  if(deleteType === "reply"){
    await deleteDoc(doc(db,"replies",deleteTarget));
    loadReplies();
  }

  document.getElementById("deleteModal").style.display = "none";
};

/* INIT */
loadPost();
loadReplies();
</script>

</body>
</html>
