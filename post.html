<!DOCTYPE html>
<html>
<head>
  <title>Post Thread</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    nav a { color: cyan; margin-right:10px; text-decoration:none; }
    button { margin-top:5px; padding:5px 10px; cursor:pointer; }
    textarea { width:100%; height:80px; background:#222; color:white; border:none; padding:5px; }
    .post { border:1px solid #444; padding:10px; margin:10px 0; }
    .reply { border-left:2px solid #888; margin:5px 0; padding-left:10px; }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back to General</a>

<h2>Post</h2>
<div id="post">Loading...</div>

<h3>Replies</h3>
<div id="repliesContainer">Loading replies...</div>

<h3>Add Reply</h3>
<textarea id="replyInput" placeholder="Write your reply..."></textarea>
<br>
<button id="replyButton">Reply</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(window.location.search);
const postId = params.get("id");

// AUTH STATE
let currentUser = null;
let currentAdmin = false;
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

onAuthStateChanged(auth, (user) => {
  if(user){
    currentUser = user.email.replace("@fake.com","");
    currentAdmin = user?.admin || false;

    accountLink.innerText = "Profile";
    accountLink.href = "profile.html";
    logoutBtn.style.display = "inline";
  } else {
    currentUser = null;
    currentAdmin = false;
    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "signin.html";
    logoutBtn.style.display = "none";
  }
});

// LOGOUT
logoutBtn.onclick = async () => {
  await signOut(auth);
  currentUser = null;
  currentAdmin = false;
  alert("Logged out");
  window.location.href = "index.html";
};

// LOAD POST
async function loadPost(){
  const postDiv = document.getElementById("post");
  if(!postId){ postDiv.innerHTML = "No post ID provided."; return; }

  try {
    const docRef = doc(db, "posts", postId);
    const docSnap = await getDoc(docRef);

    if(!docSnap.exists()){ postDiv.innerHTML = "Post not found."; return; }

    const post = docSnap.data();
    const date = new Date(post.time).toLocaleString();

    let deleteButton = "";
    if(currentUser === post.author || currentAdmin){
      deleteButton = `<button onclick="deletePost('${postId}')">Delete Post</button>`;
    }

    postDiv.innerHTML = `
      <div class="post">
        <b>${post.author}</b>: ${post.content}<br>
        <span style="font-size:12px;color:#aaa;">${date}</span><br>
        ${deleteButton}
      </div>
    `;
  } catch(e){
    console.error(e);
    postDiv.innerHTML = "Error loading post.";
  }
}

// DELETE POST
window.deletePost = async function(id){
  if(!confirm("Delete this post?")) return;
  try {
    await deleteDoc(doc(db,"posts",id));
    alert("Post deleted");
    window.location.href = "forums/general.html";
  } catch(e){ alert("Error deleting post: " + e.message); }
}

// LOAD REPLIES (newest first)
async function loadReplies(){
  const repliesDiv = document.getElementById("repliesContainer");
  repliesDiv.innerHTML = "Loading replies...";

  try {
    const snapshot = await getDocs(query(collection(db,"replies"), where("postId","==",postId)));
    if(snapshot.empty){ repliesDiv.innerHTML="<p>No replies yet.</p>"; return; }

    const replies = snapshot.docs.map(docSnap => ({id: docSnap.id, ...docSnap.data()}));
    replies.sort((a,b)=>b.time - a.time); // newest first

    repliesDiv.innerHTML="";
    replies.forEach(reply=>{
      const date = new Date(reply.time).toLocaleString();
      let deleteButton = "";
      if(currentUser === reply.author || currentAdmin){
        deleteButton = `<button onclick="deleteReply('${reply.id}')">Delete</button>`;
      }

      const div = document.createElement("div");
      div.className="reply";
      div.innerHTML = `
        <b>${reply.author}</b>: ${reply.content}<br>
        <span style="font-size:12px;color:#aaa;">${date}</span><br>
        ${deleteButton}
      `;
      repliesDiv.appendChild(div);
    });
  } catch(e){
    console.error(e);
    repliesDiv.innerHTML="Error loading replies.";
  }
}

// DELETE REPLY
window.deleteReply = async function(id){
  if(!confirm("Delete this reply?")) return;
  try {
    await deleteDoc(doc(db,"replies",id));
    loadReplies();
  } catch(e){ alert("Error deleting reply: "+e.message); }
}

// POST REPLY
document.getElementById("replyButton").addEventListener("click", async ()=>{
  const text = document.getElementById("replyInput").value.trim();
  if(!text){ alert("Enter reply"); return; }

  if(!currentUser){ alert("You must be logged in to reply."); return; }

  try {
    await addDoc(collection(db,"replies"),{
      postId,
      author: currentUser,
      content: text,
      time: Date.now()
    });
    document.getElementById("replyInput").value="";
    loadReplies();
  } catch(e){
    console.error(e);
    alert("Error posting: "+e.message);
  }
});

loadPost();
loadReplies();
</script>
</body>
</html>
