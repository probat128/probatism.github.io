<!DOCTYPE html>
<html>
<head>
  <title>Post Thread</title>

  <style>
    body {
      font-family: Arial;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      padding: 20px;
    }

    nav a {
      color: rgb(91,46,97);
      margin-right: 10px;
      text-decoration: none;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      cursor: pointer;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
    }

    textarea {
      width: 100%;
      height: 80px;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
      padding: 5px;
      resize: vertical;
    }

    /* POSTS + REPLIES */
    .postBox {
      border: 1px solid rgb(91,46,97);
      padding: 10px;
      margin: 10px 0;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .replyBox {
      border: 1px solid rgb(91,46,97);
      padding: 10px;
      margin: 10px 0;
      margin-left: 20px;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .meta {
      font-size: 12px;
      opacity: 0.8;
    }

    /* PROFILE PIC (SQUARE ONLY) */
    .pfp {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border: 1px solid rgb(91,46,97);
      margin-right: 8px;
      vertical-align: middle;
    }

    /* IMAGES */
    .postImage {
      max-width: 256px;
      max-height: 256px;
      cursor: pointer;
      display: block;
      margin-top: 5px;
      border: 1px solid rgb(91,46,97);
    }

    /* FULLSCREEN IMAGE VIEWER */
    #imgModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #imgModal img {
      max-width: 90%;
      max-height: 90%;
      border: 2px solid white;
    }

    /* CUSTOM MODAL (NO BROWSER UI) */
    #modalBg {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(232,224,207,0.9);
      justify-content: center;
      align-items: center;
      z-index: 9998;
    }

    #modalBox {
      background: rgb(232,224,207);
      border: 2px solid rgb(91,46,97);
      padding: 20px;
      width: 300px;
      text-align: center;
    }

    .modalBtn {
      margin: 5px;
      padding: 5px 10px;
      border: 1px solid rgb(91,46,97);
      cursor: pointer;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
    }

    .danger {
      background: rgb(91,46,97);
      color: rgb(232,224,207);
    }

    /* READ MORE */
    .readMore {
      cursor: pointer;
      font-size: 12px;
      text-decoration: underline;
      display: inline-block;
      margin-top: 5px;
    }

    /* LOAD MORE */
    #loadMoreBtn {
      margin-top: 10px;
    }

  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back</a>

<h2>Post</h2>
<div id="post">Loading...</div>

<h3>Replies</h3>
<div id="replies"></div>

<button id="loadMoreRepliesBtn">Load More Replies</button>

<h3>Add Reply</h3>

<input type="file" id="replyImage" accept="image/*">
<br><br>

<textarea id="replyInput" placeholder="Write reply..."></textarea>
<br>
<button id="replyButton">Reply</button>

<!-- IMAGE VIEWER -->
<div id="imgModal" onclick="closeImg()">
  <img id="fullImg">
</div>

<!-- CUSTOM MODAL -->
<div id="modalBg">
  <div id="modalBox">
    <div id="modalText"></div>
    <button class="modalBtn danger" id="modalYes">Yes</button>
    <button class="modalBtn" id="modalNo">No</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  deleteDoc,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ================= STATE ================= */

const postId = new URLSearchParams(location.search).get("id");

let currentUser = null;
let deleteTarget = null;
let deleteType = null;

let replyLimit = 10;

/* ================= UI ================= */

const modalBg = document.getElementById("modalBg");
const modalText = document.getElementById("modalText");

function showModal(text, yesCb) {
  modalText.innerText = text;
  modalBg.style.display = "flex";

  document.getElementById("modalYes").onclick = () => {
    modalBg.style.display = "none";
    yesCb();
  };

  document.getElementById("modalNo").onclick = () => {
    modalBg.style.display = "none";
  };
}

/* IMAGE MODAL */
window.openImg = function(src){
  document.getElementById("imgModal").style.display = "flex";
  document.getElementById("fullImg").src = src;
};

window.closeImg = function(){
  document.getElementById("imgModal").style.display = "none";
};

/* ================= AUTH ================= */

onAuthStateChanged(auth, (user) => {
  if(user){
    currentUser = user.email.replace("@fake.com","");
    document.getElementById("accountLink").innerText = "Profile";
    document.getElementById("accountLink").href = "profile.html";
  } else {
    currentUser = null;
  }
});

/* ================= LOAD POST ================= */

async function loadPost(){
  const div = document.getElementById("post");

  const snap = await getDoc(doc(db,"posts",postId));
  if(!snap.exists()){
    div.innerHTML = "Post not found";
    return;
  }

  const p = snap.data();

  let img = p.image
    ? `<img class="postImage" onclick="openImg('${p.image}')" src="${p.image}">`
    : "";

  div.innerHTML = `
    <div class="postBox">
      <b>${p.author}</b><br>
      <div>${formatText(p.content || "")}</div>
      ${img}
    </div>
  `;
}

/* ================= LOAD REPLIES ================= */

async function loadReplies(){
  const div = document.getElementById("replies");

  const q = query(collection(db,"replies"), where("postId","==",postId));
  const snap = await getDocs(q);

  let replies = snap.docs.map(d => ({id:d.id,...d.data()}));

  replies.sort((a,b)=>b.time - a.time);

  replies = replies.slice(0, replyLimit);

  div.innerHTML = "";

  replies.forEach(r => {

    let img = r.image
      ? `<img class="postImage" onclick="openImg('${r.image}')" src="${r.image}">`
      : "";

    let pfp = r.pfp
      ? `<img class="pfp" src="${r.pfp}">`
      : "";

    let box = document.createElement("div");
    box.className = "replyBox";

    box.innerHTML = `
      ${pfp}<b>${r.author}</b><br>
      <div>${formatText(r.content || "")}</div>
      ${img}
      <div class="meta">${new Date(r.time).toLocaleString()}</div>
    `;

    if(currentUser === r.author){
      let btn = document.createElement("button");
      btn.innerText = "Delete";
      btn.onclick = () => {
        showModal("Delete this reply?", async () => {
          await deleteDoc(doc(db,"replies",r.id));
          loadReplies();
        });
      };
      box.appendChild(btn);
    }

    div.appendChild(box);
  });
}

/* ================= LOAD MORE ================= */

document.getElementById("loadMoreRepliesBtn").onclick = () => {
  replyLimit += 10;
  loadReplies();
};

/* ================= POST REPLY ================= */

document.getElementById("replyButton").onclick = async () => {

  const text = document.getElementById("replyInput").value.trim();
  const file = document.getElementById("replyImage").files[0];

  if(!text && !file) return;

  let image = null;

  if(file){
    image = await toBase64(file);
  }

  await addDoc(collection(db,"replies"),{
    postId,
    author: currentUser || "Anonymous",
    content: text,
    image,
    time: Date.now()
  });

  document.getElementById("replyInput").value = "";
  document.getElementById("replyImage").value = "";

  loadReplies();
};

/* ================= TEXT FORMAT + READ MORE ================= */

function formatText(text){

  if(text.length <= 400){
    return `<div style="white-space:pre-wrap">${text}</div>`;
  }

  const short = text.slice(0,400);

  const id = Math.random().toString(36);

  return `
    <div>
      <div id="t-${id}" style="white-space:pre-wrap">${short}...</div>
      <span class="readMore" onclick="
        document.getElementById('t-${id}').innerText = \`${text.replaceAll('`','')}\`;
        this.style.display='none';
      ">Read more</span>
    </div>
  `;
}

/* ================= BASE64 ================= */

function toBase64(file){
  return new Promise(res=>{
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}

/* ================= INIT ================= */

loadPost();
loadReplies();

</script>
</body>
</html>
