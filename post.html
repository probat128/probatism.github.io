<!DOCTYPE html>
<html>
<head>
  <title>View Post</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    .post, .reply { border:1px solid #444; padding:10px; margin:10px 0; }
    .subforum { color:orange; font-size:12px; }
    .time { color:#aaa; font-size:12px; }
    img { max-width:200px; display:block; margin-top:5px; }
    textarea { width:80%; height:60px; }
    button { margin-top:5px; padding:5px 10px; cursor:pointer; }
  </style>
</head>
<body>

<a href="forums.html">Back to Forums</a>
<h1>Post</h1>

<div id="postDiv">Loading...</div>

<h3>Reply</h3>
<textarea id="replyText" placeholder="Write a reply..."></textarea><br>
<input type="file" id="replyImage" accept="image/*"><br>
<button id="replyBtn">Post Reply</button>

<h2>Replies</h2>
<div id="repliesDiv">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const username = localStorage.getItem("currentUser") || "Anonymous";

// Get postId from URL
const params = new URLSearchParams(window.location.search);
const postId = params.get("id");

// Load post
async function loadPost(){
  const postSnap = await getDoc(doc(db, "posts", postId));
  const postDiv = document.getElementById("postDiv");

  if(!postSnap.exists()){ postDiv.innerHTML="Post not found"; return; }

  const post = postSnap.data();
  const date = new Date(post.time).toLocaleString();

  postDiv.innerHTML = `
    <div class="post">
      <div class="subforum">[${post.subforum}]</div>
      <div><b>${post.author}:</b> ${post.content || ""} ${post.image ? `<img src="${post.image}">` : ""}</div>
      <div class="time">Posted: ${date}</div>
    </div>
  `;
}

// Load replies
async function loadReplies(){
  const repliesDiv = document.getElementById("repliesDiv");
  const repliesQuery = query(
    collection(db, "replies"),
    where("postId", "==", postId),
    orderBy("time","desc")
  );
  const repliesSnap = await getDocs(repliesQuery);

  if(repliesSnap.empty){ repliesDiv.innerHTML = "<p>No replies yet.</p>"; return; }

  let html = "";
  repliesSnap.forEach(docSnap=>{
    const reply = docSnap.data();
    const date = new Date(reply.time).toLocaleString();
    html += `
      <div class="reply">
        <div class="subforum">[${reply.subforum} (reply)]</div>
        <div><b>${reply.author}:</b> ${reply.content || ""} ${reply.image ? `<img src="${reply.image}">` : ""}</div>
        <div class="time">Posted: ${date}</div>
      </div>
    `;
  });

  repliesDiv.innerHTML = html;
}

// Post a reply
document.getElementById("replyBtn").addEventListener("click", async ()=>{
  const text = document.getElementById("replyText").value.trim();
  const file = document.getElementById("replyImage").files[0];
  if(!text && !file){ alert("Write text or select an image"); return; }

  let imageUrl = "";
  if(file){
    const storageRef = ref(storage,"images/"+Date.now()+"_"+file.name);
    await uploadBytes(storageRef,file);
    imageUrl = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db,"replies"),{
    postId,
    subforum:"General",
    author:username,
    content:text,
    image:imageUrl,
    time:Date.now()
  });

  document.getElementById("replyText").value="";
  document.getElementById("replyImage").value="";
  loadReplies();
});

// Run loaders
loadPost();
loadReplies();
</script>

</body>
</html>
