<!DOCTYPE html>
<html>
<head>
  <title>Post Thread</title>

  <style>
    body {
      font-family: Arial;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      padding: 20px;
    }

    nav a {
      color: rgb(91,46,97);
      margin-right: 10px;
      text-decoration: none;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      cursor: pointer;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
    }

    textarea {
      width: 100%;
      height: 80px;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border: 1px solid rgb(91,46,97);
      padding: 5px;
    }

    /* POSTS */
    .postBox {
      border: 1px solid rgb(91,46,97);
      padding: 10px;
      margin: 10px 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    .replyBox {
      border: 1px solid rgba(91,46,97,0.6);
      padding: 10px;
      margin: 10px 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    .profilePic {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border: 1px solid rgb(91,46,97);
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }

    .usernameLine {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
    }

    .time {
      font-size: 11px;
      opacity: 0.8;
    }

    .imgThumb {
      max-width: 256px;
      max-height: 256px;
      cursor: pointer;
      display: block;
      margin-top: 5px;
      border: 1px solid rgb(91,46,97);
    }

    /* MODAL UI (NO BROWSER UI ANYWHERE) */
    .modal-bg {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(232,224,207,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal {
      background: rgb(232,224,207);
      border: 2px solid rgb(91,46,97);
      padding: 20px;
      width: 320px;
      text-align: center;
    }

    .modal button {
      margin: 5px;
    }

    /* READ MORE */
    .readMore {
      cursor: pointer;
      font-size: 12px;
      text-decoration: underline;
      display: inline-block;
      margin-top: 5px;
    }

    /* IMAGE VIEWER */
    #imgViewer img {
      max-width: 90vw;
      max-height: 90vh;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back</a>

<h2>Post</h2>
<div id="post">Loading...</div>

<h3>Replies</h3>
<div id="replies"></div>
<button id="loadMoreReplies">Load More Replies</button>

<h3>Add Reply</h3>

<input type="file" id="replyImg">
<textarea id="replyInput" placeholder="Write reply..."></textarea>
<button id="replyBtn">Reply</button>

<!-- DELETE MODAL -->
<div id="modalBg" class="modal-bg">
  <div class="modal">
    <p id="modalText"></p>
    <button id="confirmBtn">Yes</button>
    <button id="cancelBtn">No</button>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div id="imgViewer" class="modal-bg">
  <img id="fullImg">
</div>

<script type="module">
import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJQ",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const postId = new URLSearchParams(location.search).get("id");

let currentUser = null;
let deleteTarget = null;
let deleteType = null;

const modalBg = document.getElementById("modalBg");
const modalText = document.getElementById("modalText");

const imgViewer = document.getElementById("imgViewer");
const fullImg = document.getElementById("fullImg");

/* AUTH */
onAuthStateChanged(auth, (user) => {
  if(user){
    currentUser = user.email.replace("@fake.com","");
  } else {
    currentUser = null;
  }
});

/* MODAL */
function showModal(text, cb){
  modalText.innerText = text;
  modalBg.style.display = "flex";

  document.getElementById("confirmBtn").onclick = () => {
    modalBg.style.display = "none";
    cb(true);
  };

  document.getElementById("cancelBtn").onclick = () => {
    modalBg.style.display = "none";
    cb(false);
  };
}

/* IMAGE VIEW */
function openImg(src){
  fullImg.src = src;
  imgViewer.style.display = "flex";
}
imgViewer.onclick = () => imgViewer.style.display = "none";

/* TEXT FORMAT */
function formatText(text){
  if(!text) return "";
  return text.replace(/\n/g,"<br>");
}

/* READ MORE */
function shortText(text, id){
  if(!text) return "";
  if(text.length <= 400) return formatText(text);

  return `
    <span id="t-${id}">${formatText(text.slice(0,400))}...</span>
    <span class="readMore" onclick="expandText('${id}', \`${text.replace(/`/g,"")}\`)">Read more</span>
  `;
}

window.expandText = function(id, full){
  document.getElementById("t-"+id).innerHTML = formatText(full);
}

/* LOAD POST */
async function loadPost(){
  const div = document.getElementById("post");
  const snap = await getDoc(doc(db,"posts",postId));
  if(!snap.exists()) return;

  const p = snap.data();

  const userDoc = await getDoc(doc(db,"users",p.author));
  const pic = userDoc.exists() ? userDoc.data().profilePic : null;

  div.innerHTML = `
    <div class="postBox">
      <div class="usernameLine">
        ${pic ? `<img class="profilePic" src="${pic}">` : ""}
        ${p.author}
      </div>

      ${p.image ? `<img class="imgThumb" src="${p.image}" onclick="window.openImg(this.src)">` : ""}

      <div>${shortText(p.content,"post")}</div>

      <div class="time">${new Date(p.time).toLocaleString()}</div>
    </div>
  `;
}

/* REPLIES PAGINATION */
let replyLimit = 10;
let allReplies = [];

async function loadReplies(){
  const div = document.getElementById("replies");

  const snap = await getDocs(query(collection(db,"replies"), where("postId","==",postId)));

  allReplies = snap.docs.map(d => ({id:d.id,...d.data()}))
    .sort((a,b)=>b.time-a.time);

  renderReplies();
}

function renderReplies(){
  const div = document.getElementById("replies");

  const shown = allReplies.slice(0, replyLimit);

  div.innerHTML = "";

  shown.forEach(r => {
    const box = document.createElement("div");
    box.className = "replyBox";

    box.innerHTML = `
      <b>${r.author}</b><br>

      ${r.image ? `<img class="imgThumb" src="${r.image}" onclick="window.openImg(this.src)">` : ""}

      <div>${shortText(r.content,r.id)}</div>

      <div class="time">${new Date(r.time).toLocaleString()}</div>
    `;

    if(currentUser === r.author){
      const del = document.createElement("button");
      del.innerText = "Delete";
      del.onclick = () => {
        showModal("Delete this reply?", async (ok)=>{
          if(ok){
            await deleteDoc(doc(db,"replies",r.id));
            loadReplies();
          }
        });
      };
      box.appendChild(del);
    }

    div.appendChild(box);
  });
}

/* LOAD MORE */
document.getElementById("loadMoreReplies").onclick = () => {
  replyLimit += 10;
  renderReplies();
};

/* POST REPLY */
document.getElementById("replyBtn").onclick = async () => {
  const text = document.getElementById("replyInput").value.trim();
  const file = document.getElementById("replyImg").files[0];

  if(!text && !file) return;

  let img = null;

  if(file){
    const reader = new FileReader();
    reader.onload = async (e) => {
      img = e.target.result;

      await addDoc(collection(db,"replies"),{
        postId,
        author: currentUser || "Anonymous",
        content: text,
        image: img,
        time: Date.now()
      });

      loadReplies();
    };
    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db,"replies"),{
      postId,
      author: currentUser || "Anonymous",
      content: text,
      time: Date.now()
    });

    loadReplies();
  }

  document.getElementById("replyInput").value = "";
};

/* DELETE POST */
window.deletePost = function(){
  showModal("Delete this post?", async (ok)=>{
    if(ok){
      await deleteDoc(doc(db,"posts",postId));
      location.href="forums/general.html";
    }
  });
};

/* IMAGE VIEW GLOBAL */
window.openImg = openImg;

/* INIT */
loadPost();
loadReplies();

</script>
</body>
</html>
