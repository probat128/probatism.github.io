<!DOCTYPE html>
<html>
<head>
  <title>Post Thread</title>

  <style>
    body {
      font-family: Arial;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      padding:20px;
    }

    nav a {
      color: rgb(91,46,97);
      margin-right:10px;
      text-decoration:none;
    }

    textarea {
      width:100%;
      height:80px;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border:1px solid rgb(91,46,97);
      padding:5px;
    }

    button {
      margin-top:5px;
      padding:5px 10px;
      cursor:pointer;
      background: rgb(232,224,207);
      color: rgb(91,46,97);
      border:1px solid rgb(91,46,97);
    }

    .postBox {
      border:1px solid rgb(91,46,97);
      padding:10px;
      margin:10px 0;
    }

    .replyBox {
      border:1px solid rgb(91,46,97);
      padding:8px;
      margin:8px 0;
      display:flex;
      gap:10px;
      align-items:flex-start;
    }

    .avatar {
      width:32px;
      height:32px;
      object-fit:cover;
      border:1px solid rgb(91,46,97);
      flex-shrink:0;
    }

    .contentWrap {
      flex:1;
      min-width:0;
    }

    .time {
      font-size:11px;
      opacity:0.7;
      margin-top:4px;
    }

    .readMore {
      cursor:pointer;
      font-size:12px;
      text-decoration:underline;
    }

    .deleteBtn {
      font-size:12px;
      margin-left:5px;
      padding:2px 6px;
    }

    .imgThumb {
      max-width:256px;
      max-height:256px;
      cursor:pointer;
      border:1px solid rgb(91,46,97);
      margin-top:5px;
    }

    /* FULLSCREEN IMAGE */
    .imgOverlay {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .imgOverlay img {
      max-width:90%;
      max-height:90%;
    }

    /* MODAL */
    .modal-bg {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(232,224,207,0.8);
      justify-content:center;
      align-items:center;
      z-index:10000;
    }

    .modal-content {
      background:rgb(232,224,207);
      border:2px solid rgb(91,46,97);
      padding:20px;
      width:300px;
      text-align:center;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back to General</a>

<h2>Post</h2>
<div id="post">Loading...</div>

<h3>Replies</h3>
<div id="repliesContainer">Loading...</div>

<h3>Add Reply</h3>
<textarea id="replyInput" placeholder="Write reply... (8000 max)"></textarea>
<br>
<input type="file" id="replyImg" accept="image/*">
<br>
<button id="replyButton">Reply</button>

<!-- IMAGE VIEWER -->
<div class="imgOverlay" id="imgOverlay">
  <img id="fullImg">
</div>

<!-- DELETE MODAL -->
<div class="modal-bg" id="deleteModal">
  <div class="modal-content">
    <p id="deleteText"></p>
    <button id="confirmDelete">Delete</button>
    <button id="cancelDelete">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc, getDoc,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const postId = new URLSearchParams(window.location.search).get("id");

let currentUser = null;
let deleteTarget = null;

const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

/* AUTH */
onAuthStateChanged(auth,(user)=>{
  if(user){
    currentUser = user.email.replace("@fake.com","");
    accountLink.innerText="Profile";
    accountLink.href="profile.html";
  } else {
    currentUser = null;
    accountLink.innerText="Sign In / Sign Up";
    accountLink.href="signin.html";
  }
});

/* LOGOUT */
logoutBtn.onclick = async ()=>{
  await signOut(auth);
  window.location.href="index.html";
};

/* IMAGE VIEWER */
const overlay = document.getElementById("imgOverlay");
const fullImg = document.getElementById("fullImg");

window.showImg = (src)=>{
  fullImg.src = src;
  overlay.style.display="flex";
};

overlay.onclick=()=> overlay.style.display="none";

/* READ MORE (FIXED) */
function makeText(text){
  const limit = 400;
  if(!text) return "";

  if(text.length <= limit) return text;

  const id = Math.random().toString(36).slice(2);

  return `
    <span id="t_${id}">
      ${text.slice(0,limit)}...
      <span class="readMore" onclick="
        document.getElementById('full_${id}').style.display='inline';
        document.getElementById('t_${id}').style.display='none';
      ">read more</span>
    </span>
    <span id="full_${id}" style="display:none">${text}</span>
  `;
}

/* LOAD POST */
async function loadPost(){
  const snap = await getDoc(doc(db,"posts",postId));
  const post = snap.data();

  document.getElementById("post").innerHTML = `
    <div class="postBox">
      <b>${post.author}</b><br>
      ${makeText(post.content || "")}
      ${post.image ? `<br><img class="imgThumb" src="${post.image}" onclick="showImg(this.src)">` : ""}
    </div>
  `;
}

/* LOAD REPLIES */
async function loadReplies(){
  const snap = await getDocs(query(collection(db,"replies"), where("postId","==",postId)));

  const div = document.getElementById("repliesContainer");
  div.innerHTML="";

  snap.forEach(d=>{
    const r = d.data();

    const el = document.createElement("div");
    el.className="replyBox";

    const canDelete = currentUser === r.author;

    el.innerHTML = `
      <div class="contentWrap">
        <b>${r.author}</b><br>
        ${makeText(r.content || "")}
        ${r.image ? `<br><img class="imgThumb" src="${r.image}" onclick="showImg(this.src)">` : ""}
        <div class="time">${new Date(r.time).toLocaleString()}</div>
        ${canDelete ? `<button class="deleteBtn" onclick="openDelete('${d.id}')">Delete</button>` : ""}
      </div>
    `;

    div.appendChild(el);
  });
}

/* DELETE MODAL */
const modal = document.getElementById("deleteModal");
const deleteText = document.getElementById("deleteText");

window.openDelete = (id)=>{
  deleteTarget = id;
  deleteText.innerText="Are you sure you want to delete this reply?";
  modal.style.display="flex";
};

document.getElementById("cancelDelete").onclick=()=>{
  modal.style.display="none";
  deleteTarget=null;
};

document.getElementById("confirmDelete").onclick=async()=>{
  if(deleteTarget){
    await deleteDoc(doc(db,"replies",deleteTarget));
    deleteTarget=null;
    modal.style.display="none";
    loadReplies();
  }
};

/* IMAGE TO BASE64 */
function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

/* POST REPLY (FULL RESTORE) */
document.getElementById("replyButton").onclick=async()=>{
  const text=document.getElementById("replyInput").value.trim();
  const file=document.getElementById("replyImg").files[0];

  if(!text && !file){ alert("Empty reply"); return; }

  if(text.length > 8000){
    alert("Reply too long (8000 max)");
    return;
  }

  const img = file ? await toBase64(file) : null;

  await addDoc(collection(db,"replies"),{
    postId,
    author: currentUser || "Anonymous",
    content:text,
    image:img,
    time:Date.now()
  });

  document.getElementById("replyInput").value="";
  loadReplies();
};

loadPost();
loadReplies();
</script>

</body>
</html>
