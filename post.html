<!DOCTYPE html>
<html>
<head>
  <title>Post Page</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    nav a { color: cyan; margin-right:10px; text-decoration:none; }
    button { margin-top:5px; padding:5px 10px; cursor:pointer; }
    textarea { width:100%; height:80px; background:#222; color:white; border:none; padding:5px; }
    .post, .reply { border:1px solid #444; padding:10px; margin:10px 0; }
    .reply { margin-left:20px; }
  </style>
</head>
<body>

<nav>
  <a href="../index.html">Home</a>
  <a href="../forums.html">Forums</a>
  <a href="../signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn" style="display:none;">Logout</button>
</nav>

<h1>Post</h1>

<div id="postContainer">Loading post...</div>

<h3>Replies</h3>
<div id="repliesContainer">Loading replies...</div>

<h3>Add Reply</h3>
<textarea id="replyText" placeholder="Write your reply..."></textarea><br>
<button id="replyButton">Post Reply</button>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc, getDocs, query, where, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

// INITIALIZE FIREBASE APP ONCE
const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
const db = getFirestore(app);
const auth = getAuth(app);

const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");
let currentUser = null;

// GET POST ID FROM URL
const urlParams = new URLSearchParams(window.location.search);
const postId = urlParams.get("id");

if (!postId) {
  alert("No post specified");
  window.location.href = "../general.html";
}

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user.email.replace("@fake.com", "");
    accountLink.innerText = "Profile";
    accountLink.href = "../profile.html";
    logoutBtn.style.display = "inline";
  } else {
    currentUser = null;
    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "../signin.html";
    logoutBtn.style.display = "none";
  }

  // Load post & replies once auth state is known
  loadPost();
  loadReplies();
});

// LOGOUT
logoutBtn.onclick = async () => {
  try {
    await signOut(auth);
    currentUser = null;
    alert("Logged out");
    window.location.href = "../index.html";
  } catch(e) {
    alert("Error logging out");
  }
};

// LOAD POST
async function loadPost() {
  const postContainer = document.getElementById("postContainer");
  try {
    const postDoc = await getDoc(doc(db, "posts", postId));
    if (!postDoc.exists()) {
      postContainer.innerHTML = "Post not found.";
      return;
    }
    const post = postDoc.data();
    const date = new Date(post.time).toLocaleString();
    postContainer.innerHTML = `
      <div class="post">
        <b>${post.author}:</b> ${post.content}<br>
        <span style="font-size:12px;color:#aaa;">${date}</span>
      </div>
    `;
  } catch(err) {
    postContainer.innerHTML = "Error loading post.";
  }
}

// LOAD REPLIES
async function loadReplies() {
  const repliesDiv = document.getElementById("repliesContainer");
  repliesDiv.innerHTML = "Loading replies...";
  try {
    const q = query(
      collection(db, "replies"),
      where("postId", "==", postId),
      orderBy("time", "asc")
    );

    const snapshot = await getDocs(q);
    if (snapshot.empty) {
      repliesDiv.innerHTML = "<p>No replies yet.</p>";
      return;
    }

    repliesDiv.innerHTML = "";
    snapshot.forEach(docSnap => {
      const reply = docSnap.data();
      const date = new Date(reply.time).toLocaleString();
      const div = document.createElement("div");
      div.className = "reply";
      div.innerHTML = `<b>${reply.author}:</b> ${reply.content}<br>
                       <span style="font-size:12px;color:#aaa;">${date}</span>`;
      repliesDiv.appendChild(div);
    });
  } catch(err) {
    repliesDiv.innerHTML = "Error loading replies.";
  }
}

// ADD REPLY
document.getElementById("replyButton").addEventListener("click", async () => {
  const text = document.getElementById("replyText").value.trim();
  if (!text) { alert("Enter text"); return; }

  const username = currentUser ? currentUser : "Anonymous";

  try {
    await addDoc(collection(db, "replies"), {
      postId,
      author: username,
      content: text,
      time: Date.now()
    });
    document.getElementById("replyText").value = "";
    loadReplies();
  } catch(err) {
    if(err.code === "permission-denied"){
      alert("You don’t have permission to reply.");
    } else {
      alert("Something went wrong. Try again.");
    }
  }
});
</script>

</body>
</html>
