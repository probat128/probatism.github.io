<!DOCTYPE html>
<html>
<head>
<title>Post Thread</title>
<style>
body { font-family: Arial; background: rgb(232,224,207); color: rgb(91,46,97); padding:20px; }
nav a { color: rgb(91,46,97); margin-right:10px; text-decoration:none; }
button { margin-top:5px; padding:5px 10px; cursor:pointer; background: rgb(232,224,207); color: rgb(91,46,97); border:1px solid rgb(91,46,97); }
textarea { width:100%; height:80px; background: rgb(232,224,207); color: rgb(91,46,97); border:1px solid rgb(91,46,97); padding:5px; }

.post, .reply {
  border:1px solid rgb(91,46,97);
  padding:10px;
  margin:10px 0;
  display:flex;
  gap:10px;
}

.profile-thumb {
  width:40px;
  height:40px;
  object-fit:cover;
  border:1px solid rgb(91,46,97);
}

.content {
  white-space: pre-wrap;
  word-break: break-word;
}

.post-img {
  max-width:256px;
  max-height:256px;
  margin-top:5px;
  cursor:pointer;
  border:1px solid rgb(91,46,97);
}

.time {
  font-size:12px;
}

/* IMAGE MODAL */
#imgModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
#imgModal img {
  max-width:95%;
  max-height:95%;
}

/* DELETE MODAL */
#deleteModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
.modal-box {
  background: rgb(232,224,207);
  border:2px solid rgb(91,46,97);
  padding:20px;
  text-align:center;
  width:300px;
}
</style>
</head>
<body>

<nav>
<a href="index.html">Home</a>
<a href="doctrine.html">Doctrine</a>
<a href="forums.html">Forums</a>
<a href="news.html">News</a>
<a href="quiz.html">Quiz</a>
<a href="signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn">Logout</button>
</nav>

<br>
<a href="forums/general.html">← Back to General</a>

<h2>Post</h2>
<div id="post">Loading...</div>

<h3>Replies</h3>
<div id="repliesContainer">Loading...</div>

<h3>Add Reply</h3>
<textarea id="replyInput" maxlength="8000"></textarea><br>
<input type="file" id="replyImage" accept="image/*"><br>
<button id="replyButton">Reply</button>

<!-- IMAGE MODAL -->
<div id="imgModal"><img id="modalImg"></div>

<!-- DELETE CONFIRM MODAL -->
<div id="deleteModal">
  <div class="modal-box">
    <p>Are you sure you want to delete this reply?</p>
    <button id="confirmDelete">Delete</button>
    <button id="cancelDelete">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc, getDocs, query, where, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = getApps().length===0 ? initializeApp(firebaseConfig) : getApps()[0];
const db = getFirestore(app);
const auth = getAuth(app);

const postId = new URLSearchParams(window.location.search).get("id");

let currentUser = null;
let deleteTarget = null;

// AUTH
onAuthStateChanged(auth,(user)=>{
  if(user){
    currentUser = user.email.replace("@fake.com","");
    accountLink.innerText = "Profile";
    accountLink.href = "profile.html";
    logoutBtn.style.display = "inline";
  } else {
    currentUser = null;
    accountLink.innerText = "Sign In / Sign Up";
    logoutBtn.style.display = "none";
  }
});

// LOGOUT
logoutBtn.onclick = async ()=>{
  await signOut(auth);
  window.location.href = "index.html";
};

// IMAGE HELPERS
function resizeImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        canvas.width=256;
        canvas.height=256;
        const ctx=canvas.getContext("2d");

        const size=Math.min(img.width,img.height);
        const sx=(img.width-size)/2;
        const sy=(img.height-size)/2;

        ctx.drawImage(img,sx,sy,size,size,0,0,256,256);
        resolve(canvas.toDataURL("image/png"));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function getFullImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

/* ================= POST ================= */
async function loadPost(){
  const div=document.getElementById("post");
  const snap=await getDoc(doc(db,"posts",postId));

  if(!snap.exists()){ div.innerHTML="Post not found"; return; }

  const p=snap.data();
  const date=new Date(p.time).toLocaleString();

  div.innerHTML=`
    <b>${p.author}</b><br>
    ${p.content}<br>
    <span style="font-size:12px;">${date}</span>
  `;
}

/* ================= REPLIES ================= */
async function loadReplies(){
  const container=document.getElementById("repliesContainer");
  container.innerHTML="";

  const snap=await getDocs(query(collection(db,"replies"), where("postId","==",postId)));

  const replies=snap.docs.map(d=>({id:d.id,...d.data()}));
  replies.sort((a,b)=>b.time-a.time);

  for(const r of replies){
    const div=document.createElement("div");
    div.className="reply";

    const date=new Date(r.time).toLocaleString();

    div.innerHTML=`
      <div>
        <b>${r.author}</b><br>
        ${r.content || ""}<br>
        ${r.image ? `<img class="post-img" src="${r.image}">` : ""}
        <br><span style="font-size:12px;">${date}</span>
      </div>
    `;

    // DELETE BUTTON RESTORED
    if(currentUser===r.author){
      const btn=document.createElement("button");
      btn.innerText="Delete";
      btn.onclick=()=>openDelete(r.id);
      div.appendChild(btn);
    }

    container.appendChild(div);
  }

  document.querySelectorAll(".post-img").forEach(img=>{
    img.onclick=()=>{
      modalImg.src=img.src;
      imgModal.style.display="flex";
    };
  });
}

/* ================= REPLY POST ================= */
document.getElementById("replyButton").onclick=async()=>{
  const text=document.getElementById("replyInput").value.trim();
  const file=document.getElementById("replyImage").files[0];

  if(!text && !file){ alert("Add something"); return; }
  if(text.length>8000){ alert("Too long"); return; }

  let image=null, full=null;

  if(file){
    image=await resizeImage(file);
    full=await getFullImage(file);
  }

  await addDoc(collection(db,"replies"),{
    postId,
    author:currentUser||"Anonymous",
    content:text,
    image,
    fullImage:full,
    time:Date.now()
  });

  replyInput.value="";
  replyImage.value="";
  loadReplies();
};

/* ================= DELETE MODAL ================= */
function openDelete(id){
  deleteTarget=id;
  deleteModal.style.display="flex";
}

confirmDelete.onclick=async()=>{
  await deleteDoc(doc(db,"replies",deleteTarget));
  deleteModal.style.display="none";
  loadReplies();
};

cancelDelete.onclick=()=>{
  deleteModal.style.display="none";
  deleteTarget=null;
};

/* ================= IMAGE MODAL ================= */
imgModal.onclick=()=>imgModal.style.display="none";

/* INIT */
loadPost();
loadReplies();
</script>

</body>
</html>
