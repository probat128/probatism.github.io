<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
  <title>Sign In / Sign Up</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    input { width:200px; padding:5px; margin:5px 0; background:#222; color:white; border:none; }
    button { padding:5px 10px; margin:5px 0; cursor:pointer; }
  </style>
</head>
<body>
<h1>Sign In / Sign Up</h1>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<p id="status"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
    authDomain: "probatismm.firebaseapp.com",
    projectId: "probatismm",
    storageBucket: "probatismm.firebasestorage.app",
    messagingSenderId: "746935651152",
    appId: "1:746935651152:web:82491ddac346bc654a3a55"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function signup() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    if(!username || !password){ alert("Enter both"); return; }

    const userRef = doc(db, "users", username);
    const userSnap = await getDoc(userRef);
    if(userSnap.exists()){ alert("Username taken"); return; }

    await setDoc(userRef, { username, password, joinDate: Date.now() });
    localStorage.setItem("currentUser", username);
    alert("Signed up and logged in!");
    window.location.href = "index.html";
  }

  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    if(!username || !password){ alert("Enter both"); return; }

    const userRef = doc(db, "users", username);
    const userSnap = await getDoc(userRef);
    if(!userSnap.exists()){ alert("User not found"); return; }
    if(userSnap.data().password !== password){ alert("Wrong password"); return; }

    localStorage.setItem("currentUser", username);
    alert("Logged in!");
    window.location.href = "index.html";
  }
</script>
</body>
</html>
