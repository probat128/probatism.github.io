<!DOCTYPE html>
<html>
<head>
  <title>Sign In / Sign Up</title>
</head>
<body>
<h1>Sign In / Sign Up</h1>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<p id="status"></p>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function signup() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  if(!username || !password) return alert("Enter both");

  db.collection("users").doc(username).get().then(doc=>{
    if(doc.exists){ alert("Username taken"); return; }
    db.collection("users").doc(username).set({
      username, password, joinDate: Date.now()
    }).then(()=>{
      localStorage.setItem("currentUser", username);
      alert("Signed up and logged in!");
      window.location.href = "index.html"; // go home
    });
  });
}

function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  if(!username || !password) return alert("Enter both");

  db.collection("users").doc(username).get().then(doc=>{
    if(!doc.exists) return alert("User not found");
    if(doc.data().password !== password) return alert("Wrong password");
    localStorage.setItem("currentUser", username);
    alert("Logged in!");
    window.location.href = "index.html";
  });
}
</script>
</body>
</html>
