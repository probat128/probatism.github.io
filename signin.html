<!DOCTYPE html>
<html>
<head>
  <title>Account</title>
  <style>
  body { 
    font-family: Arial; 
    background: rgb(232,224,207); 
    color: rgb(91,46,97); 
    padding:20px; 
  }

  nav a { 
    color: rgb(91,46,97); 
    margin-right:10px; 
    text-decoration:none; 
  }

  button { 
    margin-top:5px; 
    padding:5px 10px; 
    cursor:pointer; 
    background: rgb(232,224,207); 
    color: rgb(91,46,97); 
    border: 1px solid rgb(91,46,97); 
  }

  input { 
    width:250px; 
    padding:5px; 
    margin:5px 0; 
    background: rgb(232,224,207); 
    color: rgb(91,46,97); 
    border:1px solid rgb(91,46,97); 
  }

  .tab { 
    cursor:pointer; 
    margin-right:10px; 
  }

  .active { 
    font-weight:bold; 
    text-decoration:underline; 
  }

  #status {
    margin-top:10px;
    font-weight:bold;
  }

  .success { color: green; }
  .error { color: red; }
  </style>
</head>
<body>

<nav>
<a href="index.html">Home</a>
<a href="doctrine.html">Doctrine</a>
<a href="forums.html">Forums</a>
<a href="news.html">News</a>
<a href="quiz.html">Quiz</a>
<a href="signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn" style="display:none;">Logout</button>
</nav>

<h1 id="title">Sign In</h1>

<p>Access your account or create a new one.</p>

<div style="margin-bottom:10px;">
  <span id="signInTab" class="tab active" onclick="setMode('signin')">Sign In</span>
  <span id="signUpTab" class="tab" onclick="setMode('signup')">Sign Up</span>
</div>

<div>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="submitForm()">Continue</button>
  <p id="passwordHint" style="font-size:12px; opacity:0.6; display:none;">
    Make sure to use a very strong password!
  </p>
</div>

<p id="status"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let mode = "signin";

function showStatus(message, type){
  const status = document.getElementById("status");
  status.innerText = message;
  status.className = type;
}

window.setMode = function(newMode){
  mode = newMode;

  document.getElementById("title").innerText =
    newMode === "signin" ? "Sign In" : "Sign Up";

  document.getElementById("signInTab").classList.toggle("active", newMode === "signin");
  document.getElementById("signUpTab").classList.toggle("active", newMode === "signup");

  const hint = document.getElementById("passwordHint");
  hint.style.display = newMode === "signup" ? "block" : "none";

  showStatus("", "");
}

window.submitForm = async function(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!username || !password){
    showStatus("Enter username and password", "error");
    return;
  }

  const usernameRegex = /^[A-Za-z0-9_]+$/;
  if(!usernameRegex.test(username)){
    showStatus("Username can only contain letters, numbers, and underscores", "error");
    return;
  }
  if(username.length < 3){
    showStatus("Username must be at least 3 characters", "error");
    return;
  }

  if(mode === "signup"){
    const strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$/;
    if(!strongPassword.test(password)){
      showStatus("Password must be 8+ chars, include upper, lower, number, and symbol", "error");
      return;
    }
  }

  const email = username + "@fake.com";
  const userRef = doc(db, "users", username);

  try {
    if(mode === "signup"){
      const userSnap = await getDoc(userRef);
      if(userSnap.exists()){
        showStatus("Username already exists", "error");
        return;
      }

      const userCredential = await createUserWithEmailAndPassword(auth, email, password);

      if(userCredential.user){
         await setDoc(userRef, {
           username: username,
           uid: userCredential.user.uid,
           joinDate: Date.now()
         });
      }

      localStorage.setItem("currentUser", username);
      showStatus("Account created!", "success");

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);
    }

    if(mode === "signin"){
      await signInWithEmailAndPassword(auth, email, password);

      localStorage.setItem("currentUser", username);
      showStatus("Logged in!", "success");

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);
    }

  } catch(err){
      console.error(err);

      if(err.code === "auth/user-not-found"){
        showStatus("Account does not exist", "error");
      }
      else if(err.code === "auth/wrong-password"){
        showStatus("Incorrect password", "error");
      }
      else if(err.code === "auth/invalid-credential"){
        showStatus("Invalid login details (likely wrong password or old account)", "error");
      }
      else{
        showStatus("Error: " + err.message, "error");
      }
  } // <-- THIS closes the try/catch

}; // <-- THIS closes submitForm function properly

// Code below runs on page load, outside submitForm
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

const currentUser = localStorage.getItem("currentUser");

if(currentUser){
  accountLink.innerText = "Profile";
  accountLink.href = "profile.html";
  logoutBtn.style.display = "inline";
} else {
  logoutBtn.style.display = "none";
}

logoutBtn.onclick = function() {
  localStorage.removeItem("currentUser");
  alert("Logged out");
  window.location.href = "index.html";
};
</script>


</body>
</html>
