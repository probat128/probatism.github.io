<!DOCTYPE html>
<html>
<head>
  <title>Account</title>
  <style>
  body { 
    font-family: Arial; 
    background: rgb(232,224,207); 
    color: rgb(91,46,97); 
    padding:20px; 
  }

  nav a { 
    color: rgb(91,46,97); 
    margin-right:10px; 
    text-decoration:none; 
  }

  button { 
    margin-top:5px; 
    padding:5px 10px; 
    cursor:pointer; 
    background: rgb(232,224,207); 
    color: rgb(91,46,97); 
    border: 1px solid rgb(91,46,97); 
  }

  input { 
    width:250px; 
    padding:5px; 
    margin:5px 0; 
    background: rgb(232,224,207); 
    color: rgb(91,46,97); 
    border:1px solid rgb(91,46,97); 
  }

  .tab { 
    cursor:pointer; 
    margin-right:10px; 
  }

  .active { 
    font-weight:bold; 
    text-decoration:underline; 
  }

  #status {
    margin-top:10px;
    font-weight:bold;
  }

  .success { color: green; }
  .error { color: red; }
  </style>
</head>
<body>

<nav>
<a href="index.html">Home</a>
<a href="doctrine.html">Doctrine</a>
<a href="forums.html">Forums</a>
<a href="news.html">News</a>
<a href="quiz.html">Quiz</a>
<a href="signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn" style="display:none;">Logout</button>
</nav>

<h1 id="title">Sign In</h1>

<p>Access your account or create a new one.</p>

<div style="margin-bottom:10px;">
  <span id="signInTab" class="tab active" onclick="setMode('signin')">Sign In</span>
  <span id="signUpTab" class="tab" onclick="setMode('signup')">Sign Up</span>
</div>

<div>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="submitForm()">Continue</button>
  <br><br>
  <button onclick="googleSignIn()">Sign in with Google</button>
  <p id="passwordHint" style="font-size:12px; opacity:0.6; display:none;">
    Make sure to use a very strong password!
  </p>
</div>

<p id="status"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let mode = "signin";

function showStatus(message, type){
  const status = document.getElementById("status");
  status.innerText = message;
  status.className = type;
}

window.setMode = function(newMode){
  mode = newMode;

  document.getElementById("title").innerText =
    newMode === "signin" ? "Sign In" : "Sign Up";

  document.getElementById("signInTab").classList.toggle("active", newMode === "signin");
  document.getElementById("signUpTab").classList.toggle("active", newMode === "signup");

  const hint = document.getElementById("passwordHint");
  hint.style.display = newMode === "signup" ? "block" : "none";

  showStatus("", "");
}

async function generateUniqueUsername(baseName){
  let username = baseName.replace(/\s+/g, "_").replace(/[^A-Za-z0-9_]/g, "");
  
  if(username.length < 3){
    username = "user" + Math.floor(Math.random() * 10000);
  }

  let finalUsername = username;
  let counter = 0;

  while(true){
    const userRef = doc(db, "users", finalUsername);
    const snap = await getDoc(userRef);

    if(!snap.exists()){
      return finalUsername;
    }

    counter++;
    finalUsername = username + Math.floor(Math.random() * 10000);
  }
}

window.submitForm = async function(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!username || !password){
    showStatus("Enter username and password", "error");
    return;
  }

 // <-- THIS closes submitForm function properly

window.googleSignIn = async function(){
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    const usersRef = doc(db, "users", user.uid);
    const existingUser = await getDoc(usersRef);

    let username;

    if(existingUser.exists()){
      username = existingUser.data().username;
    } else {
      username = await generateUniqueUsername(user.displayName || "user");

      await setDoc(doc(db, "users", username), {
        username: username,
        uid: user.uid,
        joinDate: Date.now()
      });

      await setDoc(doc(db, "users", user.uid), {
        username: username
      });
    }

    localStorage.setItem("currentUser", username);

    showStatus("Logged in with Google!", "success");

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1000);

  } catch(err){
    console.error(err);
    showStatus("Google sign-in failed: " + err.message, "error");
  }
};

// Code below runs on page load, outside submitForm
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

const currentUser = localStorage.getItem("currentUser");

if(currentUser){
  accountLink.innerText = "Profile";
  accountLink.href = "profile.html";
  logoutBtn.style.display = "inline";
} else {
  logoutBtn.style.display = "none";
}

logoutBtn.onclick = function() {
  localStorage.removeItem("currentUser");
  alert("Logged out");
  window.location.href = "index.html";
};
</script>


</body>
</html>
