<!DOCTYPE html>
<html>
<head>
  <title>Probatism</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Welcome</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="doctrine.html">Doctrine</a>
    <a href="forums.html">Forums</a>
    <a href="news.html">News</a>
    <a href="quiz.html">Quiz</a>
    <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
    <button id="logoutBtn" style="display:none;">Logout</button>
  </nav>

  <p>This is the home page.</p>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  limit,
  updateDoc,
  doc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

let app;
try {
  app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
} catch(e){
  console.error("Firebase init error:", e);
}

const db = getFirestore(app);
const auth = getAuth(app);

const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

onAuthStateChanged(auth, (user) => {
  if (user) {
    const username = user.email.replace("@fake.com", "");
    localStorage.setItem("currentUser", username);

    accountLink.innerText = "Profile";
    accountLink.href = "profile.html";
    logoutBtn.style.display = "inline";
  } else {
    localStorage.removeItem("currentUser");

    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "signin.html";
    logoutBtn.style.display = "none";
    
  }
    loadAd(
      "box",
      document.getElementById("bottomAdImg"),
      document.getElementById("bottomAdLink")
    );
});

logoutBtn.onclick = function () {
  signOut(auth);
  localStorage.removeItem("currentUser");
  alert("Logged out");
  window.location.href = "index.html";
};

async function loadAd(type, imgEl, linkEl) {
  if (!imgEl || !linkEl) return;
  try {
    const q = query(
      collection(db, "ads"),
      where("type", "==", type),
      where("active", "==", true),
      limit(10)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      imgEl.src = "/probatism.github.io/placeholder-ad.png";
      linkEl.href = "advertise.html";
      return;
    }


    // FILTER OUT ADS WITH 0 IMPRESSIONS
    const validAds = snap.docs.filter(doc => {
      const data = doc.data();
      return typeof data.impressionsLeft === "number" && data.impressionsLeft > 0;
    });

    if (validAds.length === 0) {
      imgEl.src = "/probatism.github.io/placeholder-ad.png";
      linkEl.href = "advertise.html";
      return;
    }

    // RANDOM PICK
    const randomAdDoc = validAds[Math.floor(Math.random() * validAds.length)];
    const ad = randomAdDoc.data();

    imgEl.src = ad.image;

    imgEl.onerror = () => {
      console.log("Ad failed, using placeholder");
      imgEl.src = "/probatism.github.io/placeholder-ad.png";
    };

    linkEl.href = ad.link;

    await updateDoc(doc(db, "ads", randomAdDoc.id), {
      impressionsLeft: increment(-1)
    });

  } catch (err) {
    console.error("Ad load error:", err);

    imgEl.src = "/probatism.github.io/placeholder-ad.png";
    linkEl.href = "advertise.html";
  }
}

</script>

<div id="bottomAdContainer" style="text-align:center; margin-top:20px;">
  <a id="bottomAdLink" href="#">
    <img id="bottomAdImg" style="width:300px; height:250px; border:1px solid rgb(91,46,97);">
  </a>
  <div style="font-size:10px;">
    <a href="advertise.html">Start advertising</a>
  </div>
</div>

</body>
</html>
