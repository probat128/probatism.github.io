<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
</head>
<body>

<h1>Simple Quiz</h1>

<p>Do you like X?</p>
<button onclick="answer(1)">Yes</button>
<button onclick="answer(-1)">No</button>
<button onclick="answer(0)">I don't know</button>

<p id="result"></p>

<script>
let score = 0;

function answer(value) {
  score += value;

  if (score >= 2) {
    document.getElementById("result").innerText = "Result A";
  } else if (score >= 0) {
    document.getElementById("result").innerText = "Result B";
  } else {
    document.getElementById("result").innerText = "Result C";
  }
}
</script>

<script>
  const accountLink = document.getElementById("accountLink");
  const currentUser = localStorage.getItem("currentUser");
  if(currentUser){
      accountLink.innerText = "Profile";
      accountLink.href = "profile.html"; // Profile page you create
  }
</script>

</body>
</html>
