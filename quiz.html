<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>

<style>
body { font-family: Arial; background: rgb(232,224,207); color: rgb(91,46,97); padding:20px; }
nav a { color: rgb(91,46,97); margin-right:10px; text-decoration:none; }

button {
  margin-top:10px;
  padding:10px 18px;
  cursor:pointer;
  background: rgb(91,46,97);
  color: rgb(232,224,207);
  border: none;
}

/* QUIZ BOX */
.quiz-box {
  border:1px solid rgb(91,46,97);
  padding:20px;
  margin-top:20px;
}

/* ANSWERS */
.answer-buttons {
  margin-top:20px;
  display:flex;
  gap:15px;
}

/* PROGRESS BAR */
.progress-container {
  width:100%;
  height:20px;
  border:1px solid rgb(91,46,97);
  margin-top:15px;
  position:relative;
}

.progress-bar {
  height:100%;
  width:0%;
  background: rgb(91,46,97);
  transition: width 0.4s ease;
}

.progress-text {
  margin-top:5px;
  font-size:14px;
}

/* RESULT */
.result-box {
  border:1px solid rgb(91,46,97);
  padding:20px;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<a href="index.html">Home</a>
<a href="doctrine.html">Doctrine</a>
<a href="forums.html">Forums</a>
<a href="news.html">News</a>
<a href="quiz.html">Quiz</a>
<a href="signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn" style="display:none;">Logout</button>
</nav>

<h1>Quiz Title (Placeholder)</h1>

<div id="quizContainer" class="quiz-box">

  <!-- PROGRESS -->
  <div class="progress-container">
    <div id="progressBar" class="progress-bar"></div>
  </div>
  <div id="progressText" class="progress-text">0% complete</div>

  <!-- QUESTION -->
  <h3 id="questionText">Loading...</h3>

  <!-- ANSWERS -->
  <div class="answer-buttons">
    <button onclick="answer(1)">Yes</button>
    <button onclick="answer(0)">I don't know</button>
    <button onclick="answer(-1)">No</button>
  </div>
</div>

<div id="resultContainer" class="result-box" style="display:none;">
  <h2 id="resultTitle"></h2>
  <p id="resultMessage"></p>
  <button onclick="location.reload()">Retake Test</button>
</div>

<script>
// QUESTIONS
const questions = [
  "Is it morally neutral (not good or bad) for someone to have an abortion of a fetus in its first trimester?","Should everyone have the right to end their own life?
","Should illegal immigrants (who are not fleeing from conflict) receive punishment for entering a country illegally?
",
  "Would digital identification for beneficial for society?","Is it impossible for an all-loving, all-powerful, all-seeing god to exist?","Should wealthier individuals have to pay higher taxes (considering tax money would be going to a non-corrupt government)?",
  "Are young black people (under 30) living in The West usually more aggressive than young white people living in The West?","Is homosexuality morally neutral?","Should the purchase of firearms for civilians who won't be using it for a government organisation (e.g. the police) be illegal?",
  "Has religion overall held society back in terms of beneficial development?","Is the age of 18 too low of an age of consent? and/or does the age of consent system need reworking to protect young individuals?","Should the concept of gender roles be abolished?",
  "Should males and females be given the same rights?","Is it incorrect to refer to a biracial person who is half black and half white as just 'black' or just 'white?'?","Can a person truly feel like they were born the opposite sex without the influence of others claiming they feel the same way?
",
  "Do non-white individuals have the ability to be racist?","Should the death penalty never be used?","Placeholder question 18",
  "Placeholder question 19","Placeholder question 20","Placeholder question 21",
  "Placeholder question 22","Placeholder question 23","Placeholder question 24",
  "Placeholder question 25"
];

// RESULTS
const results = [
  { range: [25,25], title:"Placeholder 1 Title", message:"Placeholder 1 Message" },
  { range: [21,24], title:"Placeholder 2 Title", message:"Placeholder 2 Message" },
  { range: [16,20], title:"Placeholder 3 Title", message:"Placeholder 3 Message" },
  { range: [11,15], title:"Placeholder 4 Title", message:"Placeholder 4 Message" },
  { range: [6,10], title:"Placeholder 5 Title", message:"Placeholder 5 Message" },
  { range: [1,5], title:"Placeholder 6 Title", message:"Placeholder 6 Message" },
  { range: [0,0], title:"Placeholder 7 Title", message:"Placeholder 7 Message" },
  { range: [-5,-1], title:"Placeholder 8 Title", message:"Placeholder 8 Message" },
  { range: [-10,-6], title:"Placeholder 9 Title", message:"Placeholder 9 Message" },
  { range: [-15,-11], title:"Placeholder 10 Title", message:"Placeholder 10 Message" },
  { range: [-20,-16], title:"Placeholder 11 Title", message:"Placeholder 11 Message" },
  { range: [-24,-21], title:"Placeholder 12 Title", message:"Placeholder 12 Message" },
  { range: [-25,-25], title:"Placeholder 13 Title", message:"Placeholder 13 Message" }
];

let currentQuestion = 0;
let score = 0;

// INIT
updateQuestion();
updateProgress();

// ANSWER HANDLER
function answer(value){
  score += value;
  currentQuestion++;

  if(currentQuestion >= questions.length){
    showResult();
  } else {
    updateQuestion();
    updateProgress();
  }
}

// UPDATE QUESTION
function updateQuestion(){
  document.getElementById("questionText").innerText = questions[currentQuestion];
}

// UPDATE PROGRESS
function updateProgress(){
  const percent = Math.round((currentQuestion / questions.length) * 100);
  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText = percent + "% complete";
}

// SHOW RESULT
function showResult(){
  document.getElementById("quizContainer").style.display = "none";
  document.getElementById("resultContainer").style.display = "block";

  for(const r of results){
    if(score >= r.range[0] && score <= r.range[1]){
      document.getElementById("resultTitle").innerText = r.title;
      document.getElementById("resultMessage").innerText = r.message;
      break;
    }
  }
}
</script>

<!-- LOGIN / LOGOUT -->
<script>
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

const currentUser = localStorage.getItem("currentUser");

if(currentUser){
  accountLink.innerText = "Profile";
  accountLink.href = "profile.html";
  logoutBtn.style.display = "inline";
} else {
  logoutBtn.style.display = "none";
}

logoutBtn.onclick = function() {
  localStorage.removeItem("currentUser");
  alert("Logged out");
  window.location.href = "index.html";
};
</script>

</body>
</html>
