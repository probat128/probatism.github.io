<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
</head>
<body>

<h1>Sign In</h1>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="guest()">Continue as Guest</button>

<p id="status"></p>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
};

firebase.initializeApp(firebaseConfig);

function signup() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("status").innerText = "Signed up!";
    });
}

function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("status").innerText = "Logged in!";
    });
}

function guest() {
  firebase.auth().signInAnonymously()
    .then(() => {
      document.getElementById("status").innerText = "Guest mode!";
    });
}
</script>

</body>
</html>
