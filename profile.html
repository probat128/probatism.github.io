<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <style>
    body { font-family: Arial; background:#e8e0cf; color:#5b2e61; padding:20px; }
    nav a { color:#5b2e61; margin-right:10px; text-decoration:none; }
    button { margin-top:5px; padding:5px 10px; cursor:pointer; background:#5b2e61; color:#e8e0cf; border:none; }
    button:hover { background:#472351; }

    .profile-pic {
      width:256px;
      height:256px;
      object-fit:cover;
      border:2px solid #5b2e61;
      display:block;
      margin-top:10px;
    }

    .post { border:1px solid #5b2e61; padding:10px; margin:10px 0; }
    .time { color:#5b2e61; font-size:12px; }
    .subforum { color:#5b2e61; font-size:12px; }
    .deleteBtn { background:#5b2e61; color:#e8e0cf; border:none; cursor:pointer; padding:3px 8px; }
    .deleteBtn:hover { background:#472351; }

    #description {
      width:100%;
      height:80px;
      background:#e8e0cf;
      color:#5b2e61;
      border:2px solid #5b2e61;
      padding:5px;
    }

    /* Notification */
    #notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #5b2e61;
      color: #e8e0cf;
      padding: 10px 20px;
      display: none;
      z-index: 1000;
      border: 2px solid #5b2e61;
    }

    /* Delete confirmation modal */
    #deleteModal {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.5);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:2000;
    }
    #deleteModalContent {
      background:#e8e0cf;
      color:#5b2e61;
      padding:20px;
      border:2px solid #5b2e61;
      width:300px;
      text-align:center;
    }
    #deleteModalContent button {
      margin:5px;
      width:80px;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Profile</h1>

<div id="notification"></div>

<div id="profileInfo">Loading...</div>

<label><b>Description:</b></label>
<textarea id="description" maxlength="400"></textarea>
<button id="saveDescBtn">Save Description</button>

<br><br>

<label><b>Profile Picture:</b></label>
<input type="file" id="profilePic" accept="image/*">
<button id="uploadPicBtn">Upload</button>

<h2>Your Posts & Replies</h2>
<div id="userPosts">Loading...</div>

<!-- Delete modal -->
<div id="deleteModal">
  <div id="deleteModalContent">
    <p id="deleteText">Are you sure?</p>
    <button id="confirmDeleteBtn">Yes</button>
    <button id="cancelDeleteBtn">No</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const username = localStorage.getItem("currentUser");

let pendingDelete = null;
let pendingType = null;

function notify(msg) {
  const n = document.getElementById("notification");
  n.innerText = msg;
  n.style.display = "block";
  setTimeout(() => { n.style.display = "none"; }, 3000);
}

// PROFILE
async function loadProfile(){
  const profileDiv = document.getElementById("profileInfo");
  if(!username){ profileDiv.innerHTML="Not logged in."; return; }

  const snap = await getDoc(doc(db,"users",username));
  if(!snap.exists()){ profileDiv.innerHTML="User not found."; return; }

  const data = snap.data();
  const joinDate = data.joinDate ? new Date(data.joinDate) : null;
  const daysAgo = joinDate ? Math.floor((Date.now() - joinDate)/(1000*60*60*24)) : "Unknown";
  const profilePic = data.profilePic || "";

  profileDiv.innerHTML = `
    <p><b>Username:</b> ${data.username}</p>
    <p><b>Joined:</b> ${joinDate ? joinDate.toLocaleDateString() : "Unknown"} (${daysAgo} days ago)</p>
    ${profilePic ? `<img class="profile-pic" src="${profilePic}">` : "<p>No profile picture</p>"}
  `;

  document.getElementById("description").value = data.description || "";
}

// SAVE DESCRIPTION
document.getElementById("saveDescBtn").onclick = async () => {
  await setDoc(doc(db,"users",username), { description: document.getElementById("description").value }, {merge:true});
  notify("Description saved");
};

// RESIZE IMAGE (FROM PREVIOUS WORKING VERSION)
function resizeImageToBase64(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement("canvas");
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext("2d");
        const size = Math.min(img.width,img.height);
        const sx = (img.width-size)/2;
        const sy = (img.height-size)/2;
        ctx.drawImage(img,sx,sy,size,size,0,0,256,256);
        resolve(canvas.toDataURL("image/png"));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// UPLOAD PROFILE PIC (WORKING LOGIC RESTORED)
document.getElementById("uploadPicBtn").onclick = async ()=>{
  const file = document.getElementById("profilePic").files[0];
  if(!file){ notify("Select a file"); return; }
  try {
    const base64 = await resizeImageToBase64(file);
    await setDoc(doc(db,"users",username),{ profilePic: base64 },{merge:true});
    notify("Profile picture updated!");
    loadProfile();
  } catch(err){
    notify("Error: " + err.message);
  }
};

// DELETE POSTS / REPLIES
window.deleteItem = function(id,type){
  pendingDelete = id;
  pendingType = type;
  document.getElementById("deleteText").innerText = "Are you sure you want to delete this " + type + "?";
  document.getElementById("deleteModal").style.display = "flex";
};

document.getElementById("confirmDeleteBtn").onclick = async ()=>{
  if(pendingDelete && pendingType){
    if(pendingType==="post") await deleteDoc(doc(db,"posts",pendingDelete));
    else if(pendingType==="reply") await deleteDoc(doc(db,"replies",pendingDelete));
    pendingDelete=null; pendingType=null;
    document.getElementById("deleteModal").style.display="none";
    notify("Deleted successfully");
    loadUserPosts();
  }
};

document.getElementById("cancelDeleteBtn").onclick = ()=>{
  pendingDelete=null;
  pendingType=null;
  document.getElementById("deleteModal").style.display="none";
};

// LOAD POSTS
async function loadUserPosts(){
  const div = document.getElementById("userPosts");
  div.innerHTML = "Loading...";

  let html = "";
  const posts = await getDocs(query(collection(db,"posts"), where("author","==",username), orderBy("time","desc")));
  posts.forEach(docSnap=>{
    const p = docSnap.data();
    html += `<div class="post">
      <b>${p.author}:</b> ${p.content}
      <br><button class="deleteBtn" onclick="deleteItem('${docSnap.id}','post')">Delete</button>
    </div>`;
  });

  const replies = await getDocs(query(collection(db,"replies"), where("author","==",username), orderBy("time","desc")));
  replies.forEach(docSnap=>{
    const r = docSnap.data();
    html += `<div class="post">
      <b>${r.author} (reply):</b> ${r.content}
      <br><button class="deleteBtn" onclick="deleteItem('${docSnap.id}','reply')">Delete</button>
    </div>`;
  });

  if(html==="") html="<p>No posts</p>";
  div.innerHTML = html;
}

loadProfile();
loadUserPosts();
</script>

<script>
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");
const currentUser = localStorage.getItem("currentUser");
if(currentUser){
  accountLink.innerText="Profile";
  accountLink.href="profile.html";
  logoutBtn.style.display="inline";
}else logoutBtn.style.display="none";

logoutBtn.onclick = function(){
  localStorage.removeItem("currentUser");
  const n = document.getElementById("notification");
  n.innerText = "Logged out";
  n.style.display="block";
  setTimeout(()=>{ n.style.display="none"; window.location.href="index.html"; },1500);
};
</script>

</body>
</html>
