<!DOCTYPE html>
<html>
<head>
  <title>User Profile</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    nav a { color: cyan; margin-right:10px; text-decoration:none; }
    .profile { border:1px solid #444; padding:20px; width:300px; margin-top:20px; }
    img { width:100px; height:100px; border-radius:50%; }
    button { margin-top:10px; padding:5px 10px; cursor:pointer; }
    textarea { width:100%; height:80px; background:#222; color:white; border:none; padding:5px; }
  </style>
</head>
<body>

<nav>
  <a href="../index.html">Home</a>
  <a href="../doctrine.html">Doctrine</a>
  <a href="../forums.html">Forums</a>
  <a href="../news.html">News</a>
  <a href="../quiz.html">Quiz</a>
  <a href="../signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>User Profile</h1>
<div id="profileContainer">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser = null;
let currentAdmin = false;

// AUTH STATE
onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user.email.replace("@fake.com", "");
    currentAdmin = user?.admin || false;

    accountLink.innerText = "Profile";
    accountLink.href = "../profile.html";
    logoutBtn.style.display = "inline";

    await loadProfile(currentUser);
  } else {
    currentUser = null;
    currentAdmin = false;
    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "../signin.html";
    logoutBtn.style.display = "none";

    document.getElementById("profileContainer").innerHTML = "<p>Login to view profile.</p>";
  }
});

// LOGOUT
logoutBtn.onclick = function(){
  signOut(auth);
  currentUser = null;
  currentAdmin = false;
  localStorage.removeItem("currentUser");
  alert("Logged out");
  window.location.href = "../index.html";
}

// LOAD PROFILE
async function loadProfile(username){
  const profileDiv = document.getElementById("profileContainer");

  try{
    const userDoc = doc(db, "users", username);
    const snap = await getDoc(userDoc);

    if(!snap.exists()){
      // Create default profile if missing
      await setDoc(userDoc, {
        description: "This user has no description yet.",
        createdAt: Date.now(),
        profilePic: "https://via.placeholder.com/100",
        role: "user"
      });
      return loadProfile(username); // reload
    }

    const data = snap.data();
    const joinDate = new Date(data.createdAt).toLocaleDateString();
    const accountAgeDays = Math.floor((Date.now() - data.createdAt) / (1000*60*60*24));

    let roleBadge = "";
    if(data.role === "admin") roleBadge = "<b style='color:red'>[ADMIN]</b>";

    profileDiv.innerHTML = `
      <div class="profile">
        <img src="${data.profilePic}" alt="Profile Picture">
        <h2>${username} ${roleBadge}</h2>
        <p><b>Joined:</b> ${joinDate} (${accountAgeDays} days ago)</p>
        <p><b>Description:</b></p>
        <p id="descText">${data.description}</p>
      </div>
    `;

    // Allow owner/admin to edit description
    if(currentUser === username || currentAdmin){
      const editArea = document.createElement("textarea");
      editArea.value = data.description;
      profileDiv.appendChild(editArea);

      const saveBtn = document.createElement("button");
      saveBtn.innerText = "Save Description";
      saveBtn.onclick = async () => {
        const newDesc = editArea.value.trim();
        if(!newDesc){ alert("Description cannot be empty."); return; }
        await setDoc(userDoc, { description: newDesc }, { merge:true });
        alert("Profile updated!");
        loadProfile(username);
      };
      profileDiv.appendChild(saveBtn);
    }

  } catch(err){
    profileDiv.innerHTML = "Error loading profile: " + err.message;
  }
}

</script>
</body>
</html>
