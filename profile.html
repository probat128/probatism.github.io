<!DOCTYPE html>
<html>
<head>
  <title>User Profile</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    nav a { color: cyan; margin-right:10px; text-decoration:none; }
    .profile { border:1px solid #444; padding:20px; width:300px; margin-top:20px; }
    img { width:100px; height:100px; border-radius:50%; display:block; margin-bottom:10px; }
    button { margin-top:10px; padding:5px 10px; cursor:pointer; }
    textarea { width:100%; height:80px; background:#222; color:white; border:none; padding:5px; resize:none; }
    label { display:block; margin-top:10px; }
    input[type="file"] { margin-top:5px; }
    .charCount { font-size:12px; color:#aaa; margin-top:3px; }
  </style>
</head>
<body>

<nav>
  <a href="../index.html">Home</a>
  <a href="../doctrine.html">Doctrine</a>
  <a href="../forums.html">Forums</a>
  <a href="../news.html">News</a>
  <a href="../quiz.html">Quiz</a>
  <a href="../signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>User Profile</h1>
<div id="profileContainer">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.appspot.com",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser = null;
let currentAdmin = false;

onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user.email.replace("@fake.com", "");
    currentAdmin = user?.admin || false;

    accountLink.innerText = "Profile";
    accountLink.href = "../profile.html";
    logoutBtn.style.display = "inline";

    await loadProfile(currentUser);
  } else {
    currentUser = null;
    currentAdmin = false;
    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "../signin.html";
    logoutBtn.style.display = "none";

    document.getElementById("profileContainer").innerHTML = "<p>Login to view profile.</p>";
  }
});

logoutBtn.onclick = function(){
  signOut(auth);
  currentUser = null;
  currentAdmin = false;
  localStorage.removeItem("currentUser");
  alert("Logged out");
  window.location.href = "../index.html";
}

async function loadProfile(username){
  const profileDiv = document.getElementById("profileContainer");

  try{
    const userDoc = doc(db, "users", username);
    const snap = await getDoc(userDoc);

    if(!snap.exists()){
      await setDoc(userDoc, {
        description: "This user has no description yet.",
        createdAt: Date.now(),
        profilePic: "https://via.placeholder.com/100",
        role: "user"
      });
      return loadProfile(username);
    }

    const data = snap.data();
    const joinDateObj = new Date(data.createdAt);
    const joinDate = isNaN(joinDateObj.getTime()) ? "Unknown" : joinDateObj.toLocaleDateString();
    const accountAgeDays = isNaN(joinDateObj.getTime()) ? "N/A" : Math.floor((Date.now() - joinDateObj.getTime()) / (1000*60*60*24));

    let roleBadge = "";
    if(data.role === "admin") roleBadge = "<b style='color:red'>[ADMIN]</b>";

    profileDiv.innerHTML = `
      <div class="profile">
        <img src="${data.profilePic}" alt="Profile Picture" id="profileImg">
        <h2>${username} ${roleBadge}</h2>
        <p><b>Joined:</b> ${joinDate} (${accountAgeDays} days ago)</p>
        <label for="descInput"><b>Description:</b></label>
        <p id="descText">${data.description}</p>
      </div>
    `;

    if(currentUser === username || currentAdmin){
      const editArea = document.createElement("textarea");
      editArea.id = "descInput";
      editArea.maxLength = 400;
      editArea.value = data.description;
      profileDiv.appendChild(editArea);

      const charCounter = document.createElement("div");
      charCounter.className = "charCount";
      charCounter.innerText = `${editArea.value.length}/400`;
      editArea.addEventListener("input", () => {
        charCounter.innerText = `${editArea.value.length}/400`;
      });
      profileDiv.appendChild(charCounter);

      const saveBtn = document.createElement("button");
      saveBtn.innerText = "Save Description";
      saveBtn.onclick = async () => {
        const newDesc = editArea.value.trim();
        if(!newDesc){ alert("Description cannot be empty."); return; }
        await setDoc(userDoc, { description: newDesc }, { merge:true });
        alert("Profile updated!");
        loadProfile(username);
      };
      profileDiv.appendChild(saveBtn);

      // Profile picture upload
      const picLabel = document.createElement("label");
      picLabel.innerText = "Change Profile Picture:";
      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.accept = "image/*";
      fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file){ return; }
        const storageRef = ref(storage, `profilePics/${username}`);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        await setDoc(userDoc, { profilePic: url }, { merge:true });
        alert("Profile picture updated!");
        loadProfile(username);
      };
      profileDiv.appendChild(picLabel);
      profileDiv.appendChild(fileInput);
    }

  } catch(err){
    profileDiv.innerHTML = "Error loading profile: " + err.message;
  }
}

</script>
</body>
</html>
