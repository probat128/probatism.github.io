<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <style>
    body { 
      font-family: Arial; 
      background:#e8e0cf; 
      color:#5b2e61; 
      padding:20px; 
    }
    nav a { 
      color: #5b2e61; 
      margin-right:10px; 
      text-decoration:none; 
    }
    button { 
      margin-top:5px; 
      padding:5px 10px; 
      cursor:pointer; 
      border:2px solid #5b2e61;
      background-color:#5b2e61; 
      color:#e8e0cf; 
    }

    .profile-pic {
      width:256px;
      height:256px;
      object-fit:cover;
      border:2px solid #5b2e61;
      display:block;
      margin-top:10px;
    }

    .post { 
      border:1px solid #5b2e61; 
      padding:10px; 
      margin:10px 0; 
    }

    .post img {
      max-width:256px;
      max-height:256px;
      display:block;
      margin-top:5px;
      border:1px solid #5b2e61;
    }

    .time { 
      color:#5b2e61; 
      font-size:12px; 
    }

    .deleteBtn { 
      background:#5b2e61; 
      color:#e8e0cf; 
      border:none; 
      cursor:pointer; 
      padding:5px 10px;
    }

    #description {
      width:100%;
      height:80px;
      background:#e8e0cf;
      color:#5b2e61;
      border:2px solid #5b2e61;
      padding:5px;
    }

    #modal {
      display:none;
      position:fixed;
      top:30%;
      left:50%;
      transform: translate(-50%, -30%);
      width:300px;
      border:2px solid #5b2e61;
      background-color:#e8e0cf;
      color:#5b2e61;
      padding:20px;
      z-index:1000;
    }

    #modal button {
      width:100%;
      border:2px solid #5b2e61;
      background-color:#5b2e61;
      color:#e8e0cf;
      padding:5px;
      cursor:pointer;
      margin-top:10px;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="profile.html" id="accountLink">Profile</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Profile</h1>

<div id="profileInfo">Loading...</div>

<label><b>Description:</b></label>
<textarea id="description" maxlength="400"></textarea>
<button id="saveDescBtn">Save Description</button>

<br><br>

<label><b>Profile Picture:</b></label>
<input type="file" id="profilePic" accept="image/*">
<button id="uploadPicBtn">Upload</button>

<h2>Your Posts & Replies</h2>
<div id="userPosts">Loading...</div>

<div id="modal">
  <div id="modalText"></div>
  <button id="modalOk">OK</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let username = null;

// MODAL
const modal = document.getElementById("modal");
const modalText = document.getElementById("modalText");

function showModal(msg){
  modalText.innerText = msg;
  modal.style.display = "block";
}
document.getElementById("modalOk").onclick = ()=> modal.style.display="none";

// AUTH FIX
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "signin.html";
    return;
  }

  username = user.email.replace("@fake.com","");
  loadProfile();
  loadUserPosts();
});

// LOGOUT
document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
  window.location.href="index.html";
};

// LOAD PROFILE
async function loadProfile(){
  const profileDiv = document.getElementById("profileInfo");

  const snap = await getDoc(doc(db,"users",username));
  const data = snap.data();

  const joinDate = new Date(data.joinDate);
  const daysAgo = Math.floor((Date.now() - joinDate)/(1000*60*60*24));

  profileDiv.innerHTML = `
    <p><b>Username:</b> ${data.username}</p>
    <p><b>Joined:</b> ${joinDate.toLocaleDateString()} (${daysAgo} days ago)</p>
    ${data.profilePic ? `<img class="profile-pic" src="${data.profilePic}">` : ""}
  `;

  document.getElementById("description").value = data.description || "";
}

// SAVE DESC
let lastSaveTime=0;
document.getElementById("saveDescBtn").onclick = async ()=>{
  if(Date.now()-lastSaveTime<5000){
    showModal("Wait 5 seconds");
    return;
  }

  const desc=document.getElementById("description").value;

  await setDoc(doc(db,"users",username),{description:desc},{merge:true});

  lastSaveTime=Date.now();
  showModal("Saved");
};

// IMAGE RESIZE
function resizeImage(file){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        c.width=256; c.height=256;
        const ctx=c.getContext("2d");

        const size=Math.min(img.width,img.height);
        const sx=(img.width-size)/2;
        const sy=(img.height-size)/2;

        ctx.drawImage(img,sx,sy,size,size,0,0,256,256);
        resolve(c.toDataURL());
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// UPLOAD PIC
document.getElementById("uploadPicBtn").onclick=async ()=>{
  const file=document.getElementById("profilePic").files[0];
  if(!file) return showModal("Select file");

  const img=await resizeImage(file);

  await setDoc(doc(db,"users",username),{profilePic:img},{merge:true});
  showModal("Uploaded");
  loadProfile();
};

// DELETE
window.deletePost=async id=>{
  await deleteDoc(doc(db,"posts",id));
  loadUserPosts();
};
window.deleteReply=async id=>{
  await deleteDoc(doc(db,"replies",id));
  loadUserPosts();
};

// LOAD POSTS (FIXED)
async function loadUserPosts(){
  const div=document.getElementById("userPosts");

  const postsSnap = await getDocs(query(collection(db,"posts"),where("author","==",username)));
  const repliesSnap = await getDocs(query(collection(db,"replies"),where("author","==",username)));

  let items = [];

  postsSnap.forEach(d=>{
    items.push({type:"post", id:d.id, ...d.data()});
  });

  repliesSnap.forEach(d=>{
    items.push({type:"reply", id:d.id, ...d.data()});
  });

  // ✅ FORCE SORT FIX
  items.sort((a,b)=>b.time-a.time);

  let html="";

  items.forEach(item=>{
    html+=`
    <div class="post">
      <b>${item.author}${item.type==="reply"?" (reply)":""}:</b>
      ${item.content || ""}
      ${item.image ? `<img src="${item.image}">` : ""}
      <br>
      <button class="deleteBtn" onclick="${item.type==="post"?"deletePost":"deleteReply"}('${item.id}')">Delete</button>
    </div>`;
  });

  if(html==="") html="<p>No posts</p>";
  div.innerHTML=html;
}

</script>

</body>
</html>
