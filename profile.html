<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <style>
    body { 
      font-family: Arial; 
      background:#e8e0cf; 
      color:#5b2e61; 
      padding:20px; 
    }
    nav a { 
      color: #5b2e61; 
      margin-right:10px; 
      text-decoration:none; 
    }
    button { 
      margin-top:5px; 
      padding:5px 10px; 
      cursor:pointer; 
      border:2px solid #5b2e61;
      background-color:#5b2e61; 
      color:#e8e0cf; 
    }

    .profile-pic {
      width:256px;
      height:256px;
      object-fit:cover;
      border:2px solid #5b2e61;
      display:block;
      margin-top:10px;
    }

    .post { 
      border:1px solid #5b2e61; 
      padding:10px; 
      margin:10px 0; 
      cursor:pointer;
    }

    .post img {
      max-width:256px;
      max-height:256px;
      display:block;
      margin-top:5px;
      border:1px solid #5b2e61;
    }

    .content {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .time { 
      font-size:12px; 
      margin-top:5px;
    }

    .deleteBtn { 
      margin-top:5px;
    }

    #description {
      width:100%;
      height:80px;
      background:#e8e0cf;
      color:#5b2e61;
      border:2px solid #5b2e61;
      padding:5px;
    }

    .modal-bg {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.4);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:#e8e0cf;
      border:2px solid #5b2e61;
      padding:20px;
      text-align:center;
      width:300px;
    }

    .readMore {
      cursor:pointer;
      text-decoration:underline;
      font-size:12px;
    }

    #loadMoreBtn {
      width:100%;
      margin-top:10px;
    }

    .mention {
      color: inherit;
      cursor: pointer;
      text-decoration: underline;
    }

    .mention:hover {
      color: blue;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="profile.html">Profile</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Profile</h1>

<div id="profileInfo">Loading...</div>

<label><b>Description:</b></label>
<textarea id="description"></textarea>
<button id="saveDescBtn">Save Description</button>

<br><br>

<label><b>Profile Picture:</b></label>
<input type="file" id="profilePic">
<button id="uploadPicBtn">Upload</button>

<h2>Mentions</h2>

<div id="mentionsBox" style="
  border:1px solid #5b2e61;
  padding:10px;
  margin:10px 0;
">

  <div id="mentionsList">Loading mentions...</div>

  <div style="margin-top:10px; display:flex; gap:10px;">
    <button id="mentionsPrev">◀</button>
    <button id="mentionsNext">▶</button>
  </div>

</div>

<h2>Your Posts & Replies</h2>
<div id="userPosts"></div>
<button id="loadMoreBtn">Load More</button>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-bg">
  <div class="modal-content">
    <p id="deleteText"></p>
    <button id="confirmDelete">Delete</button>
    <button id="cancelDelete">Cancel</button>
  </div>
</div>

<script type="module">
let mentionsList = [];
let mentionIndex = 0;
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let username = null;
let uid = null;
let mentions = [];
let mentionsIndex = 0;
let index=0;
let items = [];
let deleteTarget=null;
let deleteType=null;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.href="signin.html";
    return;
  }

  uid = user.uid;

  // 🔥 WAIT for profile to load username FIRST
  await loadProfile();

  // 🔥 NOW username exists → safe to query
  loadAllData();
  loadMentions();
});

/* LOGOUT */
document.getElementById("logoutBtn").onclick=async()=>{
  await signOut(auth);
  location.href="index.html";
};

/* PROFILE */
async function loadProfile(){
  const snap = await getDoc(doc(db, "users", uid));

  if(!snap.exists()){
    document.getElementById("profileInfo").innerText = "User not found.";
    return;
  }

  const d = snap.data();

  if(!d.username){
  document.getElementById("profileInfo").innerText = "Corrupt user data.";
  return;
}

  username = d.username; // IMPORTANT: restore username
  const date=new Date(d.joinDate);

  document.getElementById("profileInfo").innerHTML=`
    <p><b>${d.username}</b></p>
    <p>${date.toLocaleString()}</p>
    ${d.profilePic?`<img class="profile-pic" src="${d.profilePic}">`:``}
  `;

  document.getElementById("description").value=d.description||"";
}

/* SAVE DESC */
document.getElementById("saveDescBtn").onclick=async()=>{
  await setDoc(doc(db,"users",uid),{
    description:document.getElementById("description").value
  },{merge:true});
};

/* UPLOAD PIC */
document.getElementById("uploadPicBtn").onclick=async()=>{
  const file=document.getElementById("profilePic").files[0];
  if(!file) return;

  const r=new FileReader();
  r.onload=async()=>{
    await setDoc(doc(db,"users",uid),{
      profilePic:r.result
    },{merge:true});
    loadProfile();
  };
  r.readAsDataURL(file);
};

/* DELETE */
window.askDelete=(id,type)=>{
  deleteTarget=id;
  deleteType=type;
  deleteText.innerText="Delete this "+type+"?";
  deleteModal.style.display="flex";
};

cancelDelete.onclick=()=>deleteModal.style.display="none";

confirmDelete.onclick=async()=>{
  await deleteDoc(doc(db,deleteType==="post"?"posts":"replies",deleteTarget));
  deleteModal.style.display="none";
  loadAllData();
  loadMentions();
};

/* FORMAT TEXT */
function format(text){
  if(!text) return "";

  if(text.length<=400){
    return `<div class="content">${text}</div>`;
  }

  const id=Math.random();

  return `
  <div class="content" id="s${id}">
    ${text.slice(0,400)}...
    <span class="readMore" onclick="
      document.getElementById('f${id}').style.display='block';
      document.getElementById('s${id}').style.display='none';
    ">See more</span>
  </div>
  <div id="f${id}" style="display:none">${text}</div>
  `;
}

/* LOAD ALL */
async function loadAllData(){
  const posts=await getDocs(query(collection(db,"posts"),where("authorUID","==",uid)));
  const replies=await getDocs(query(collection(db,"replies"),where("authorUID","==",uid)));

  items=[];

  posts.forEach(d=>items.push({type:"post",id:d.id,...d.data()}));
  replies.forEach(d=>items.push({type:"reply",id:d.id,...d.data()}));

  items.sort((a,b)=>b.time-a.time);

  index=0;
  document.getElementById("userPosts").innerHTML="";
  loadMore();
}

async function loadMentions(){

  const postsSnap = await getDocs(collection(db,"posts"));
  const repliesSnap = await getDocs(collection(db,"replies"));

  const all = [];

  postsSnap.forEach(d=>{
    const data = d.data();
    if(data.content && data.content.includes("@"+username)){
      all.push({
        id:d.id,
        type:"post",
        ...data
      });
    }
  });

  repliesSnap.forEach(d=>{
    const data = d.data();
    if(data.content && data.content.includes("@"+username)){
      all.push({
        id:d.id,
        type:"reply",
        ...data
      });
    }
  });

  all.sort((a,b)=>b.time-a.time);

  mentions = all;
  mentionsIndex = 0;

  renderMentionsUI();
}

function renderMentionsUI(){

  const box = document.getElementById("mentionsList");
  box.innerHTML = "";

  const chunk = mentions.slice(mentionsIndex, mentionsIndex + 5);

  if(chunk.length === 0){
    box.innerHTML = "<i>No mentions yet</i>";
    return;
  }

  chunk.forEach(m=>{
    const div = document.createElement("div");

    div.style.border = "1px solid #5b2e61";
    div.style.padding = "5px";
    div.style.margin = "5px 0";
    div.style.cursor = "pointer";

    div.innerHTML = `
      <b>${m.author}</b><br>
      ${m.content.slice(0,120)}...
    `;

    div.onclick = () => {
      if(m.type === "post"){
        location.href = "post.html?id=" + m.id;
      } else {
        location.href = "post.html?id=" + m.postId;
      }
    };

    box.appendChild(div);
  });
}



/* LOAD MORE */
function loadMore(){
  const div=document.getElementById("userPosts");

  const chunk=items.slice(index,index+10);

  chunk.forEach(item=>{
    const el=document.createElement("div");
    el.className="post";

    const date=new Date(item.time).toLocaleString();

    el.innerHTML=`
      <b>${item.author}${item.type==="reply"?" (reply)":""}</b>
      ${format(item.content)}
      ${item.image?`<img src="${item.image}">`:``}
      <div class="time">${date}</div>
      <button class="deleteBtn">Delete</button>
    `;

    // CLICK TO OPEN POST
    el.onclick=()=>{
      if(item.type==="post"){
        location.href=`post.html?id=${item.id}`;
      } else {
        location.href=`post.html?id=${item.postId}`;
      }
    };

    // PREVENT DELETE CLICK PROPAGATION
    el.querySelector(".deleteBtn").onclick=(e)=>{
      e.stopPropagation();
      askDelete(item.id,item.type);
    };

    div.appendChild(el);
  });

  index+=10;

  document.getElementById("loadMoreBtn").style.display =
    index>=items.length?"none":"block";
}

document.getElementById("loadMoreBtn").onclick=loadMore;

</script>

</body>
</html>
