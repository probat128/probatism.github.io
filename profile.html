<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <style>
    body { 
      font-family: Arial; 
      background:#e8e0cf; 
      color:#5b2e61; 
      padding:20px; 
    }
    nav a { 
      color: #5b2e61; 
      margin-right:10px; 
      text-decoration:none; 
    }
    button { 
      margin-top:5px; 
      padding:5px 10px; 
      cursor:pointer; 
      border:2px solid #5b2e61;
      background-color:#5b2e61; 
      color:#e8e0cf; 
    }

    .profile-pic {
      width:256px;
      height:256px;
      object-fit:cover;
      border:2px solid #5b2e61;
      display:block;
      margin-top:10px;
    }

    .post { 
      border:1px solid #5b2e61; 
      padding:10px; 
      margin:10px 0; 
    }

    .post img {
      max-width:256px;
      max-height:256px;
      display:block;
      margin-top:5px;
      border:1px solid #5b2e61;
    }

    /* TEXT FIX */
    .content {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .time { 
      color:#5b2e61; 
      font-size:12px; 
      margin-top:5px;
    }

    .deleteBtn { 
      background:#5b2e61; 
      color:#e8e0cf; 
      border:none; 
      cursor:pointer; 
      padding:5px 10px;
    }

    #description {
      width:100%;
      height:80px;
      background:#e8e0cf;
      color:#5b2e61;
      border:2px solid #5b2e61;
      padding:5px;
    }

    /* MODAL */
    .modal-bg {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.4);
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .modal-content {
      background:#e8e0cf;
      border:2px solid #5b2e61;
      padding:20px;
      text-align:center;
      width:300px;
    }

    .readMore {
      cursor:pointer;
      text-decoration:underline;
      font-size:12px;
    }

  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="profile.html" id="accountLink">Profile</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Profile</h1>

<div id="profileInfo">Loading...</div>

<label><b>Description:</b></label>
<textarea id="description" maxlength="400"></textarea>
<button id="saveDescBtn">Save Description</button>

<br><br>

<label><b>Profile Picture:</b></label>
<input type="file" id="profilePic" accept="image/*">
<button id="uploadPicBtn">Upload</button>

<h2>Your Posts & Replies</h2>
<div id="userPosts">Loading...</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-bg">
  <div class="modal-content">
    <p id="deleteText"></p>
    <button id="confirmDelete">Delete</button>
    <button id="cancelDelete">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let username = null;
let deleteTarget = null;
let deleteType = null;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "signin.html";
    return;
  }

  username = user.email.replace("@fake.com","");
  loadProfile();
  loadUserPosts();
});

/* LOGOUT */
document.getElementById("logoutBtn").onclick = async ()=>{
  await signOut(auth);
  window.location.href="index.html";
};

/* PROFILE */
async function loadProfile(){
  const snap = await getDoc(doc(db,"users",username));
  const data = snap.data();

  const joinDate = new Date(data.joinDate);
  const daysAgo = Math.floor((Date.now()-joinDate)/(1000*60*60*24));

  document.getElementById("profileInfo").innerHTML = `
    <p><b>Username:</b> ${data.username}</p>
    <p><b>Joined:</b> ${joinDate.toLocaleString()} (${daysAgo} days ago)</p>
    ${data.profilePic ? `<img class="profile-pic" src="${data.profilePic}">` : ""}
  `;

  document.getElementById("description").value = data.description || "";
}

/* SAVE DESC */
let lastSaveTime=0;
document.getElementById("saveDescBtn").onclick = async ()=>{
  if(Date.now()-lastSaveTime<5000) return;

  await setDoc(doc(db,"users",username),{
    description:document.getElementById("description").value
  },{merge:true});

  lastSaveTime=Date.now();
};

/* RESIZE */
function resizeImage(file){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        c.width=256; c.height=256;
        const ctx=c.getContext("2d");

        const size=Math.min(img.width,img.height);
        ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,256,256);
        resolve(c.toDataURL());
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

/* UPLOAD PIC */
document.getElementById("uploadPicBtn").onclick=async ()=>{
  const file=document.getElementById("profilePic").files[0];
  if(!file) return;

  const img=await resizeImage(file);

  await setDoc(doc(db,"users",username),{profilePic:img},{merge:true});
  loadProfile();
};

/* DELETE MODAL */
window.askDelete = (id,type)=>{
  deleteTarget=id;
  deleteType=type;
  document.getElementById("deleteText").innerText =
    `Are you sure you want to delete this ${type}?`;
  document.getElementById("deleteModal").style.display="flex";
};

document.getElementById("cancelDelete").onclick=()=>{
  deleteModal.style.display="none";
};

document.getElementById("confirmDelete").onclick=async ()=>{
  if(deleteType==="post"){
    await deleteDoc(doc(db,"posts",deleteTarget));
  } else {
    await deleteDoc(doc(db,"replies",deleteTarget));
  }
  deleteModal.style.display="none";
  loadUserPosts();
};

/* READ MORE */
function formatContent(text){
  if(!text) return "";

  if(text.length <= 400){
    return `<div class="content">${text}</div>`;
  }

  const id = Math.random().toString(36).slice(2);

  return `
    <div class="content" id="short_${id}">
      ${text.slice(0,400)}...
      <span class="readMore" onclick="
        document.getElementById('full_${id}').style.display='block';
        document.getElementById('short_${id}').style.display='none';
      ">See more</span>
    </div>

    <div class="content" id="full_${id}" style="display:none">
      ${text}
    </div>
  `;
}

/* LOAD POSTS */
async function loadUserPosts(){
  const div=document.getElementById("userPosts");

  const postsSnap = await getDocs(query(collection(db,"posts"),where("author","==",username)));
  const repliesSnap = await getDocs(query(collection(db,"replies"),where("author","==",username)));

  let items=[];

  postsSnap.forEach(d=> items.push({type:"post",id:d.id,...d.data()}));
  repliesSnap.forEach(d=> items.push({type:"reply",id:d.id,...d.data()}));

  items.sort((a,b)=>b.time-a.time);

  let html="";

  items.forEach(item=>{
    const date = new Date(item.time).toLocaleString();

    html+=`
    <div class="post">
      <b>${item.author}${item.type==="reply"?" (reply)":""}:</b>
      ${formatContent(item.content)}
      ${item.image ? `<img src="${item.image}">` : ""}
      <div class="time">${date}</div>
      <button class="deleteBtn" onclick="askDelete('${item.id}','${item.type}')">Delete</button>
    </div>`;
  });

  if(html==="") html="<p>No posts</p>";
  div.innerHTML=html;
}

</script>

</body>
</html>
