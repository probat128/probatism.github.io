<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    nav a { color: cyan; margin-right:10px; text-decoration:none; }
    button { margin-top:5px; padding:5px 10px; cursor:pointer; }

    .profile-pic {
      width:256px;
      height:256px;
      object-fit:cover;
      border:2px solid #444;
      display:block;
      margin-top:10px;
    }

    .post { border:1px solid #444; padding:10px; margin:10px 0; }
    .time { color:#aaa; font-size:12px; }
    .subforum { color:orange; font-size:12px; }

    #description {
      width:100%;
      height:80px;
      background:#222;
      color:white;
      border:none;
      padding:5px;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Profile</h1>

<div id="profileInfo">Loading...</div>

<label><b>Description:</b></label>
<textarea id="description" maxlength="400"></textarea>
<button id="saveDescBtn">Save Description</button>

<br><br>

<label><b>Upload Profile Picture (small image recommended):</b></label>
<input type="file" id="profilePic">
<button id="uploadPicBtn">Upload</button>

<h2>Your Posts & Replies</h2>
<div id="userPosts">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.appspot.com",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const username = localStorage.getItem("currentUser");

// LOAD PROFILE
async function loadProfile(){
  const div = document.getElementById("profileInfo");

  if(!username){
    div.innerHTML = "Not logged in.";
    return;
  }

  const snap = await getDoc(doc(db, "users", username));

  if(!snap.exists()){
    div.innerHTML = "User not found.";
    return;
  }

  const data = snap.data();
  const joinDate = new Date(data.joinDate);

  div.innerHTML = `
    <p><b>Username:</b> ${data.username}</p>
    <p><b>Joined:</b> ${joinDate.toLocaleDateString()}</p>
    ${data.profilePic ? `<img class="profile-pic" src="${data.profilePic}">` : "<p>No profile picture</p>"}
  `;

  document.getElementById("description").value = data.description || "";
}

// SAVE DESCRIPTION
document.getElementById("saveDescBtn").onclick = async () => {
  await setDoc(doc(db, "users", username), {
    description: document.getElementById("description").value
  }, { merge:true });

  alert("Saved");
};

// UPLOAD IMAGE (BASE64)
document.getElementById("uploadPicBtn").onclick = () => {
  const file = document.getElementById("profilePic").files[0];
  if(!file){ alert("Select file"); return; }

  // limit size (IMPORTANT)
  if(file.size > 200 * 1024){
    alert("Image too large (max 200KB)");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e){
    const base64 = e.target.result;

    await setDoc(doc(db, "users", username), {
      profilePic: base64
    }, { merge:true });

    alert("Profile picture saved!");
    loadProfile();
  };

  reader.readAsDataURL(file);
};

// LOAD POSTS (unchanged)
async function loadUserPosts(){
  const div = document.getElementById("userPosts");
  div.innerHTML = "Loading...";

  let html = "";

  const posts = await getDocs(query(collection(db,"posts"), where("author","==",username), orderBy("time","desc")));
  posts.forEach(docSnap=>{
    const p = docSnap.data();
    html += `<div class="post"><b>${p.author}:</b> ${p.content}</div>`;
  });

  if(html==="") html = "<p>No posts</p>";
  div.innerHTML = html;
}

loadProfile();
loadUserPosts();
</script>

<script>
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

const currentUser = localStorage.getItem("currentUser");
if(currentUser){
  accountLink.innerText = "Profile";
  accountLink.href = "profile.html";
  logoutBtn.style.display = "inline";
} else {
  logoutBtn.style.display = "none";
}

logoutBtn.onclick = function() {
  localStorage.removeItem("currentUser");
  alert("Logged out");
  window.location.href = "index.html";
};
</script>

</body>
</html>
