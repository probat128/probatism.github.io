<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    input { display:block; margin:5px 0; padding:5px; width:200px; }
    button { padding:5px 10px; margin-top:5px; cursor:pointer; }
    .info { margin-top:20px; background:#222; padding:10px; border-radius:5px; }
  </style>
</head>
<body>

<h1>Sign In / Sign Up</h1>

<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="guest()">Continue as Guest</button>

<p id="status"></p>

<div class="info" id="profileInfo">Not signed in</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;

function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const username = document.getElementById("username").value;
  if(!username) { alert("Enter a username"); return; }

  auth.createUserWithEmailAndPassword(email, password)
    .then(userCredential => {
      currentUser = userCredential.user;
      db.collection("users").doc(currentUser.uid).set({
        username: username,
        role: "user",
        joinDate: Date.now()
      });
      document.getElementById("status").innerText = "Signed up as " + username;
      showProfile();
    }).catch(e=>alert(e.message));
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(userCredential => {
      currentUser = userCredential.user;
      document.getElementById("status").innerText = "Logged in!";
      showProfile();
    }).catch(e=>alert(e.message));
}

function guest() {
  auth.signInAnonymously().then(userCredential => {
    currentUser = userCredential.user;
    document.getElementById("status").innerText = "Guest mode!";
    showProfile();
  });
}

function showProfile() {
  if(!currentUser) return;
  db.collection("users").doc(currentUser.uid).get().then(doc=>{
    const username = doc.exists ? doc.data().username || "Guest" : "Guest";
    const joinDate = doc.exists ? new Date(doc.data().joinDate).toDateString() : "N/A";
    document.getElementById("profileInfo").innerHTML =
      `Username: ${username}<br>Join Date: ${joinDate}`;
  });
}

// Auto-update on login/logout
auth.onAuthStateChanged(user => {
  currentUser = user;
  showProfile();
});
</script>

</body>
</html>
