<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
</head>
<body>

<h1>Sign In / Sign Up</h1>

<input id="username" placeholder="Username"><br>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="guest()">Continue as Guest</button>

<p id="status"></p>

<div id="profileInfo" style="margin-top:20px;"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 🔑 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// Sign up
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const username = document.getElementById("username").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(userCredential => {
      currentUser = userCredential.user;
      // Save user info
      db.collection("users").doc(currentUser.uid).set({
        username: username,
        role: "user",
        joinDate: Date.now()
      });
      document.getElementById("status").innerText = "Signed up as " + username;
      showProfile();
    })
    .catch(error => { alert(error.message); });
}

// Login
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(userCredential => {
      currentUser = userCredential.user;
      document.getElementById("status").innerText = "Logged in!";
      showProfile();
    })
    .catch(error => { alert(error.message); });
}

// Anonymous guest
function guest() {
  auth.signInAnonymously()
    .then(userCredential => {
      currentUser = userCredential.user;
      document.getElementById("status").innerText = "Guest mode!";
      showProfile();
    });
}

// Show profile info
function showProfile() {
  if(!currentUser) return;
  db.collection("users").doc(currentUser.uid).get().then(doc=>{
    if(doc.exists){
      const username = doc.data().username || "Guest";
      const joinDate = doc.data().joinDate ? new Date(doc.data().joinDate).toDateString() : "N/A";
      document.getElementById("profileInfo").innerHTML =
        `Username: ${username} <br> Join Date: ${joinDate}`;
    }
  });
}

// Detect login state
auth.onAuthStateChanged(user => {
  currentUser = user;
  showProfile();
});
</script>

</body>
</html>
