<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <style>
    body { 
      font-family: Arial; 
      background:#e8e0cf; 
      color:#5b2e61; 
      padding:20px; 
    }
    nav a { 
      color: #5b2e61; 
      margin-right:10px; 
      text-decoration:none; 
    }
    button { 
      margin-top:5px; 
      padding:5px 10px; 
      cursor:pointer; 
      border:2px solid #5b2e61;
      background-color:#5b2e61; 
      color:#e8e0cf; 
    }

    .profile-pic {
      width:256px;
      height:256px;
      object-fit:cover;
      border:2px solid #5b2e61;
      display:block;
      margin-top:10px;
    }

    .post { 
      border:1px solid #5b2e61; 
      padding:10px; 
      margin:10px 0; 
      cursor:pointer;
    }

    .post img {
      max-width:256px;
      max-height:256px;
      display:block;
      margin-top:5px;
      border:1px solid #5b2e61;
    }

    .content {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .time { 
      font-size:12px; 
      margin-top:5px;
    }

    .deleteBtn { 
      margin-top:5px;
    }

    #description {
      width:100%;
      height:80px;
      background:#e8e0cf;
      color:#5b2e61;
      border:2px solid #5b2e61;
      padding:5px;
    }

    .modal-bg {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.4);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:#e8e0cf;
      border:2px solid #5b2e61;
      padding:20px;
      text-align:center;
      width:300px;
    }

    .readMore {
      cursor:pointer;
      text-decoration:underline;
      font-size:12px;
    }

    #loadMoreBtn {
      width:100%;
      margin-top:10px;
    }

    .mention {
      color: inherit;
      cursor: pointer;
      text-decoration: underline;
    }

    .mention:hover {
      color: blue;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="profile.html">Profile</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Profile</h1>

<div id="profileInfo">Loading...</div>
<br><br>

<label><b>Change Username:</b></label><br>
<input id="newUsername" placeholder="New username">
<button id="changeUsernameBtn">Change</button>

<p id="usernameStatus"></p>

<label><b>Description:</b></label>
<textarea id="description"></textarea>
<button id="saveDescBtn">Save Description</button>




<label><b>Profile Picture:</b></label>
<input type="file" id="profilePic">
<button id="uploadPicBtn">Upload</button>

<h2>Mentions</h2>

<div id="mentionsBox" style="
  border:1px solid #5b2e61;
  padding:10px;
  margin:10px 0;
">

  <div id="mentionsList">Loading mentions...</div>

  <div style="margin-top:10px; display:flex; gap:10px;">
    <button id="mentionsPrev">◀</button>
    <button id="mentionsNext">▶</button>
  </div>

</div>

<h2>Your Posts & Replies</h2>
<div id="userPosts"></div>
<button id="loadMoreBtn">Load More</button>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-bg">
  <div class="modal-content">
    <p id="deleteText"></p>
    <button id="confirmDelete">Delete</button>
    <button id="cancelDelete">Cancel</button>
  </div>
</div>

<script type="module">
let mentionsList = [];
let mentionIndex = 0;
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;
const auth = getAuth(app);

let uid = null;
let items=[];
let mentions = [];
let mentionsIndex = 0;
let index=0;
let deleteTarget=null;
let deleteType=null;

/* AUTH */
let uid = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "signin.html";
    return;
  }

  uid = user.uid;

  console.log("Logged in UID:", uid);

  loadProfile();
  loadAllData();
  loadMentions();
});

/* LOGOUT */
document.getElementById("logoutBtn").onclick=async()=>{
  await signOut(auth);
  location.href="index.html";
};

/* PROFILE */
async function loadProfile() {
  try {
    const el = document.getElementById("profileInfo");

    const ref = doc(db, "users", uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      await setDoc(ref, {
        username: "user" + uid.slice(0, 5),
        joinDate: Date.now()
      });

      return loadProfile();
    }

    const d = snap.data();
    username = d.username;

    el.innerHTML = `
      <p><b>${d.username}</b></p>
      ${d.profilePic ? `<img class="profile-pic" src="${d.profilePic}">` : ""}
      <p>${new Date(d.joinDate).toLocaleString()}</p>
    `;

    document.getElementById("description").value = d.description || "";

  } catch (err) {
    console.error("loadProfile error:", err);
    document.getElementById("profileInfo").innerHTML =
      "<b>Error loading profile</b>";
  }
}

document.getElementById("changeUsernameBtn").onclick = async () => {
  const status = document.getElementById("usernameStatus");
  const raw = document.getElementById("newUsername").value.trim();

  if (!raw) {
    status.innerText = "Enter a username";
    status.style.color = "red";
    return;
  }

  let base = raw.toLowerCase()
    .replace(/\s+/g, "")
    .replace(/[^a-z0-9]/g, "")
    .slice(0, 18);

  if (base.length < 3) base = "user" + Math.floor(Math.random() * 999);

  const allUsers = await getDocs(collection(db, "users"));

  let finalName = base;
  let exists = true;

  while (exists) {
    exists = false;

    allUsers.forEach(d => {
      if (d.data().username === finalName && d.id !== uid) {
        exists = true;
      }
    });

    if (exists) {
      finalName = base + Math.floor(100000 + Math.random() * 900000);
    }
  }

  await setDoc(doc(db, "users", uid), {
    username: finalName
  }, { merge: true });

  status.innerText = "Username updated!";
  status.style.color = "green";

  // force reload profile after DB update
  setTimeout(() => {
    loadProfile();
  }, 300);
};

/* SAVE DESCRIPTION */
document.getElementById("saveDescBtn").onclick = async () => {
  if (!uid) return;

  await setDoc(doc(db, "users", uid), {
    description: document.getElementById("description").value
  }, { merge: true });

  console.log("Description saved");
};


/* UPLOAD PROFILE PICTURE */
document.getElementById("uploadPicBtn").onclick = async () => {
  if (!uid) return;

  const file = document.getElementById("profilePic").files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async () => {
    await setDoc(doc(db, "users", uid), {
      profilePic: reader.result
    }, { merge: true });

    loadProfile(); // refresh UI
  };

  reader.readAsDataURL(file);
};

/* UPLOAD PIC */
document.getElementById("uploadPicBtn").onclick=async()=>{
  const file=document.getElementById("profilePic").files[0];
  if(!file) return;

  const r=new FileReader();
  r.onload=async()=>{
    await setDoc(doc(db, "users", uid), {
      profilePic:r.result
    },{merge:true});
    loadProfile();
  };
  r.readAsDataURL(file);
};

/* DELETE */
window.askDelete=(id,type)=>{
  deleteTarget=id;
  deleteType=type;
  deleteText.innerText="Delete this "+type+"?";
  deleteModal.style.display="flex";
};

cancelDelete.onclick=()=>deleteModal.style.display="none";

confirmDelete.onclick=async()=>{
  await deleteDoc(doc(db,deleteType==="post"?"posts":"replies",deleteTarget));
  deleteModal.style.display="none";
  loadAllData();
  loadMentions();
};

/* FORMAT TEXT */
function format(text){
  if(!text) return "";

  if(text.length<=400){
    return `<div class="content">${text}</div>`;
  }

  const id=Math.random();

  return `
  <div class="content" id="s${id}">
    ${text.slice(0,400)}...
    <span class="readMore" onclick="
      document.getElementById('f${id}').style.display='block';
      document.getElementById('s${id}').style.display='none';
    ">See more</span>
  </div>
  <div id="f${id}" style="display:none">${text}</div>
  `;
}

/* LOAD ALL */
async function loadAllData(){
  const posts=await getDocs(query(collection(db,"posts"),where("author","==",username)));
  const replies=await getDocs(query(collection(db,"replies"),where("author","==",username)));

  items=[];

  posts.forEach(d=>items.push({type:"post",id:d.id,...d.data()}));
  replies.forEach(d=>items.push({type:"reply",id:d.id,...d.data()}));

  items.sort((a,b)=>b.time-a.time);

  index=0;
  document.getElementById("userPosts").innerHTML="";
  loadMore();
}

async function loadMentions(){

  const postsSnap = await getDocs(collection(db,"posts"));
  const repliesSnap = await getDocs(collection(db,"replies"));

  const all = [];

  postsSnap.forEach(d=>{
    const data = d.data();
    if(data.content && data.content.includes("@"+username)){
      all.push({
        id:d.id,
        type:"post",
        ...data
      });
    }
  });

  repliesSnap.forEach(d=>{
    const data = d.data();
    if(data.content && data.content.includes("@"+username)){
      all.push({
        id:d.id,
        type:"reply",
        ...data
      });
    }
  });

  all.sort((a,b)=>b.time-a.time);

  mentions = all;
  mentionsIndex = 0;

  renderMentionsUI();
  
}

function renderMentionsUI(){

  const box = document.getElementById("mentionsList");
  box.innerHTML = "";

  const chunk = mentions.slice(mentionsIndex, mentionsIndex + 5);

  if(chunk.length === 0){
    box.innerHTML = "<i>No mentions yet</i>";
    return;
  }

  chunk.forEach(m=>{
    const div = document.createElement("div");

    div.style.border = "1px solid #5b2e61";
    div.style.padding = "5px";
    div.style.margin = "5px 0";
    div.style.cursor = "pointer";

    div.innerHTML = `
      <b>${m.author}</b><br>
      ${m.content.slice(0,120)}...
    `;

    div.onclick = () => {
      if(m.type === "post"){
        location.href = "post.html?id=" + m.id;
      } else {
        location.href = "post.html?id=" + m.postId;
      }
    };

    box.appendChild(div);
  });
}



/* LOAD MORE */
function loadMore(){
  const div=document.getElementById("userPosts");

  const chunk=items.slice(index,index+10);

  chunk.forEach(item=>{
    const el=document.createElement("div");
    el.className="post";

    const date=new Date(item.time).toLocaleString();

    el.innerHTML=`
      <b>${item.author}${item.type==="reply"?" (reply)":""}</b>
      ${format(item.content)}
      ${item.image?`<img src="${item.image}">`:``}
      <div class="time">${date}</div>
      <button class="deleteBtn">Delete</button>
    `;

    // CLICK TO OPEN POST
    el.onclick=()=>{
      if(item.type==="post"){
        location.href=`post.html?id=${item.id}`;
      } else {
        location.href=`post.html?id=${item.postId}`;
      }
    };

    // PREVENT DELETE CLICK PROPAGATION
    el.querySelector(".deleteBtn").onclick=(e)=>{
      e.stopPropagation();
      askDelete(item.id,item.type);
    };

    div.appendChild(el);
  });

  index+=10;

  document.getElementById("loadMoreBtn").style.display =
    index>=items.length?"none":"block";
}

document.getElementById("loadMoreBtn").onclick=loadMore;

</script>

</body>
</html>
