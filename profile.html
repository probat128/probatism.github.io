<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    nav a { color: cyan; margin-right:10px; text-decoration:none; }
    button { margin-top:5px; padding:5px 10px; cursor:pointer; }
    .post { border:1px solid #444; padding:10px; margin:10px 0; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>Profile</h1>

<div id="profileInfo">Loading...</div>

<h2>Your Posts</h2>
<div id="userPosts">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const username = localStorage.getItem("currentUser");

// LOAD PROFILE INFO
async function loadProfile(){
  const profileDiv = document.getElementById("profileInfo");

  if(!username){
    profileDiv.innerHTML = "You are not logged in.";
    return;
  }

  const userRef = doc(db, "users", username);
  const userSnap = await getDoc(userRef);

  if(!userSnap.exists()){
    profileDiv.innerHTML = "User not found.";
    return;
  }

  const data = userSnap.data();
  const joinDate = new Date(data.joinDate).toLocaleString();

  profileDiv.innerHTML = `
    <p><b>Username:</b> ${data.username}</p>
    <p><b>Joined:</b> ${joinDate}</p>
  `;
}

// LOAD USER POSTS
async function loadUserPosts(){
  const postsDiv = document.getElementById("userPosts");

  if(!username){
    postsDiv.innerHTML = "";
    return;
  }

  const q = query(
    collection(db, "posts"),
    where("author", "==", username),
    orderBy("time", "desc")
  );

  const snapshot = await getDocs(q);

  if(snapshot.empty){
    postsDiv.innerHTML = "<p>No posts yet.</p>";
    return;
  }

  let html = "";

  snapshot.forEach(doc => {
    const post = doc.data();

    html += `
      <div class="post">
        <b>${post.author}:</b> ${post.content}
      </div>
    `;
  });

  postsDiv.innerHTML = html;
}

// RUN
loadProfile();
loadUserPosts();
</script>

<!-- LOGIN / LOGOUT -->
<script>
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

const currentUser = localStorage.getItem("currentUser");

if(currentUser){
  accountLink.innerText = "Profile";
  accountLink.href = "profile.html";
  logoutBtn.style.display = "inline";
} else {
  logoutBtn.style.display = "none";
}

logoutBtn.onclick = function() {
  localStorage.removeItem("currentUser");
  alert("Logged out");
  window.location.href = "index.html";
};
</script>

</body>
</html>
