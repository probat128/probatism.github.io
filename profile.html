<!DOCTYPE html>
<html>
<head>
  <title>General Forum</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    nav a { color: cyan; margin-right:10px; text-decoration:none; }
    textarea { width: 80%; height: 60px; }
    .post { border:1px solid #444; padding:10px; margin:10px 0; }
    .time { color:#aaa; font-size:12px; }
    .subforum { color:orange; font-size:12px; }
    img { max-width:200px; display:block; margin-top:5px; }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="doctrine.html">Doctrine</a>
  <a href="forums.html">Forums</a>
  <a href="news.html">News</a>
  <a href="quiz.html">Quiz</a>
  <a href="signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>General Forum</h1>

<h3>Create Post</h3>
<textarea id="postText" placeholder="Write your post..."></textarea><br>
<input type="file" id="imageInput" accept="image/*"><br>
<button id="postButton" type="button">Post</button>

<h2>Posts</h2>
<div id="postsDiv">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const subforum = "General";

const username = localStorage.getItem("currentUser") || "Anonymous";

async function loadPosts(){
  const postsDiv = document.getElementById("postsDiv");
  postsDiv.innerHTML = "Loading...";

  const postsSnap = await getDocs(query(collection(db, "posts"), orderBy("time", "desc")));
  if(postsSnap.empty){ postsDiv.innerHTML = "<p>No posts yet.</p>"; return; }

  let html = "";
  postsSnap.forEach(docSnap => {
    const post = docSnap.data();
    const postId = docSnap.id;
    const date = new Date(post.time).toLocaleString();
    html += `
      <div class="post">
        <div class="subforum">[${post.subforum}]</div>
        <div onclick="window.location.href='post.html?id=${postId}'" style="cursor:pointer;">
          <b>${post.author}:</b> ${post.content ? post.content : ""}
          ${post.image ? `<img src="${post.image}">` : ""}
        </div>
        <div class="time">Posted: ${date}</div>
      </div>
    `;
  });

  postsDiv.innerHTML = html;
}

document.getElementById("postButton").addEventListener("click", async () => {
  const text = document.getElementById("postText").value.trim();
  const file = document.getElementById("imageInput").files[0];

  if(!text && !file){ alert("Write something or upload an image"); return; }

  let imageUrl = "";
  if(file){
    const storageRef = ref(storage, "images/" + Date.now() + "_" + file.name);
    await uploadBytes(storageRef, file);
    imageUrl = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db, "posts"), {
    subforum,
    author: username,
    content: text,
    image: imageUrl,
    time: Date.now()
  });

  document.getElementById("postText").value = "";
  document.getElementById("imageInput").value = "";

  loadPosts();
});

loadPosts();
</script>

<script>
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");
const currentUser = localStorage.getItem("currentUser");
if(currentUser){ accountLink.innerText = "Profile"; accountLink.href = "profile.html"; logoutBtn.style.display = "inline"; }
else logoutBtn.style.display = "none";

logoutBtn.onclick = function(){ localStorage.removeItem("currentUser"); alert("Logged out"); window.location.href="index.html"; };
</script>

</body>
</html>
