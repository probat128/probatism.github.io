<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <style>
    /* ---------- COLORS & BASIC STYLING ---------- */
    body {
      background-color: rgb(232, 224, 207); /* e8e0cf */
      color: rgb(91, 46, 97); /* 5b2e61 */
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(91, 46, 97, 0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .profile-picture {
      width: 256px;
      height: 256px;
      border-radius: 12px;
      object-fit: cover;
      display: block;
      margin: 0 auto 20px auto;
      border: 3px solid rgb(91, 46, 97);
    }

    .info-section {
      margin-bottom: 20px;
      text-align: center;
    }

    .info-section label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input[type="file"],
    textarea {
      display: block;
      margin: 0 auto 10px auto;
      padding: 8px;
      border: 2px solid rgb(91, 46, 97);
      border-radius: 6px;
      width: 80%;
      max-width: 400px;
      font-size: 16px;
      color: rgb(91, 46, 97);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      max-height: 200px;
    }

    button {
      background-color: rgb(91, 46, 97);
      color: rgb(232, 224, 207);
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background-color: rgb(121, 76, 136);
    }

    /* ---------- Custom Notifications ---------- */
    #notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgb(91, 46, 97);
      color: rgb(232, 224, 207);
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      display: none;
      z-index: 1000;
      box-shadow: 0 4px 8px rgba(91, 46, 97, 0.3);
    }

    /* Delete button for posts/replies */
    .delete-btn {
      background-color: #b03a2e;
    }

    .delete-btn:hover {
      background-color: #d35400;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>User Profile</h1>

    <div class="info-section">
      <img id="profilePic" class="profile-picture" src="" alt="Profile Picture">
    </div>

    <div class="info-section">
      <label>Username:</label>
      <div id="username"></div>
    </div>

    <div class="info-section">
      <label>Joined:</label>
      <div id="joinDate"></div>
    </div>

    <div class="info-section">
      <label for="description">Description (max 400 chars):</label>
      <textarea id="description" maxlength="400" placeholder="Write something about yourself..."></textarea>
      <button id="saveDescriptionBtn">Save Description</button>
    </div>

    <div class="info-section">
      <label for="uploadProfile">Upload 256x256 Profile Picture:</label>
      <input type="file" id="uploadProfile" accept="image/*">
      <button id="saveProfilePicBtn">Save Profile Picture</button>
    </div>

    <div class="info-section">
      <h2>Your Posts</h2>
      <div id="userPosts"></div>
    </div>
  </div>

  <!-- Custom Notification -->
  <div id="notification"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

  <script>
    // ---------- FIREBASE CONFIG ----------
    const firebaseConfig = {
      apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
      authDomain: "probatismm.firebaseapp.com",
      projectId: "probatismm",
      storageBucket: "probatismm.firebasestorage.app",
      messagingSenderId: "746935651152",
      appId: "1:746935651152:web:82491ddac346bc654a3a55"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // ---------- UTILITY: Notification ----------
    function showNotification(message) {
      const notif = document.getElementById("notification");
      notif.innerText = message;
      notif.style.display = "block";
      setTimeout(() => { notif.style.display = "none"; }, 3000);
    }

    // ---------- GET CURRENT USER ----------
    let currentUserEmail = "";
    auth.onAuthStateChanged(user => {
      if(user) {
        currentUserEmail = user.email.split("@")[0];
        loadUserProfile(currentUserEmail);
      } else {
        showNotification("Please log in.");
      }
    });

    // ---------- LOAD USER PROFILE ----------
    async function loadUserProfile(userId) {
      try {
        const userDoc = await db.collection("users").doc(userId).get();
        if(userDoc.exists) {
          const data = userDoc.data();
          document.getElementById("username").innerText = userId;
          document.getElementById("description").value = data.description || "";
          document.getElementById("profilePic").src = data.profilePic || "";

          if(data.joinDate) {
            const joinDate = new Date(data.joinDate);
            const diffDays = Math.floor((Date.now() - joinDate) / (1000*60*60*24));
            document.getElementById("joinDate").innerText = `Joined: ${joinDate.toDateString()} (${diffDays} days ago)`;
          } else {
            document.getElementById("joinDate").innerText = "Joined: Unknown";
          }
        }
        loadUserPosts(userId);
      } catch(err) {
        console.error(err);
        showNotification("Failed to load profile.");
      }
    }

    // ---------- SAVE DESCRIPTION ----------
    document.getElementById("saveDescriptionBtn").addEventListener("click", async () => {
      const desc = document.getElementById("description").value;
      try {
        await db.collection("users").doc(currentUserEmail).update({ description: desc });
        showNotification("Description saved!");
      } catch(err) {
        console.error(err);
        showNotification("Failed to save description.");
      }
    });

    // ---------- SAVE PROFILE PICTURE ----------
    let selectedProfileFile = null;
    document.getElementById("uploadProfile").addEventListener("change", (e) => {
      if(e.target.files[0]) {
        selectedProfileFile = e.target.files[0];
        showNotification("File selected!");
      }
    });

    document.getElementById("saveProfilePicBtn").addEventListener("click", async () => {
      if(!selectedProfileFile) {
        showNotification("Select a file first.");
        return;
      }
      if(selectedProfileFile.size > 500000) {
        showNotification("File too large (max 500KB).");
        return;
      }
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          await db.collection("users").doc(currentUserEmail).update({ profilePic: reader.result });
          document.getElementById("profilePic").src = reader.result;
          showNotification("Profile picture updated!");
        } catch(err) {
          console.error(err);
          showNotification("Failed to update profile picture.");
        }
      };
      reader.readAsDataURL(selectedProfileFile);
    });

    // ---------- LOAD USER POSTS ----------
    async function loadUserPosts(userId) {
      const postsDiv = document.getElementById("userPosts");
      postsDiv.innerHTML = "";
      const snapshot = await db.collection("posts").where("author", "==", userId).get();
      snapshot.forEach(doc => {
        const data = doc.data();
        const postEl = document.createElement("div");
        postEl.style.border = "1px solid rgb(91,46,97)";
        postEl.style.padding = "10px";
        postEl.style.marginBottom = "10px";
        postEl.style.borderRadius = "6px";

        postEl.innerHTML = `
          <p>${data.content}</p>
          <button class="delete-btn">Delete</button>
        `;
        const delBtn = postEl.querySelector(".delete-btn");
        delBtn.addEventListener("click", async () => {
          try {
            await db.collection("posts").doc(doc.id).delete();
            showNotification("Post deleted!");
            postEl.remove();
          } catch(err) {
            console.error(err);
            showNotification("Failed to delete post.");
          }
        });

        postsDiv.appendChild(postEl);
      });
    }
  </script>
</body>
</html>
