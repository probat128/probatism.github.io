<!DOCTYPE html>
<html>
<head>
  <title>General Forum</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    a { color: cyan; text-decoration: none; margin-right:10px; }
    textarea { width:100%; height:80px; background:#222; color:white; border:none; padding:5px; }
    button { padding:5px 10px; margin-top:5px; cursor:pointer; }
    .post { border:1px solid #555; padding:10px; margin:10px 0; background:#222; border-radius:5px; }
    .author { font-weight:bold; color:#0ff; }
    #topbar { margin-bottom:20px; }
  </style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <a href="../index.html">Home</a>
  <a href="../doctrine.html">Doctrine</a>
  <a href="../forums.html">Forums</a>
  <a href="../news.html">News</a>
  <a href="../quiz.html">Quiz</a>
  <a href="../signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn" style="display:none;">Logout</button>
</div>

<h1>General Forum</h1>

<h2>Create Post</h2>
<textarea id="postText" placeholder="Write your post..."></textarea><br>
<button id="postButton">Post</button>

<h2>Posts</h2>
<div id="posts">Loading posts...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
    authDomain: "probatismm.firebaseapp.com",
    projectId: "probatismm",
    storageBucket: "probatismm.firebasestorage.app",
    messagingSenderId: "746935651152",
    appId: "1:746935651152:web:82491ddac346bc654a3a55"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const subforum = "general";

  const accountLink = document.getElementById("accountLink");
  const currentUser = localStorage.getItem("currentUser");
  if(currentUser){
      accountLink.innerText = "Profile";
      accountLink.href = "../profile.html";
  }

  async function createPost() {
    const postText = document.getElementById("postText").value.trim();
    if(!postText){ alert("Enter text"); return; }

    const username = localStorage.getItem("currentUser") || "Anonymous";

    try {
      await addDoc(collection(db, "posts"), {
        subforum,
        author: username,
        content: postText,
        time: Date.now()
      });
      document.getElementById("postText").value = "";
      loadPosts();
    } catch (err) {
      alert("Error posting: " + err.message);
    }
  }

  async function loadPosts(){
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "Loading posts...";

  const q = query(collection(db, "posts"), where("subforum","==",subforum), orderBy("time","desc"));
  const snapshot = await getDocs(q);

  if(snapshot.empty){
    postsDiv.innerHTML = "<p>No posts yet.</p>";
    return;
  }

  postsDiv.innerHTML = "";

  for (const docSnap of snapshot.docs){
    const post = docSnap.data();
    const postId = docSnap.id;

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <b>${post.author}:</b> ${post.content}
      <div id="replies-${postId}" style="margin-left:20px;"></div>
      <textarea id="replyInput-${postId}" placeholder="Reply..."></textarea>
      <button onclick="addReply('${postId}')">Reply</button>
    `;

    postsDiv.appendChild(div);

    loadReplies(postId);
  }
}

  document.getElementById("postButton").addEventListener("click", createPost);
  loadPosts();
    
async function loadReplies(postId){
    const repliesDiv = document.getElementById("replies-" + postId);

    const q = query(collection(db, "replies"), where("postId","==",postId), orderBy("time","asc"));
    const snapshot = await getDocs(q);

    let html = "";
    snapshot.forEach(doc=>{
      const reply = doc.data();
      html += `<div><b>${reply.author}:</b> ${reply.content}</div>`;
    });

    repliesDiv.innerHTML = html;
  }

  window.addReply = async function(postId){
    const input = document.getElementById("replyInput-" + postId);
    const text = input.value.trim();

    if(!text){
      alert("Enter reply");
      return;
    }

    const username = localStorage.getItem("currentUser") || "Anonymous";

    await addDoc(collection(db, "replies"), {
      postId: postId,
      author: username,
      content: text,
      time: Date.now()
    });

    input.value = "";
    loadReplies(postId);
  }
</script>

</body>
</html>
