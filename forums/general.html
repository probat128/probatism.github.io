<!DOCTYPE html>
<html>
<head>
<title>General Forum</title>
<style>
body { font-family: Arial; background: rgb(232,224,207); color: rgb(91,46,97); padding:20px; }
nav a { color: rgb(91,46,97); margin-right:10px; text-decoration:none; }
button { margin-top:5px; padding:5px 10px; cursor:pointer; background: rgb(232,224,207); color: rgb(91,46,97); border: 1px solid rgb(91,46,97); }
textarea { width:100%; height:80px; background: rgb(232,224,207); color: rgb(91,46,97); border:1px solid rgb(91,46,97); padding:5px; }

.post {
  border:1px solid rgb(91,46,97);
  padding:10px;
  margin:10px 0;
  display:flex;
  gap:10px;
}

.profile-thumb {
  width:40px;
  height:40px;
  object-fit:cover;
  border:1px solid rgb(91,46,97);
  cursor:pointer;
}

.post-content {
  white-space: pre-wrap;
  word-break: break-word;
}

.post-img {
  max-width:256px;
  max-height:256px;
  margin-top:5px;
  cursor:pointer;
  border:1px solid rgb(91,46,97);
}

.button-row {
  margin-top:5px;
  display:flex;
  gap:10px;
}

.time {
  font-size:12px;
  margin-top:3px;
}

/* IMAGE MODAL */
#imgModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
#imgModal img {
  max-width:95%;
  max-height:95%;
}

/* DELETE MODAL */
.modal-bg {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(232,224,207,0.8);
  justify-content:center;
  align-items:center;
}
.modal-content {
  background: rgb(232,224,207);
  padding:20px;
  border:2px solid rgb(91,46,97);
}
.readMoreBtn {
  background: none;
  border: none;
  padding: 0;
  margin-top: 5px;
  cursor: pointer;
  color: rgb(91,46,97);
  text-decoration: underline;
}
</style>
</head>
<body>

<nav>
<a href="../index.html">Home</a>
<a href="../doctrine.html">Doctrine</a>
<a href="../forums.html">Forums</a>
<a href="../news.html">News</a>
<a href="../quiz.html">Quiz</a>
<a href="../signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn" style="display:none;">Logout</button>
</nav>

<h1>General Forum</h1>
<p>This is the general discussion forum. (placeholder description)</p>

<h3>Create Post</h3>
<textarea id="postText" maxlength="8000"></textarea><br>
<input type="file" id="postImage" accept="image/*"><br>
<button id="postButton">Post</button>
<p id="cooldownMsg" style="display:none; font-size:12px;"></p>

<h3>Posts</h3>
<div id="posts">Loading...</div>
<button id="loadMoreBtn">Load More</button>

<!-- IMAGE MODAL -->
<div id="imgModal"><img id="modalImg"></div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-bg">
  <div class="modal-content">
    <p>Delete this post?</p>
    <button id="confirmDeleteBtn">Delete</button>
    <button id="cancelDeleteBtn">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc, getDoc, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* ✅ FIXED CONFIG (THIS WAS THE BUG) */
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

/* ✅ SAFE INIT */
let app;
try {
  app = getApps().length===0 ? initializeApp(firebaseConfig) : getApps()[0];
} catch(e){
  console.error("Firebase init error:", e);
}

const db = getFirestore(app);
const auth = getAuth(app);

// ELEMENTS
const postButton = document.getElementById("postButton");
const postText = document.getElementById("postText");
const postImage = document.getElementById("postImage");
const postsDiv = document.getElementById("posts");
const loadMoreBtn = document.getElementById("loadMoreBtn");
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser = null;
let lastVisible = null;
let isPosting = false;
let lastPostTime = 0;
let postToDelete = null;

// AUTH
onAuthStateChanged(auth,(user)=>{
  console.log("Auth state:", user); // 🔍 debug

  if(user){
    currentUser = user.email.replace("@fake.com","");
    accountLink.innerText = "Profile";
    accountLink.href = "../profile.html";
    logoutBtn.style.display = "inline";
  } else {
    currentUser = null;
    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "../signin.html";
    logoutBtn.style.display = "none";
  }
});

// LOGOUT
logoutBtn.onclick = async ()=>{
  await signOut(auth);
  window.location.href = "../index.html";
};

// PROFILE NAVIGATION
window.goProfile = function(username){
  if(!username || username === "Anonymous") return;

  if(username === currentUser){
    window.location.href = "../profile.html";
  } else {
    window.location.href = "../user.html?user=" + username;
  }
};

/* EVERYTHING ELSE UNCHANGED BELOW */

function resizeImage(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas=document.createElement("canvas");
        canvas.width=256; canvas.height=256;
        const ctx=canvas.getContext("2d");

        const size=Math.min(img.width,img.height);
        const sx=(img.width-size)/2;
        const sy=(img.height-size)/2;

        ctx.drawImage(img,sx,sy,size,size,0,0,256,256);
        resolve(canvas.toDataURL("image/png"));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function getFullImage(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=> resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

postButton.onclick = async ()=>{
  if(isPosting) return;

  const now=Date.now();
  if(now-lastPostTime<10000){
    const msg = document.getElementById("cooldownMsg");

    msg.innerText = "Wait a few seconds before posting again.";
    msg.style.display = "block";

    setTimeout(()=>{
      msg.style.display = "none";
    }, 10000);

    return;
  }

  const text=postText.value.trim();
  const file=postImage.files[0];

  if(text.length>8000){ alert("Too long"); return; }
  if(!text && !file){ alert("Add content"); return; }

  isPosting=true;
  postButton.disabled=true;

  let image=null;
  let fullImage=null;

  if(file){
    image = await resizeImage(file);
    fullImage = await getFullImage(file);
  }

  await addDoc(collection(db,"posts"),{
    subforum:"general",
    author: currentUser || "Anonymous",
    content:text,
    image:image,
    fullImage:fullImage,
    time:Date.now()
  });

  lastPostTime=Date.now();
  document.getElementById("cooldownMsg").style.display = "none";
  postText.value="";
  postImage.value="";
  isPosting=false;
  postButton.disabled=false;

  postsDiv.innerHTML="";
  lastVisible=null;
  loadPosts();
};

async function loadPosts(){

  let q=query(
    collection(db,"posts"),
    where("subforum","==","general"),
    orderBy("time","desc"),
    limit(10)
  );

  if(lastVisible){
    q=query(
      collection(db,"posts"),
      where("subforum","==","general"),
      orderBy("time","desc"),
      startAfter(lastVisible),
      limit(10)
    );
  }

  const snap=await getDocs(q);

  if(postsDiv.innerHTML === "Loading..."){
    postsDiv.innerHTML = "";
  }

  if(snap.empty) return;

  lastVisible=snap.docs[snap.docs.length-1];

  for(const docSnap of snap.docs){
    const post=docSnap.data();
    const date=new Date(post.time).toLocaleString();

    let profilePic = "";

    if(post.author !== "Anonymous"){
      const userSnap = await getDoc(doc(db,"users",post.author));

      if(userSnap.exists() && userSnap.data().profilePic){
        profilePic = `<img class="profile-thumb" src="${userSnap.data().profilePic}" onclick="goProfile('${post.author}')">`;
      }
    }

    const div=document.createElement("div");
    div.className="post";

    const shortText = post.content.length > 400
      ? post.content.slice(0,400)
      : post.content;

    const needsMore = post.content.length > 400;

    const safeAuthorClick =
      post.author !== "Anonymous"
        ? `style="cursor:pointer;" onclick="goProfile('${post.author}')"`
        : "";

    div.innerHTML=`
      ${profilePic}
      <div>
        <b ${safeAuthorClick}>${post.author}:</b>
        <div class="post-content">${shortText}</div>
        ${needsMore ? `<button class="readMoreBtn">Read More</button>` : ""}
        ${post.image ? `<img class="post-img" src="${post.image}" data-full="${post.fullImage || post.image}">` : ""}
        <div class="time">${date}</div>
        <div class="button-row">
          <button onclick="location.href='../post.html?id=${docSnap.id}'">Replies</button>
        </div>
      </div>
    `;

    if(needsMore){
      div.querySelector(".readMoreBtn").onclick=()=>{
        div.querySelector(".post-content").innerText = post.content;
        div.querySelector(".readMoreBtn").remove();
      };
    }

    if(currentUser===post.author){
      const btn=document.createElement("button");
      btn.innerText="Delete";
      btn.onclick=()=>showDeleteModal(docSnap.id);
      div.querySelector(".button-row").appendChild(btn);
    }

    postsDiv.appendChild(div);
  }

  document.querySelectorAll(".post-img").forEach(img=>{
    img.onclick=()=>{
      document.getElementById("modalImg").src = img.dataset.full;
      document.getElementById("imgModal").style.display="flex";
    };
  });
}

loadMoreBtn.onclick=loadPosts;
document.getElementById("imgModal").onclick=()=> imgModal.style.display="none";

window.showDeleteModal=id=>{
  postToDelete=id;
  deleteModal.style.display="flex";
};

confirmDeleteBtn.onclick=async ()=>{
  await deleteDoc(doc(db,"posts",postToDelete));
  deleteModal.style.display="none";
  postsDiv.innerHTML="";
  lastVisible=null;
  loadPosts();
};

cancelDeleteBtn.onclick=()=> deleteModal.style.display="none";

loadPosts();
</script>

</body>
</html>
