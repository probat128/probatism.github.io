<!DOCTYPE html>
<html>
<head>
<title>General Forum</title>
<style>
body { font-family: Arial; background: rgb(232,224,207); color: rgb(91,46,97); padding:20px; }
nav a { color: rgb(91,46,97); margin-right:10px; text-decoration:none; }
button { margin-top:5px; padding:5px 10px; cursor:pointer; background: rgb(232,224,207); color: rgb(91,46,97); border: 1px solid rgb(91,46,97); border-radius:5px; }
textarea { width:100%; height:80px; background: rgb(232,224,207); color: rgb(91,46,97); border:1px solid rgb(91,46,97); padding:5px; }
.post { border:1px solid rgb(91,46,97); padding:10px; margin:10px 0; }

/* CUSTOM DELETE MODAL */
.modal-bg {
    display: none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(232,224,207,0.8);
    justify-content: center; 
    align-items: center;
    z-index: 1000;
}
.modal-content {
    background: rgb(232,224,207);
    padding: 20px;
    border: 2px solid rgb(91,46,97);
    width: 300px;
    text-align: center;
    color: rgb(91,46,97);
}
.modal-btn {
    padding: 5px 15px;
    margin: 0 10px;
    cursor: pointer;
    border:none;
    border-radius:5px;
}
.modal-btn.confirm { background: rgb(91,46,97); color: rgb(232,224,207); }
.modal-btn.cancel { background: rgb(232,224,207); color: rgb(91,46,97); border: 1px solid rgb(91,46,97); }
</style>
</head>
<body>
<nav>
<a href="../index.html">Home</a>
<a href="../doctrine.html">Doctrine</a>
<a href="../forums.html">Forums</a>
<a href="../news.html">News</a>
<a href="../quiz.html">Quiz</a>
<a href="../signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn" style="display:none;">Logout</button>
</nav>

<h1>General Forum</h1>
<p>This is the general discussion forum. (placeholder description)</p>

<h3>Create Post</h3>
<textarea id="postText" placeholder="Write your post..."></textarea> <br>
<button id="postButton" type="button">Post</button>

<h3>Posts</h3>
<div id="posts">Loading...</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-bg">
  <div class="modal-content">
    <p>Are you sure you want to delete your post?</p>
    <button id="confirmDeleteBtn" class="modal-btn confirm">Delete</button>
    <button id="cancelDeleteBtn" class="modal-btn cancel">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
    authDomain: "probatismm.firebaseapp.com",
    projectId: "probatismm",
    storageBucket: "probatismm.firebasestorage.app",
    messagingSenderId: "746935651152",
    appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

// INITIALIZE FIREBASE APP
const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
const db = getFirestore(app);
const auth = getAuth(app);

const subforum = "general";
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");
let currentUser = null;
let postToDelete = null;

// AUTH STATE
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user.email.replace("@fake.com", "");
        accountLink.innerText = "Profile";
        accountLink.href = "../profile.html";
        logoutBtn.style.display = "inline";
    } else {
        currentUser = null;
        accountLink.innerText = "Sign In / Sign Up";
        accountLink.href = "../signin.html";
        logoutBtn.style.display = "none";
    }
});

// LOGOUT
logoutBtn.onclick = async () => {
    try {
        await signOut(auth);
        currentUser = null;
        alert("Logged out");
        window.location.href = "../index.html";
    } catch(e) {
        alert("Error logging out.");
    }
};

// CREATE POST
document.getElementById("postButton").addEventListener("click", async () => {
    const text = document.getElementById("postText").value.trim();
    if (!text) { alert("Enter text"); return; }
    const username = currentUser ? currentUser : "Anonymous";
    try {
        await addDoc(collection(db, "posts"), {
            subforum, author: username, content: text, time: Date.now()
        });
        document.getElementById("postText").value = "";
        loadPosts();
    } catch(err) {
        if(err.code === "permission-denied"){
            alert("You don’t have permission to post.");
        } else {
            alert("Something went wrong. Try again.");
        }
    }
});

// LOAD POSTS
async function loadPosts() {
    const postsDiv = document.getElementById("posts");
    postsDiv.innerHTML = "Loading...";
    try {
        const q = query(
            collection(db, "posts"),
            where("subforum", "==", subforum),
            orderBy("time", "desc")
        );
        const snapshot = await getDocs(q);
        if(snapshot.empty){ postsDiv.innerHTML = "<p>No posts yet.</p>"; return; }
        postsDiv.innerHTML = "";

        snapshot.forEach(docSnap => {
            const post = docSnap.data();
            const postId = docSnap.id;
            const div = document.createElement("div");
            div.className = "post";
            const date = new Date(post.time).toLocaleString();

            div.innerHTML = `
                <div><b>${post.author}:</b> ${post.content}</div>
                <div style="font-size:12px;color: rgb(91,46,97);">${date}</div>
                <button onclick="window.location.href='../post.html?id=${postId}'">Read Replies</button>
            `;

            // Only show delete button if current user is author
            if(currentUser === post.author){
                const delBtn = document.createElement("button");
                delBtn.innerText = "Delete Post";
                delBtn.onclick = () => showDeleteModal(postId);
                div.appendChild(delBtn);
            }

            postsDiv.appendChild(div);
        });
    } catch(err){
        postsDiv.innerHTML = "Error loading posts.";
    }
}
loadPosts();

// CUSTOM DELETE MODAL FUNCTIONS
window.showDeleteModal = function(postId){
    postToDelete = postId;
    const modal = document.getElementById("deleteModal");
    modal.style.display = "flex";
    modal.style.opacity = "1";
};

document.getElementById("cancelDeleteBtn").onclick = () => {
    postToDelete = null;
    document.getElementById("deleteModal").style.display = "none";
};

document.getElementById("confirmDeleteBtn").onclick = async () => {
    if(postToDelete){
        try{
            await deleteDoc(doc(db, "posts", postToDelete));
            postToDelete = null;
            document.getElementById("deleteModal").style.display = "none";
            loadPosts();
        } catch(err){
            alert("Failed to delete post.");
        }
    }
};
</script>
</body>
</html>
