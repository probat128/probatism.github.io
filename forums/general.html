<!DOCTYPE html>
<html>
<head>
<title>General Forum</title>
<style>
body { font-family: Arial; background: rgb(232,224,207); color: rgb(91,46,97); padding:20px; }
nav a { color: rgb(91,46,97); margin-right:10px; text-decoration:none; }
button { margin-top:5px; padding:5px 10px; cursor:pointer; background: rgb(232,224,207); color: rgb(91,46,97); border: 1px solid rgb(91,46,97); border-radius:0; }
textarea { width:100%; height:80px; background: rgb(232,224,207); color: rgb(91,46,97); border:1px solid rgb(91,46,97); padding:5px; border-radius:0; }
.post { border:1px solid rgb(91,46,97); padding:10px; margin:10px 0; display:flex; gap:10px; }

.profile-thumb {
    width:40px;
    height:40px;
    object-fit:cover;
    border:1px solid rgb(91,46,97);
}

.button-row {
    margin-top:5px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

/* CUSTOM DELETE MODAL */
.modal-bg {
    display: none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(232,224,207,0.8);
    justify-content: center; 
    align-items: center;
    z-index: 1000;
}
.modal-content {
    background: rgb(232,224,207);
    padding: 20px;
    border: 2px solid rgb(91,46,97);
    width: 300px;
    text-align: center;
    color: rgb(91,46,97);
}
.modal-btn {
    padding: 5px 15px;
    margin: 0 10px;
    cursor: pointer;
    border:none;
    border-radius:0;
}
.modal-btn.confirm { background: rgb(91,46,97); color: rgb(232,224,207); }
.modal-btn.cancel { background: rgb(232,224,207); color: rgb(91,46,97); border: 1px solid rgb(91,46,97); }
</style>
</head>
<body>

<nav>
<a href="../index.html">Home</a>
<a href="../doctrine.html">Doctrine</a>
<a href="../forums.html">Forums</a>
<a href="../news.html">News</a>
<a href="../quiz.html">Quiz</a>
<a href="../signin.html" id="accountLink">Sign In / Sign Up</a>
<button id="logoutBtn" style="display:none;">Logout</button>
</nav>

<h1>General Forum</h1>
<p>This is the general discussion forum. (placeholder description)</p>

<h3>Create Post</h3>
<textarea id="postText" placeholder="Write your post..."></textarea> <br>
<button id="postButton" type="button">Post</button>
<p id="cooldownText"></p>

<h3>Posts</h3>
<div id="posts">Loading...</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-bg">
  <div class="modal-content">
    <p>Are you sure you want to delete your post?</p>
    <button id="confirmDeleteBtn" class="modal-btn confirm">Delete</button>
    <button id="cancelDeleteBtn" class="modal-btn cancel">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
    authDomain: "probatismm.firebaseapp.com",
    projectId: "probatismm",
    storageBucket: "probatismm.firebasestorage.app",
    messagingSenderId: "746935651152",
    appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
const db = getFirestore(app);
const auth = getAuth(app);

const subforum = "general";
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser = null;
let postToDelete = null;
let lastPostTime = 0;
let isPosting = false;

// AUTH
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user.email.replace("@fake.com", "");
        accountLink.innerText = "Profile";
        accountLink.href = "../profile.html";
        logoutBtn.style.display = "inline";
    } else {
        currentUser = null;
        accountLink.innerText = "Sign In / Sign Up";
        accountLink.href = "../signin.html";
        logoutBtn.style.display = "none";
    }
});

// LOGOUT
logoutBtn.onclick = async () => {
    await signOut(auth);
    window.location.href = "../index.html";
};

// POST COOLDOWN
function canPost(){
    const now = Date.now();
    if(now - lastPostTime < 10000){
        const remaining = Math.ceil((10000 - (now - lastPostTime)) / 1000);
        document.getElementById("cooldownText").innerText = "Wait " + remaining + "s before posting again.";
        return false;
    }
    document.getElementById("cooldownText").innerText = "";
    return true;
}

// CREATE POST (ANTI-SPAM FIXED)
document.getElementById("postButton").addEventListener("click", async () => {
    if(isPosting) return; // HARD LOCK
    if(!canPost()) return;

    const text = document.getElementById("postText").value.trim();
    if (!text) { alert("Enter text"); return; }

    const username = currentUser ? currentUser : "Anonymous";

    isPosting = true;
    const btn = document.getElementById("postButton");
    btn.disabled = true;
    btn.innerText = "Posting...";

    try {
        await addDoc(collection(db, "posts"), {
            subforum, author: username, content: text, time: Date.now()
        });

        lastPostTime = Date.now();
        document.getElementById("postText").value = "";
        loadPosts();
    } catch(err){
        alert("Failed to post.");
    }

    isPosting = false;
    btn.disabled = false;
    btn.innerText = "Post";
});

// LOAD POSTS
async function loadPosts() {
    const postsDiv = document.getElementById("posts");
    postsDiv.innerHTML = "Loading...";

    const q = query(
        collection(db, "posts"),
        where("subforum", "==", subforum),
        orderBy("time", "desc")
    );

    const snapshot = await getDocs(q);

    if(snapshot.empty){
        postsDiv.innerHTML = "<p>No posts yet.</p>";
        return;
    }

    postsDiv.innerHTML = "";

    for (const docSnap of snapshot.docs) {
        const post = docSnap.data();
        const postId = docSnap.id;
        const date = new Date(post.time).toLocaleString();

        let profilePicHTML = "";

        if(post.author !== "Anonymous"){
            const userSnap = await getDoc(doc(db, "users", post.author));
            if(userSnap.exists() && userSnap.data().profilePic){
                profilePicHTML = `<img class="profile-thumb" src="${userSnap.data().profilePic}">`;
            }
        }

        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            ${profilePicHTML}
            <div>
                <div>
                    <b><a href="../profile.html?user=${post.author}" style="color:inherit;text-decoration:underline;">
                        ${post.author}
                    </a>:</b> ${post.content}
                </div>
                <div style="font-size:12px;">${date}</div>
                <div class="button-row">
                    <button onclick="window.location.href='../post.html?id=${postId}'">Read Replies</button>
                </div>
            </div>
        `;

        if(currentUser === post.author){
            const btnRow = div.querySelector(".button-row");
            const delBtn = document.createElement("button");
            delBtn.innerText = "Delete Post";
            delBtn.onclick = () => showDeleteModal(postId);
            btnRow.appendChild(delBtn);
        }

        postsDiv.appendChild(div);
    }
}

loadPosts();

// DELETE MODAL
window.showDeleteModal = function(postId){
    postToDelete = postId;
    document.getElementById("deleteModal").style.display = "flex";
};

document.getElementById("cancelDeleteBtn").onclick = () => {
    postToDelete = null;
    document.getElementById("deleteModal").style.display = "none";
};

document.getElementById("confirmDeleteBtn").onclick = async () => {
    if(postToDelete){
        await deleteDoc(doc(db, "posts", postToDelete));
        postToDelete = null;
        document.getElementById("deleteModal").style.display = "none";
        loadPosts();
    }
};
</script>

</body>
</html>
