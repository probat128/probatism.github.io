<!DOCTYPE html>
<html>
<head>
<title>General</title>
<style>
body { font-family: Arial; background: rgb(232,224,207); color: rgb(91,46,97); padding:20px; }
nav a { color: rgb(91,46,97); margin-right:10px; text-decoration:none; }
button { margin-top:5px; padding:5px 10px; cursor:pointer; background: rgb(232,224,207); color: rgb(91,46,97); border: 1px solid rgb(91,46,97); }
textarea { width:100%; height:80px; background: rgb(232,224,207); color: rgb(91,46,97); border:1px solid rgb(91,46,97); padding:5px; }

.post {
  border:1px solid rgb(91,46,97);
  padding:10px;
  margin:10px 0;
  display:flex;
  gap:10px;
}

.profile-thumb {
  width:40px;
  height:40px;

  border:1px solid rgb(91,46,97);
  cursor:pointer;
}

.post-content {
  white-space: pre-wrap;
  word-break: break-word;
}

.post-img {
  max-width:256px;
  max-height:256px;
  margin-top:5px;
  cursor:pointer;
  border:1px solid rgb(91,46,97);
}

.button-row {

/* IMAGE MODAL */

  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;

  justify-content:center;
  align-items:center;
}
#imgModal img {
  max-width:95%;
  max-height:95%;

/* DELETE MODAL */

  background: rgba(232,224,207,0.8);
  justify-content:center;
  align-items:center;
}

  padding:20px;
  border:2px solid rgb(91,46,97);
}

.readMoreBtn {
  background: none;
  border: none;
  padding: 0;
  margin-top: 5px;
  cursor: pointer;
  color: rgb(91,46,97);
  text-decoration: underline;
}

.mention {
  color: inherit;
  cursor: pointer;
  text-decoration: underline;
}

.mention:hover {
  color: blue;
}

</style>
</head>
<body>

<nav>

<a href="../news.html">News</a>
<a href="../quiz.html">Quiz</a>

<h1>General</h1>
<p>Talk about anything (keep NSFW content in the "nsfw" forum)</p>

<!-- TOP AD -->
<div id="topAdContainer" style="text-align:center; margin-bottom:10px;">
  <a id="topAdLink" href="#">
    <img id="topAdImg" style="width:728px; height:90px; object-fit:cover; border:1px solid rgb(91,46,97);">
  </a>
  <div style="font-size:10px;">
    <a href="../advertise.html">Start advertising</a>
  </div>
</div>

<h3>Create Post</h3>
<textarea id="postText" maxlength="8000"></textarea><br>
<input type="file" id="postImage" accept="image/*"><br>
<button id="postButton">Post</button>
<p id="cooldownMsg" style="display:none; font-size:12px;"></p>

<h3>Posts</h3>
<div id="posts">Loading...</div>
<button id="loadMoreBtn">Load More</button>

<!-- IMAGE MODAL -->
<div id="imgModal"><img id="modalImg"></div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-bg">
  <div class="modal-content">
    <p>Delete this post?</p>
    <button id="confirmDeleteBtn">Delete</button>
    <button id="cancelDeleteBtn">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc, getDoc, limit, startAfter, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut, signInAnonymously } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

function extractMentions(text){
  if(!text) return [];

  const matches = text.match(/@[\w]+/g) || [];
  const cleaned = matches.map(m => m.replace("@",""));

  return [...new Set(cleaned)].filter(u => u !== "Anonymous");
}

/* ✅ FIXED CONFIG (THIS WAS THE BUG) */
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

/* ✅ SAFE INIT */
let app;
try {
  app = getApps().length===0 ? initializeApp(firebaseConfig) : getApps()[0];
} catch(e){
  console.error("Firebase init error:", e);
}

const db = getFirestore(app);
const auth = getAuth(app);

// ELEMENTS
const postButton = document.getElementById("postButton");
const postText = document.getElementById("postText");
const postImage = document.getElementById("postImage");
const postsDiv = document.getElementById("posts");
const loadMoreBtn = document.getElementById("loadMoreBtn");
const deleteModal = document.getElementById("deleteModal");
const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");
const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");
const adminUIDs = [
  "IDlmRGgh2PaLx15krpeq5jGU6SJ3"
];
function isAdmin() {
  return currentUID && adminUIDs.includes(currentUID);
}

let currentUID = null;
let currentUser = null;
let lastVisible = null;
let isPosting = false;
let lastPostTime = 0;
let postToDelete = null;

// AUTH
onAuthStateChanged(auth, (user) => {
  console.log("Auth state:", user);

  if (user) {
    currentUser = user.email.replace("@fake.com", "");
    currentUID = user.uid;

    accountLink.innerText = "Profile";
    accountLink.href = "../profile.html";
    logoutBtn.style.display = "inline";

  } else {
    currentUser = null;
    currentUID = null;
    signInAnonymously(auth).catch(console.error);

    accountLink.innerText = "Sign In / Sign Up";
    accountLink.href = "../signin.html";
    logoutBtn.style.display = "none";
  }

  // 🔥 THIS IS THE IMPORTANT PART
  postsDiv.innerHTML = "";
  lastVisible = null;
  loadPosts();

  // LOAD ADS
  loadAd("banner",
    document.getElementById("topAdImg"),
    document.getElementById("topAdLink")
  );

  loadAd("box",
    document.getElementById("bottomAdImg"),
    document.getElementById("bottomAdLink")
  );
});

// LOGOUT
logoutBtn.onclick = async ()=>{
  await signOut(auth);
  window.location.href = "../index.html";
};

// PROFILE NAVIGATION
window.goProfile = function(username){
  if(!username || username === "Anonymous") return;

  if(username === currentUser){
    window.location.href = "../profile.html";
  } else {
    window.location.href = "../user.html?user=" + username;
  }
};

function renderMentions(text){
  if(!text) return "";

  return text.replace(/@([\w]+)/g, (match, username) => {
    if(username === "Anonymous") return match;

    return `<span class="mention" onclick="goProfile('${username}')">@${username}</span>`;
  });
}

/* EVERYTHING ELSE UNCHANGED BELOW */

function resizeImage(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas=document.createElement("canvas");
        canvas.width=256; canvas.height=256;
        const ctx=canvas.getContext("2d");

        const size=Math.min(img.width,img.height);
        const sx=(img.width-size)/2;
        const sy=(img.height-size)/2;

        ctx.drawImage(img,sx,sy,size,size,0,0,256,256);
        resolve(canvas.toDataURL("image/png"));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function getFullImage(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e=> resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

postButton.onclick = async ()=>{
  if(isPosting) return;

  const now=Date.now();
  if(now-lastPostTime<10000){
    const msg = document.getElementById("cooldownMsg");

    msg.innerText = "Wait a few seconds before posting again.";
    msg.style.display = "block";

    setTimeout(()=>{
      msg.style.display = "none";
    }, 10000);

    return;
  }

  const text=postText.value.trim();
  const file=postImage.files[0];

  if (!text && !file) {
    return;
  }

  isPosting=true;
  postButton.disabled=true;

  let image=null;
  let fullImage=null;

  if(file){
    image = await resizeImage(file);
    fullImage = await getFullImage(file);
  }

  const mentions = extractMentions(text);

  await addDoc(collection(db,"posts"),{
    subforum:"general",
    author: currentUser || "Anonymous",
    authorUID: auth.currentUser ? auth.currentUser.uid : null,
    authorEmail: auth.currentUser ? auth.currentUser.email : null,

    content:text,
    image:image,
    fullImage:fullImage,
    time:Date.now(),

    mentionedUsers: mentions
  });

  lastPostTime=Date.now();
  document.getElementById("cooldownMsg").style.display = "none";
  postText.value="";
  postImage.value="";
  isPosting=false;
  postButton.disabled=false;

  postsDiv.innerHTML="";
  lastVisible=null;
  loadPosts();
};

async function loadPosts(){
  
  let q=query(
    collection(db,"posts"),
    where("subforum","==","general"),
    orderBy("time","desc"),
    limit(10)
  );

  if(lastVisible){
    q=query(
      collection(db,"posts"),
      where("subforum","==","general"),
      orderBy("time","desc"),
      startAfter(lastVisible),
      limit(10)
    );
  }

  const snap=await getDocs(q);

  if(postsDiv.innerHTML === "Loading..."){
    postsDiv.innerHTML = "";
  }

  if(snap.empty) return;

  lastVisible=snap.docs[snap.docs.length-1];

  for(const docSnap of snap.docs){
    const post=docSnap.data();
    const date=new Date(post.time).toLocaleString();

    let profilePic = "";

    if(post.authorUID){
      const userQuery = query(collection(db,"users"), where("username","==",post.author));
      const userSnap = await getDocs(userQuery);

      if(!userSnap.empty){
        const userData = userSnap.docs[0].data();

        if(userData.profilePic){
          profilePic = `<img class="profile-thumb" src="${userData.profilePic}" onclick="goProfile('${post.author}')">`;
        }
      }
    }

    const div=document.createElement("div");
    div.className="post";

    const shortText = post.content.length > 400
      ? post.content.slice(0,400)
      : post.content;

    const needsMore = post.content.length > 400;

    const safeAuthorClick =
      post.author !== "Anonymous"
        ? `style="cursor:pointer;" onclick="goProfile('${post.author}')"`
        : "";

    div.innerHTML=`
      ${profilePic}
      <div>
        <b ${safeAuthorClick}>
          ${post.author}${adminUIDs.includes(post.authorUID) ? " (admin)" : ""}
        :</b>
        <div class="post-content">${renderMentions(shortText)}</div>
        ${needsMore ? `<button class="readMoreBtn">Read More</button>` : ""}
        ${post.image ? `<img class="post-img" src="${post.image}" data-full="${post.fullImage || post.image}">` : ""}
        <div class="time">${date}</div>
        <div class="button-row">
          <button onclick="location.href='../post.html?id=${docSnap.id}'">Replies</button>
        </div>
      </div>
    `;

    if(needsMore){
      div.querySelector(".readMoreBtn").onclick=()=>{
        div.querySelector(".post-content").innerHTML = renderMentions(post.content);
        div.querySelector(".readMoreBtn").remove();
      };
    }

    if(
      (currentUID && post.authorUID && currentUID === post.authorUID) || isAdmin()
    ){
      const btn = document.createElement("button");
      btn.innerText = "Delete";
      btn.onclick = () => showDeleteModal(docSnap.id);
      div.querySelector(".button-row").appendChild(btn);
    }

    postsDiv.appendChild(div);
  }

  document.querySelectorAll(".post-img").forEach(img=>{
    img.onclick=()=>{
      document.getElementById("modalImg").src = img.dataset.full;
      document.getElementById("imgModal").style.display="flex";
    };
  });
}

loadMoreBtn.onclick=loadPosts;
document.getElementById("imgModal").onclick=()=> imgModal.style.display="none";

window.showDeleteModal = (id) => {
  postToDelete = id;
  const modal = document.getElementById("deleteModal");
  modal.style.display = "flex";
};


confirmDeleteBtn.onclick = async () => {
  try {
    if (!postToDelete) return;

    await deleteDoc(doc(db, "posts", postToDelete));

    postToDelete = null;
    document.getElementById("deleteModal").style.display = "none";

    postsDiv.innerHTML = "";
    lastVisible = null;
    loadPosts();

  } catch (err) {
    console.error("Delete failed:", err);
    alert("Delete failed (check Firestore rules or auth)");
  }
};

// cancelDeleteBtn.onclick=()=> deleteModal.style.display="none";

cancelDeleteBtn.onclick = () => {
  postToDelete = null;
  document.getElementById("deleteModal").style.display = "none";
};

// LOAD ADS
async function loadAd(type, imgEl, linkEl) {
  if (!imgEl || !linkEl) return;

  try {
    // 1. Get ALL active ads of this type
    const q = query(
      collection(db, "ads"),
      where("type", "==", type),
      where("active", "==", true)
    );

    const snap = await getDocs(q);

    // 2. If absolutely no ads exist → placeholder
    if (snap.empty) {
      imgEl.src = "/probatism.github.io/placeholder-ad.png";
      linkEl.href = "advertise.html";
      return;
    }

    // 3. Build STRICT valid ad pool
    const validAds = [];

    snap.docs.forEach(docSnap => {
      const data = docSnap.data();

      // Only allow ads that are truly valid
      if (
        data &&
        typeof data.image === "string" &&
        data.image.trim() !== "" &&
        typeof data.link === "string" &&
        data.link.trim() !== "" &&
        typeof data.impressionsLeft === "number" &&
        data.impressionsLeft > 0
      ) {
        validAds.push({
          id: docSnap.id,
          data
        });
      }
    });

    // 4. If NO valid ads → placeholder
    if (validAds.length === 0) {
      imgEl.src = "/probatism.github.io/placeholder-ad.png";
      linkEl.href = "advertise.html";
      return;
    }

    // 5. Pick random VALID ad
    const chosen = validAds[Math.floor(Math.random() * validAds.length)];

    // 6. Apply ad
    imgEl.src = chosen.data.image;
    linkEl.href = chosen.data.link;

    // 7. If image fails → ONLY THEN fallback
    imgEl.onerror = () => {
      console.log("Image failed → placeholder");
      imgEl.src = "/probatism.github.io/placeholder-ad.png";
      linkEl.href = "advertise.html";
    };

    // 8. Decrement impressions
    await updateDoc(doc(db, "ads", chosen.id), {
      impressionsLeft: increment(-1)
    });

  } catch (err) {
    console.error("Ad load error:", err);

    imgEl.src = "/probatism.github.io/placeholder-ad.png";
    linkEl.href = "advertise.html";
  }
}

</script>
