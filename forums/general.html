<!DOCTYPE html>
<html>
<head>
  <title>General Forum</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    a { color: cyan; text-decoration: none; margin-right:10px; }
    textarea { width:100%; height:80px; background:#222; color:white; border:none; padding:5px; }
    button { padding:5px 10px; margin-top:5px; cursor:pointer; }
    .post { border:1px solid #555; padding:10px; margin:10px 0; background:#222; border-radius:5px; }
    .author { font-weight:bold; color:#0ff; }
    #topbar { margin-bottom:20px; }
  </style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <a href="../index.html">Home</a>
  <a href="../doctrine.html">Doctrine</a>
  <a href="../forums.html">Forums</a>
  <a href="../news.html">News</a>
  <a href="../quiz.html">Quiz</a>
  <a href="../signin.html" id="accountLink">Sign In / Sign Up</a>
</div>

<h1>General Forum</h1>

<h2>Create Post</h2>
<textarea id="postText" placeholder="Write your post..."></textarea><br>
<button id="postButton">Post</button>

<h2>Posts</h2>
<div id="posts">Loading posts...</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
    authDomain: "probatismm.firebaseapp.com",
    projectId: "probatismm",
    storageBucket: "probatismm.firebasestorage.app",
    messagingSenderId: "746935651152",
    appId: "1:746935651152:web:82491ddac346bc654a3a55"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const subforum = "general";

  // Update top bar link based on login
  const accountLink = document.getElementById("accountLink");
  const currentUser = localStorage.getItem("currentUser");
  if(currentUser){
      accountLink.innerText = "Profile";
      accountLink.href = "../profile.html";
  }

  // Post a new message
  const postButton = document.getElementById("postButton");
  postButton.addEventListener("click", () => {
    const postText = document.getElementById("postText").value.trim();
    if(!postText) { alert("Enter some text"); return; }

    const username = localStorage.getItem("currentUser") || "Anonymous";

    db.collection("posts").add({
      subforum: subforum,
      author: username,
      content: postText,
      time: Date.now()
    }).then(()=>{
      document.getElementById("postText").value = "";
      loadPosts();
    }).catch(err=>{
      alert("Error posting: " + err.message);
    });
  });

  // Load posts
  function loadPosts(){
    const postsDiv = document.getElementById("posts");
    postsDiv.innerHTML = "Loading posts...";
    db.collection("posts")
      .where("subforum","==",subforum)
      .orderBy("time","desc")
      .get()
      .then(snapshot=>{
        if(snapshot.empty){ postsDiv.innerHTML="<p>No posts yet.</p>"; return; }
        let html = "";
        snapshot.forEach(doc=>{
          const post = doc.data();
          const date = new Date(post.time).toLocaleString();
          html += `<div class="post"><span class="author">${post.author}:</span> ${post.content}<br><small>${date}</small></div>`;
        });
        postsDiv.innerHTML = html;
      }).catch(err=>{
        postsDiv.innerHTML = "Error loading posts: " + err.message;
      });
  }

  // Load posts on page load
  loadPosts();
</script>

</body>
</html>
