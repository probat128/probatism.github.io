<!DOCTYPE html>
<html>
<head>
  <title>General Forum</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    a { color: cyan; text-decoration: none; }
    textarea { width: 100%; height: 80px; background:#222; color:white; border:none; padding:5px; }
    button { padding:5px 10px; margin-top:5px; cursor:pointer; }
    .post { border:1px solid #555; padding:10px; margin:10px 0; background:#222; border-radius:5px; }
    .author { font-weight:bold; color:#0ff; }
  </style>
</head>
<body>

<h1>General Forum</h1>
<a href="../forums.html">← Back to Forums</a>

<h2>Create Post</h2>
<textarea id="postText" placeholder="Write your post..."></textarea><br>
<button id="postButton">Post</button>

<h2>Posts</h2>
<div id="posts">Loading posts...</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
  // 🔑 Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
    authDomain: "probatismm.firebaseapp.com",
    projectId: "probatismm",
    storageBucket: "probatismm.firebasestorage.app",
    messagingSenderId: "746935651152",
    appId: "1:746935651152:web:82491ddac346bc654a3a55"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const subforum = "general"; // hardcoded subforum name
  let currentUser = null;

  // Detect login state
  auth.onAuthStateChanged(user => {
    currentUser = user;
    loadPosts();
  });

  // Post button
  document.getElementById("postButton").addEventListener("click", () => {
    const text = document.getElementById("postText").value.trim();
    if(!text) { alert("Enter some text"); return; }

    let authorId = currentUser ? currentUser.uid : null;

    db.collection("posts").add({
      subforum: subforum,
      authorId: authorId,
      content: text,
      time: Date.now()
    }).then(() => {
      document.getElementById("postText").value = "";
      loadPosts();
    }).catch(err => alert("Error posting: " + err.message));
  });

  // Load posts
  function loadPosts() {
    const postsDiv = document.getElementById("posts");
    postsDiv.innerHTML = "Loading posts...";
    db.collection("posts")
      .where("subforum", "==", subforum)
      .orderBy("time", "desc")
      .get()
      .then(snapshot => {
        if(snapshot.empty) {
          postsDiv.innerHTML = "<p>No posts yet.</p>";
          return;
        }
        postsDiv.innerHTML = "";
        snapshot.forEach(doc => {
          const post = doc.data();
          if(post.authorId){
            db.collection("users").doc(post.authorId).get().then(userDoc => {
              const username = userDoc.exists ? userDoc.data().username : "Guest";
              const postHtml = `<div class="post"><span class="author">${username}:</span> ${post.content}</div>`;
              postsDiv.innerHTML += postHtml;
            });
          } else {
            const postHtml = `<div class="post"><span class="author">Guest:</span> ${post.content}</div>`;
            postsDiv.innerHTML += postHtml;
          }
        });
      }).catch(err => postsDiv.innerHTML = "Error loading posts: " + err.message);
  }

</script>
</body>
</html>
