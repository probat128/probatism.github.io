<!DOCTYPE html>
<html>
<head>
  <title>General Forum</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    a { color: cyan; text-decoration: none; }
    textarea { width: 100%; height: 80px; background:#222; color:white; border:none; padding:5px; }
    button { padding:5px 10px; margin-top:5px; cursor:pointer; }
    .post { border:1px solid #555; padding:10px; margin:10px 0; background:#222; border-radius:5px; }
    .author { font-weight:bold; color:#0ff; }
  </style>
</head>
<body>

<h1>General Forum</h1>
<a href="../forums.html">← Back to Forums</a>

<h2>Create Post</h2>
<textarea id="postText" placeholder="Write your post..."></textarea><br>
<button onclick="createPost()">Post</button>

<h2>Posts</h2>
<div id="posts"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
const subforum = "general";

// Detect user login
auth.onAuthStateChanged(user => { currentUser = user; loadPosts(); });

// Create a post
function createPost() {
  if(!currentUser) { alert("Sign in first!"); return; }
  const text = document.getElementById("postText").value;
  if(!text) return;
  db.collection("posts").add({
    subforum: subforum,
    authorId: currentUser.uid,
    content: text,
    time: Date.now()
  }).then(() => {
    document.getElementById("postText").value = "";
    loadPosts();
  });
}

// Load posts with usernames
function loadPosts() {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "<p>Loading posts...</p>";
  db.collection("posts")
    .where("subforum", "==", subforum)
    .orderBy("time","desc")
    .get()
    .then(snapshot => {
      let html = "";
      snapshot.forEach(doc => {
        const post = doc.data();
        const userPromise = post.authorId ? db.collection("users").doc(post.authorId).get() : Promise.resolve({exists:false});
        userPromise.then(userDoc => {
          const username = userDoc.exists ? userDoc.data().username : "Guest";
          const postHtml = `<div class="post"><span class="author">${username}</span>: ${post.content}</div>`;
          postsDiv.innerHTML += postHtml;
        });
      });
    });
}
</script>
</body>
</html>
