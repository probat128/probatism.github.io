<!DOCTYPE html>
<html>
<head>
  <title>General Forum</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    nav a { color: cyan; margin-right:10px; text-decoration:none; }
    button { margin-top:5px; padding:5px 10px; cursor:pointer; }
    textarea { width:100%; height:80px; background:#222; color:white; border:none; padding:5px; }
    .post { border:1px solid #444; padding:10px; margin:10px 0; }
  </style>
</head>
<body>

<!-- NAV BAR -->
<nav>
  <a href="../index.html">Home</a>
  <a href="../doctrine.html">Doctrine</a>
  <a href="../forums.html">Forums</a>
  <a href="../news.html">News</a>
  <a href="../quiz.html">Quiz</a>
  <a href="../signin.html" id="accountLink">Sign In / Sign Up</a>
  <button id="logoutBtn">Logout</button>
</nav>

<h1>General Forum</h1>

<!-- CREATE POST -->
<h3>Create Post</h3>
<textarea id="postText" placeholder="Write your post..."></textarea>
<br>
<button id="postButton">Post</button>

<!-- POSTS -->
<h3>Posts</h3>
<div id="posts">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  authDomain: "probatismm.firebaseapp.com",
  projectId: "probatismm",
  storageBucket: "probatismm.firebasestorage.app",
  messagingSenderId: "746935651152",
  appId: "1:746935651152:web:82491ddac346bc654a3a55"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const subforum = "general";

// CREATE POST
document.getElementById("postButton").addEventListener("click", async () => {
  const text = document.getElementById("postText").value.trim();
  if(!text){
    alert("Enter text");
    return;
  }

  const username = localStorage.getItem("currentUser") || "Anonymous";

  await addDoc(collection(db, "posts"), {
    subforum: subforum,
    author: username,
    content: text,
    time: Date.now()
  });

  document.getElementById("postText").value = "";
  loadPosts();
});

// LOAD POSTS
async function loadPosts() {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "Loading...";

  try {
    const q = query(
      collection(db, "posts"),
      where("subforum", "==", subforum),
      orderBy("time", "desc")
    );

    const snapshot = await getDocs(q);

    if(snapshot.empty){
      postsDiv.innerHTML = "<p>No posts yet.</p>";
      return;
    }

    postsDiv.innerHTML = "";

    snapshot.forEach(docSnap => {
      const post = docSnap.data();
      const postId = docSnap.id;

      const div = document.createElement("div");
      div.className = "post";

      div.innerHTML = `
        <div><b>${post.author}:</b> ${post.content}</div>
        <button onclick="window.location.href='post.html?id=${postId}'">
          Read Replies
        </button>
      `;

      postsDiv.appendChild(div);
    });

  } catch(err){
    postsDiv.innerHTML = "Error loading posts: " + err.message;
  }
}

loadPosts();
</script>

<!-- LOGIN / LOGOUT SCRIPT -->
<script>
const accountLink = document.getElementById("accountLink");
const logoutBtn = document.getElementById("logoutBtn");

const currentUser = localStorage.getItem("currentUser");

if(currentUser){
  accountLink.innerText = "Profile";
  accountLink.href = "../profile.html";
  logoutBtn.style.display = "inline";
} else {
  logoutBtn.style.display = "none";
}

logoutBtn.onclick = function() {
  localStorage.removeItem("currentUser");
  alert("Logged out");
  window.location.href = "../index.html";
};
</script>

</body>
</html>
