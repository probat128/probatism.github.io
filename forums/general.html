<!DOCTYPE html>
<html>
<body>

<h1>General</h1>

<a href="../forums.html">← Back to Forums</a>

<h2>Create Post</h2>

<textarea id="postText"></textarea><br>
<button onclick="createPost()">Post</button>

<h2>Posts</h2>
<div id="posts"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZXfEl3Q68vfJtaLJqODtnQBSVEzWBmc0",
  projectId: "probatismm"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// CHANGE THIS FOR EACH SUBFORUM
const subforum = "general";

// Create post
function createPost() {
  if(!currentUser) { alert("Sign in first!"); return; }
  let text = document.getElementById("postText").value;
  db.collection("posts").add({
    subforum: subforum,
    authorId: currentUser.uid,
    content: text,
    time: Date.now()
  });
  document.getElementById("postText").value = "";
  loadPosts();
}

// Load posts
function loadPosts() {
  if(!subforum) return;
  db.collection("posts")
    .where("subforum", "==", subforum)
    .orderBy("time", "desc")
    .get()
    .then(snapshot => {
      let html = "";
      snapshot.forEach(doc => {
        const post = doc.data();
        // Get username
        if(post.authorId){
          db.collection("users").doc(post.authorId).get().then(userDoc=>{
            let username = userDoc.exists ? userDoc.data().username : "Guest";
            document.getElementById("posts").innerHTML += 
              `<p><b>${username}:</b> ${post.content}</p><hr>`;
          });
        } else {
          document.getElementById("posts").innerHTML += 
            `<p><b>Guest:</b> ${post.content}</p><hr>`;
        }
      });
    });
}

loadPosts();
</script>

</body>
</html>
